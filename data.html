<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #10b981; --bg: #f1f5f9; --dark: #065f46; }
        body { font-family: 'Kalpurush', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* লগইন সেকশন */
        #login-sec { max-width: 400px; margin: 80px auto; text-align: center; }
        #login-sec input { margin-bottom: 15px; width: 100%; box-sizing: border-box; }

        /* ট্যাব ও মেনু */
        .tab-nav { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-family: 'Kalpurush'; background: #ddd; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* টেবিল রেসপন্সিভ */
        .table-box { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #eee; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        /* ফর্ম গ্রিড */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-family: 'Kalpurush'; box-sizing: border-box; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Kalpurush'; margin: 2px; }
        .btn-view { background: #e0f2fe; color: #0369a1; }
        .btn-edit { background: #ecfdf5; color: #059669; }
        .btn-del { background: #fff1f2; color: #e11d48; }
        
        .hidden { display: none !important; }
        .charts-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        canvas { max-height: 280px; width: 100% !important; }

        h3 { color: var(--dark); border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 30px; }
        
        @media (max-width: 600px) {
            .tab-btn { font-size: 14px; padding: 10px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--dark)">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</h2>

    <div id="login-sec" class="card">
        <h3>অ্যাডমিন লগইন</h3>
        <input type="email" id="loginEmail" placeholder="আপনার ইমেইল">
        <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
        <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px">লগইন করুন</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="text-align: right; margin-bottom: 15px;">
            <button onclick="handleLogout()" style="background:#64748b; color:white; border:none; padding:7px 15px; border-radius:6px; cursor:pointer;">লগ আউট</button>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="openTab('dash', event)">📊 ড্যাশবোর্ড</button>
            <button class="tab-btn" onclick="openTab('entry', event)">➕ নতুন তথ্য যোগ</button>
            <button class="tab-btn" onclick="openTab('list', event)">📋 শিক্ষার্থী তালিকা</button>
        </div>

        <div id="dash-sec" class="card">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; text-align:center">
                <div style="background:#f8fafc; padding:15px; border-radius:12px"><span>মোট শিক্ষার্থী</span><h2 id="tCount" style="margin:5px 0">0</h2></div>
                <div style="background:#eff6ff; padding:15px; border-radius:12px; color:#3b82f6"><span>ছাত্র</span><h2 id="bCount" style="margin:5px 0">0</h2></div>
                <div style="background:#fdf2f8; padding:15px; border-radius:12px; color:#ec4899"><span>ছাত্রী</span><h2 id="gCount" style="margin:5px 0">0</h2></div>
            </div>
            
            <div class="charts-wrapper">
                <div style="text-align:center"><h4>লিঙ্গ অনুপাত (ছাত্র বনাম ছাত্রী)</h4><canvas id="genderChart"></canvas></div>
                <div style="text-align:center"><h4>বয়স ভিত্তিক বিন্যাস</h4><canvas id="ageChart"></canvas></div>
            </div>
        </div>

        <div id="entry-sec" class="card hidden">
            <form id="stuForm">
                <h3>শিক্ষার্থীর ব্যক্তিগত তথ্য</h3>
                <div class="form-grid">
                    <input type="text" id="name" placeholder="নাম" required>
                    <select id="className"><option>প্রাক</option><option>১ম</option><option>২য়</option><option>৩য়</option><option>৪র্থ</option><option>৫ম</option></select>
                    <input type="number" id="roll" placeholder="রোল" required>
                    <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর">
                    <input type="date" id="dob" title="শিক্ষার্থীর জন্ম তারিখ">
                    <select id="gender"><option>ছাত্র</option><option>ছাত্রী</option></select>
                    <select id="blood"><option>অজানা</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option></select>
                </div>

                <h3>পিতা ও মাতার তথ্য</h3>
                <div class="form-grid">
                    <input type="text" id="fName" placeholder="পিতার নাম">
                    <input type="text" id="fNid" placeholder="পিতার NID">
                    <input type="tel" id="fMobile" placeholder="পিতার মোবাইল">
                    <input type="date" id="fDob" title="পিতার জন্ম তারিখ">
                    
                    <input type="text" id="mName" placeholder="মাতার নাম">
                    <input type="text" id="mNid" placeholder="মাতার NID">
                    <input type="tel" id="mMobile" placeholder="মাতার মোবাইল">
                    <input type="date" id="mDob" title="মাতার জন্ম তারিখ">
                </div>

                <div style="margin-top:15px; background:#f8fafc; padding:15px; border-radius:10px; border:1px dashed #ccc">
                    <label>শিক্ষার্থীর ছবি নির্বাচন করুন: </label>
                    <input type="file" id="picInp" accept="image/*" style="border:none; padding:5px">
                </div>
                
                <button type="submit" id="saveBtn" style="width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; margin-top:25px; font-weight:bold; font-size:18px">তথ্য সেভ করুন</button>
            </form>
        </div>

        <div id="list-sec" class="card hidden">
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>ছবি</th>
                            <th>নাম ও রোল</th>
                            <th>শ্রেণি</th>
                            <th>জন্ম নিবন্ধন</th>
                            <th>পিতার নাম</th>
                            <th>পিতার মোবাইল</th>
                            <th style="text-align:right">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let allData = [], editId = null, gChart = null, aChart = null;

    // লগইন সিস্টেম
    window.handleLogin = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        if(!email || !pass) return Swal.fire('দুঃখিত', 'ইমেইল ও পাসওয়ার্ড প্রদান করুন', 'warning');
        
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
            Swal.fire('ভুল তথ্য', 'ইমেইল বা পাসওয়ার্ড সঠিক নয়', 'error');
        }
    };

    window.handleLogout = () => signOut(auth);

    // ট্যাব পরিবর্তন ফাংশন
    window.openTab = (tab, event) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => { if(c.id !== 'login-sec') c.classList.add('hidden') });
        if(event) event.currentTarget.classList.add('active');
        document.getElementById(tab + '-sec').classList.remove('hidden');
    };

    // Firebase Auth স্টেট মনিটর
    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('login-sec').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // রিয়েলটাইম ডাটা ফেচিং
            onSnapshot(query(collection(db, "students"), orderBy("className"), orderBy("roll")), snap => {
                allData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });
        } else {
            document.getElementById('login-sec').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    function updateUI() {
        const body = document.getElementById('tableBody'); body.innerHTML = '';
        let counts = { 'ছাত্র': 0, 'ছাত্রী': 0 };
        let ageDist = {}; for(let i=4; i<=16; i++) ageDist[i + " বছর"] = 0;

        allData.forEach(s => {
            counts[s.gender || 'ছাত্র']++;
            if(s.dob) {
                const age = new Date().getFullYear() - new Date(s.dob).getFullYear();
                if(ageDist[age + " বছর"] !== undefined) ageDist[age + " বছর"]++;
            }
            body.innerHTML += `
                <tr>
                    <td><img src="${s.photo || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:8px; object-fit:cover; border:1px solid #ddd"></td>
                    <td><b>${s.name}</b><br><small>রোল: ${s.roll}</small></td>
                    <td>${s.className}</td>
                    <td>${s.birthReg || '-'}</td>
                    <td>${s.fName || '-'}</td>
                    <td>${s.fMobile || '-'}</td>
                    <td style="text-align:right">
                        <button class="btn btn-view" onclick="viewData('${s.id}')">ভিউ</button>
                        <button class="btn btn-edit" onclick="editData('${s.id}')">এডিট</button>
                        <button class="btn btn-del" onclick="deleteData('${s.id}')">মুছুন</button>
                    </td>
                </tr>`;
        });
        document.getElementById('tCount').innerText = allData.length;
        document.getElementById('bCount').innerText = counts['ছাত্র'];
        document.getElementById('gCount').innerText = counts['ছাত্রী'];
        renderCharts(counts, ageDist);
    }

    function renderCharts(c, ageData) {
        if(gChart) gChart.destroy();
        gChart = new Chart(document.getElementById('genderChart'), {
            type: 'doughnut',
            data: { labels: ['ছাত্র', 'ছাত্রী'], datasets: [{ data: [c['ছাত্র'], c['ছাত্রী']], backgroundColor: ['#3b82f6', '#ec4899'] }] },
            options: { responsive: true, maintainAspectRatio: false }
        });

        if(aChart) aChart.destroy();
        aChart = new Chart(document.getElementById('ageChart'), {
            type: 'bar',
            data: { labels: Object.keys(ageData), datasets: [{ label: 'শিক্ষার্থী সংখ্যা', data: Object.values(ageData), backgroundColor: '#10b981' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    window.viewData = (id) => {
        const s = allData.find(x => x.id === id);
        Swal.fire({
            title: s.name,
            html: `
                <div style="text-align:left; font-size:14px; line-height:1.8; color:#333">
                    <center>${s.photo ? `<img src="${s.photo}" style="width:130px; border-radius:15px; border:3px solid #eee; margin-bottom:10px">` : ''}</center>
                    <h4 style="border-bottom:2px solid #10b981; color:#065f46">ব্যক্তিগত তথ্য</h4>
                    <b>রোল:</b> ${s.roll} | <b>শ্রেণি:</b> ${s.className}<br>
                    <b>জন্ম নিবন্ধন:</b> ${s.birthReg || '-'}<br>
                    <b>জন্ম তারিখ:</b> ${s.dob || '-'}<br>
                    <b>লিঙ্গ:</b> ${s.gender} | <b>রক্ত:</b> ${s.blood || 'অজানা'}<br>
                    
                    <h4 style="border-bottom:2px solid #10b981; color:#065f46; margin-top:15px">পিতার তথ্য</h4>
                    <b>নাম:</b> ${s.fName || '-'}<br>
                    <b>NID:</b> ${s.fNid || '-'}<br>
                    <b>মোবাইল:</b> ${s.fMobile || '-'}<br>
                    <b>জন্ম তারিখ:</b> ${s.fDob || '-'}<br>
                    
                    <h4 style="border-bottom:2px solid #10b981; color:#065f46; margin-top:15px">মাতার তথ্য</h4>
                    <b>নাম:</b> ${s.mName || '-'}<br>
                    <b>NID:</b> ${s.mNid || '-'}<br>
                    <b>মোবাইল:</b> ${s.mMobile || '-'}<br>
                    <b>জন্ম তারিখ:</b> ${s.mDob || '-'}<br>
                </div>`,
            confirmButtonText: 'ঠিক আছে', confirmButtonColor: '#10b981'
        });
    };

    window.editData = (id) => {
        const s = allData.find(x => x.id === id);
        editId = id;
        document.getElementById('name').value = s.name;
        document.getElementById('className').value = s.className;
        document.getElementById('roll').value = s.roll;
        document.getElementById('birthReg').value = s.birthReg || '';
        document.getElementById('dob').value = s.dob || '';
        document.getElementById('gender').value = s.gender;
        document.getElementById('blood').value = s.blood || 'অজানা';
        
        document.getElementById('fName').value = s.fName || '';
        document.getElementById('fNid').value = s.fNid || '';
        document.getElementById('fMobile').value = s.fMobile || '';
        document.getElementById('fDob').value = s.fDob || '';
        
        document.getElementById('mName').value = s.mName || '';
        document.getElementById('mNid').value = s.mNid || '';
        document.getElementById('mMobile').value = s.mMobile || '';
        document.getElementById('mDob').value = s.mDob || '';
        
        document.getElementById('saveBtn').innerText = "তথ্য আপডেট করুন";
        openTab('entry');
    };

    window.deleteData = async (id) => {
        const res = await Swal.fire({title:'আপনি কি নিশ্চিত?', text:'এই তথ্যটি চিরতরে মুছে যাবে!', icon:'warning', showCancelButton:true, confirmButtonColor:'#e11d48'});
        if(res.isConfirmed) await deleteDoc(doc(db, "students", id));
    };

    document.getElementById('stuForm').onsubmit = async (e) => {
        e.preventDefault();
        Swal.fire({title: 'সেভ হচ্ছে...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        
        let picBase64 = editId ? allData.find(x => x.id === editId).photo : "";
        const file = document.getElementById('picInp').files[0];
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            picBase64 = await new Promise(r => reader.onload = () => r(reader.result));
        }

        const data = {
            name: document.getElementById('name').value,
            roll: parseInt(document.getElementById('roll').value),
            className: document.getElementById('className').value,
            birthReg: document.getElementById('birthReg').value,
            dob: document.getElementById('dob').value,
            gender: document.getElementById('gender').value,
            blood: document.getElementById('blood').value,
            fName: document.getElementById('fName').value,
            fNid: document.getElementById('fNid').value,
            fMobile: document.getElementById('fMobile').value,
            fDob: document.getElementById('fDob').value,
            mName: document.getElementById('mName').value,
            mNid: document.getElementById('mNid').value,
            mMobile: document.getElementById('mMobile').value,
            mDob: document.getElementById('mDob').value,
            photo: picBase64
        };

        try {
            if(editId) {
                await updateDoc(doc(db, "students", editId), data);
                editId = null;
                document.getElementById('saveBtn').innerText = "তথ্য সেভ করুন";
            } else {
                await addDoc(collection(db, "students"), data);
            }
            e.target.reset();
            Swal.fire('সফল', 'ডাটাবেস আপডেট হয়েছে', 'success');
            openTab('list');
        } catch (err) {
            Swal.fire('এরর', 'তথ্য সংরক্ষণ করা যায়নি!', 'error');
        }
    };
</script>
</body>
</html>

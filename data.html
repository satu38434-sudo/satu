<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল ডাটাবেস | প্রাক-প্রাথমিক থেকে ৫ম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; color: black; } }
    </style>
</head>
<body class="antialiased">

    <div id="viewModal" class="modal flex items-center justify-center p-4">
        <div class="glass max-w-2xl w-full p-8 rounded-[40px] relative overflow-y-auto max-h-[90vh] border border-white/10">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white text-2xl">&times;</button>
            <div id="modalContent" class="space-y-6"></div>
            <div class="mt-8 pt-6 border-t border-white/10 flex justify-between gap-4">
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-2xl text-sm font-bold transition-all">রিপোর্ট প্রিন্ট করুন</button>
                <button onclick="closeModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl text-sm font-bold transition-all">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center">
        <div class="glass p-10 rounded-[45px] w-full max-w-md text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-8 text-blue-500 tracking-tighter uppercase">ডাটাবেস লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল আইডি">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print glass sticky top-0 z-50 p-4 mb-6 border-b border-white/5">
            <div class="max-w-[1400px] mx-auto flex justify-between items-center">
                <h1 class="font-black text-2xl tracking-tighter text-blue-500">স্কুল<span class="text-white">ডিবি</span></h1>
                <div class="flex gap-2 bg-slate-900/50 p-1 rounded-2xl">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 rounded-xl text-sm font-bold transition-all tab-active">তালিকা</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 rounded-xl text-sm font-bold text-slate-400 transition-all">নতুন এন্ট্রি</button>
                </div>
                <button id="logoutBtn" class="text-red-400 text-[10px] font-bold uppercase px-4 py-2 border border-red-500/20 rounded-xl hover:bg-red-500/10">লগ আউট</button>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-4">
            <div class="mb-6 flex items-center gap-3 bg-white/5 p-3 rounded-2xl inline-flex border border-white/5">
                <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-slate-500 animate-pulse"></div>
                <h3 id="roleText" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">যাচাই করা হচ্ছে...</h3>
            </div>

            <div id="entryTab" class="hidden no-print glass p-8 rounded-[40px] mb-10 border border-white/5">
                <form id="studentForm" class="space-y-6">
                    <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                    
                    <div class="flex flex-col md:flex-row gap-8 items-center">
                        <div class="w-32 h-32 bg-slate-800 rounded-3xl border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden relative group">
                            <img id="imagePreview" class="hidden w-full h-full object-cover">
                            <div id="imgPlaceholder" class="text-center text-[10px] text-slate-500">ছবি দিন<br>(২০০x২০০)</div>
                            <input type="file" id="stPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 flex-1 w-full">
                            <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" required>
                            <select id="class" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম শ্রেণি</option>
                                <option value="২য়">২য় শ্রেণি</option>
                                <option value="৩য়">৩য় শ্রেণি</option>
                                <option value="৪র্থ">৪র্থ শ্রেণি</option>
                                <option value="৫ম">৫ম শ্রেণি</option>
                            </select>
                            <input type="number" id="roll" placeholder="রোল নম্বর" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর">
                        <input type="date" id="dob">
                        <select id="bloodGroup">
                            <option value="">রক্তের গ্রুপ</option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="p-6 bg-white/5 rounded-3xl space-y-3 border border-white/5">
                            <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest">পিতার তথ্য</p>
                            <input type="text" id="fName" placeholder="পিতার নাম">
                            <input type="text" id="fMobile" placeholder="মোবাইল নম্বর">
                            <input type="text" id="fNid" placeholder="পিতার NID নম্বর">
                            <input type="date" id="fDob" title="পিতার জন্ম তারিখ">
                        </div>
                        <div class="p-6 bg-white/5 rounded-3xl space-y-3 border border-white/5">
                            <p class="text-pink-500 text-[10px] font-black uppercase tracking-widest">মাতার তথ্য</p>
                            <input type="text" id="mName" placeholder="মাতার নাম">
                            <input type="text" id="mMobile" placeholder="মোবাইল নম্বর">
                            <input type="text" id="mNid" placeholder="মাতার NID নম্বর">
                            <input type="date" id="mDob" title="মাতার জন্ম তারিখ">
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-3">
                        <button type="button" onclick="document.getElementById('studentForm').reset();" class="px-8 py-4 rounded-2xl text-slate-500 font-bold hover:bg-white/5 transition-all text-xs">রিসেট</button>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-12 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-600/20 text-xs">প্রোফাইল সেভ করুন</button>
                    </div>
                </form>
            </div>

            <div id="viewTab" class="space-y-10 pb-20">
                <div class="no-print mb-6">
                    <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="glass p-4 rounded-2xl w-full md:w-96 outline-none border border-white/10 focus:border-blue-500/50">
                </div>
                <div id="classWiseContainer" class="space-y-12"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const u = user.uid;
                const checkA = u.startsWith("Q9AUB") && u.endsWith("Cx1");
                const checkH = u.startsWith("BcQX") && u.includes("WMHQkJN");
                const rt = document.getElementById('roleText');
                const dt = document.getElementById('statusDot');
                if (checkA) { window.currentUserRole = "admin"; rt.innerText = "পদবি: অ্যাডমিন"; dt.className = "w-2.5 h-2.5 rounded-full bg-blue-500"; }
                else if (checkH) { window.currentUserRole = "head_teacher"; rt.innerText = "পদবি: প্রধান শিক্ষক"; dt.className = "w-2.5 h-2.5 rounded-full bg-emerald-500"; }
                else { window.currentUserRole = "teacher"; rt.innerText = "পদবি: সহকারী শিক্ষক"; dt.className = "w-2.5 h-2.5 rounded-full bg-slate-500"; }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('stPhoto').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    let side = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-side)/2, (img.height-side)/2, side, side, 0, 0, 200, 200);
                    const b64 = canvas.toDataURL('image/jpeg', 0.4);
                    document.getElementById('photoBase64').value = b64;
                    document.getElementById('imagePreview').src = b64;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('imgPlaceholder').classList.add('hidden');
                }
                img.src = ev.target.result;
            }
            reader.readAsDataURL(file);
        });

        function loadData(searchTerm = "") {
            onValue(ref(db, 'students'), (snapshot) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;
                const classes = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
                classes.forEach(cls => {
                    const filtered = Object.keys(data)
                        .filter(id => data[id].className === cls && (data[id].name.toLowerCase().includes(searchTerm.toLowerCase()) || data[id].roll.toString().includes(searchTerm)))
                        .sort((a,b) => data[a].roll - data[b].roll);
                    if (filtered.length > 0) {
                        let html = `
                        <div class="glass rounded-[40px] overflow-hidden border border-white/5">
                            <div class="bg-white/5 p-6 border-b border-white/5 flex justify-between items-center">
                                <h2 class="font-black text-blue-500 uppercase tracking-tighter">${cls} শ্রেণি</h2>
                                <span class="text-[10px] text-slate-500">${filtered.length} জন শিক্ষার্থী</span>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-900/40 text-slate-500 text-[9px] uppercase tracking-widest">
                                        <tr><th class="p-6">রোল</th><th class="p-6">নাম</th><th class="p-6 text-center">অ্যাকশন</th></tr>
                                    </thead>
                                    <tbody class="divide-y divide-white/5">`;
                        filtered.forEach(id => {
                            const s = data[id];
                            html += `
                                <tr class="hover:bg-white/5 transition-all">
                                    <td class="p-6 font-black text-blue-500">#${s.roll}</td>
                                    <td class="p-6 font-bold text-slate-200">${s.name}</td>
                                    <td class="p-6 flex justify-center gap-2">
                                        <button onclick="viewRec('${id}')" class="bg-white/5 hover:bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-[10px] font-bold transition-all">দেখুন</button>
                                        <button onclick="editRec('${id}')" class="bg-white/5 hover:bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-xl text-[10px] font-bold transition-all">এডিট</button>
                                        ${window.currentUserRole === 'admin' ? `<button onclick="deleteRec('${id}')" class="bg-white/5 hover:bg-red-600/20 text-red-400 px-4 py-2 rounded-xl text-[10px] font-bold transition-all">মুছুন</button>` : ''}
                                    </td>
                                </tr>`;
                        });
                        html += `</tbody></table></div></div>`;
                        container.innerHTML += html;
                    }
                });
            });
        }

        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col items-center gap-4 mb-8">
                    <img src="${s.photo || 'https://via.placeholder.com/200'}" class="w-36 h-36 rounded-[40px] border-4 border-blue-500/10 object-cover shadow-2xl">
                    <div class="text-center">
                        <h2 class="text-3xl font-black text-white tracking-tighter">${s.name}</h2>
                        <p class="text-blue-500 font-bold uppercase text-xs mt-1 tracking-widest">${s.className} শ্রেণি | রোল: ${s.roll}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-bold">
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5"><p class="text-slate-500 uppercase mb-1">জন্ম নিবন্ধন</p><p>${s.birthReg || '---'}</p></div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5"><p class="text-slate-500 uppercase mb-1">জন্ম তারিখ</p><p>${s.dob || '---'}</p></div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5"><p class="text-slate-500 uppercase mb-1">রক্তের গ্রুপ</p><p class="text-red-500">${s.bloodGroup || '---'}</p></div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-blue-500 uppercase mb-1">পিতার তথ্য</p>
                        <p>নাম: ${s.fName || '---'}</p><p>মোবাইল: ${s.fMobile || '---'}</p>
                        <p>NID: ${s.fNid || '---'}</p><p>জন্ম তারিখ: ${s.fDob || '---'}</p>
                    </div>
                    <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-pink-500 uppercase mb-1">মাতার তথ্য</p>
                        <p>নাম: ${s.mName || '---'}</p><p>মোবাইল: ${s.mMobile || '---'}</p>
                        <p>NID: ${s.mNid || '---'}</p><p>জন্ম তারিখ: ${s.mDob || '---'}</p>
                    </div>
                </div>`;
            document.getElementById('viewModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('viewModal').style.display = 'none';

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const student = {
                name: document.getElementById('stName').value, roll: document.getElementById('roll').value,
                className: document.getElementById('class').value, photo: document.getElementById('photoBase64').value,
                birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                fName: document.getElementById('fName').value, fMobile: document.getElementById('fMobile').value,
                fNid: document.getElementById('fNid').value, fDob: document.getElementById('fDob').value,
                mName: document.getElementById('mName').value, mMobile: document.getElementById('mMobile').value,
                mNid: document.getElementById('mNid').value, mDob: document.getElementById('mDob').value
            };
            set(id ? ref(db, `students/${id}`) : push(ref(db, 'students')), student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('imgPlaceholder').classList.remove('hidden');
                document.getElementById('editKey').value = "";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('photoBase64').value = s.photo || "";
            document.getElementById('birthReg').value = s.birthReg || "";
            document.getElementById('dob').value = s.dob || "";
            document.getElementById('bloodGroup').value = s.bloodGroup || "";
            document.getElementById('fName').value = s.fName || ""; document.getElementById('fMobile').value = s.fMobile || "";
            document.getElementById('fNid').value = s.fNid || ""; document.getElementById('fDob').value = s.fDob || "";
            document.getElementById('mName').value = s.mName || ""; document.getElementById('mMobile').value = s.mMobile || "";
            document.getElementById('mNid').value = s.mNid || ""; document.getElementById('mDob').value = s.mDob || "";
            if(s.photo) { document.getElementById('imagePreview').src = s.photo; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgPlaceholder').classList.add('hidden'); }
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { if(window.currentUserRole === 'admin' && confirm("আপনি কি নিশ্চিতভাবে মুছতে চান?")) remove(ref(db, `students/${id}`)); };

        window.switchTab = (id) => {
            document.getElementById('entryTab').classList.toggle('hidden', id !== 'entryTab');
            document.getElementById('viewTab').classList.toggle('hidden', id !== 'viewTab');
            document.getElementById('btnView').classList.toggle('tab-active', id === 'viewTab');
            document.getElementById('btnEntry').classList.toggle('tab-active', id === 'entryTab');
        };

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert("লগইন ভুল হয়েছে!"));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
    </script>
</body>
</html>

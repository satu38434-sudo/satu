<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #006a4e; --sidebar-bg: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Kalpurush', sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Navigation & Sidebar */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: none; flex-direction: column; z-index: 1000; }
        #menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1100; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); }

        /* Main Content */
        #main-content { flex: 1; overflow-y: auto; display: none; padding: 20px; padding-top: 75px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* Table - Professional View */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1250px; background: white; }
        th { background: #f8fafc; color: var(--primary); padding: 15px; text-align: left; font-weight: bold; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 13.5px; vertical-align: top; line-height: 1.5; }
        .stu-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid #eee; }
        .info-label { color: #64748b; font-size: 11px; font-weight: bold; display: block; }

        /* Inputs */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-family: 'Kalpurush'; box-sizing: border-box; }
        
        .btn-edit { background: #f59e0b; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 5px; width: 80px; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; width: 80px; }

        #login-container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--primary); position: fixed; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100vh; left: -260px; display: flex; }
            #sidebar.open { left: 0; }
            #menu-toggle { display: block; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<button id="menu-toggle">☰ মেনু</button>

<div id="login-container">
    <div class="login-box">
        <h2 style="color:var(--primary)">অ্যাডমিন পোর্টাল</h2>
        <input type="email" id="loginEmail" placeholder="ইমেইল" style="margin-bottom:15px">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" style="margin-bottom:20px">
        <button id="loginBtn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">লগইন করুন</button>
    </div>
</div>

<aside id="sidebar">
    <div class="sidebar-header"><h4>স্কুল ম্যানেজমেন্ট</h4></div>
    <div class="nav-item active" data-sec="dashboard-sec">📊 ড্যাশবোর্ড</div>
    <div class="nav-item" data-sec="entry-sec">📝 নতুন এন্ট্রি</div>
    <div class="nav-item" data-sec="list-sec">📋 শিক্ষার্থী তালিকা</div>
    <div class="nav-item" id="logoutBtn" style="color:#fb7185; margin-top: auto;">🚪 লগআউট</div>
</aside>

<main id="main-content">
    <section id="dashboard-sec">
        <div class="card" style="display:flex; justify-content:space-around; text-align:center;">
            <div>মোট শিক্ষার্থী<h2 id="totalCount">0</h2></div>
            <div>ছাত্র<h2 id="boyCount" style="color:#3b82f6">0</h2></div>
            <div>ছাত্রী<h2 id="girlCount" style="color:#ec4899">0</h2></div>
        </div>
        <div class="card" style="max-width:400px; margin:auto;"><canvas id="genderChart"></canvas></div>
    </section>

    <section id="entry-sec" class="hidden">
        <div class="card">
            <h2 id="formTitle">শিক্ষার্থী তথ্য ফরম</h2>
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>নাম</label><input type="text" id="name" required></div>
                    <div><label>রোল</label><input type="number" id="roll" required></div>
                    <div><label>শ্রেণি</label><select id="className">
                        <option value="প্রাক">প্রাক-প্রাথমিক</option><option value="১ম">১ম</option>
                        <option value="২য়">২য়</option><option value="৩য়">৩য়</option>
                        <option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                    </select></div>
                    <div><label>লিঙ্গ</label><select id="gender"><option value="ছাত্র">ছাত্র</option><option value="ছাত্রী">ছাত্রী</option></select></div>
                    <div><label>জন্ম তারিখ</label><input type="date" id="dob" required></div>
                    <div><label>জন্ম নিবন্ধন</label><input type="text" id="birthReg"></div>
                    <div><label>পিতার নাম</label><input type="text" id="fName"></div>
                    <div><label>পিতার NID</label><input type="text" id="fNid"></div>
                    <div><label>পিতার জন্ম তারিখ</label><input type="date" id="fDob"></div>
                    <div><label>পিতার মোবাইল</label><input type="tel" id="fMobile"></div>
                    <div><label>মাতার নাম</label><input type="text" id="mName"></div>
                    <div><label>মাতার NID</label><input type="text" id="mNid"></div>
                    <div><label>মাতার জন্ম তারিখ</label><input type="date" id="mDob"></div>
                    <div><label>মাতার মোবাইল</label><input type="tel" id="mMobile"></div>
                    <div><label>ছবি</label><input type="file" id="photoInput" accept="image/*"></div>
                </div>
                <button type="submit" id="saveBtn" style="margin-top:20px; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; width:100%">সংরক্ষণ করুন</button>
            </form>
        </div>
    </section>

    <section id="list-sec" class="hidden">
        <div class="card">
            <h2 style="color:var(--primary)">শিক্ষার্থী তালিকা</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ছবি</th>
                            <th>নাম, শ্রেণি ও রোল</th>
                            <th>জন্ম নিবন্ধন ও তারিখ</th>
                            <th>পিতার তথ্য (NID/DOB/Mob)</th>
                            <th>মাতার তথ্য (NID/DOB/Mob)</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="listBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allStudents = [], editId = null, genderChart = null;

    // Authentication
    document.getElementById('loginBtn').onclick = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => Swal.fire('Error', 'Invalid Login!', 'error'));
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            syncData();
        }
    });

    // Navigation Logic
    const menuBtn = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');
    menuBtn.onclick = () => sidebar.classList.toggle('open');

    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = function() {
            const secId = this.getAttribute('data-sec');
            if(!secId) return;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(secId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            if(window.innerWidth <= 768) sidebar.classList.remove('open');
        };
    });

    function syncData() {
        onSnapshot(collection(db, "students"), snap => {
            allStudents = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const rank = {"প্রাক":1, "১ম":2, "২য়":3, "৩য়":4, "৪র্থ":5, "৫ম":6};
            allStudents.sort((a,b) => (rank[a.className]-rank[b.className]) || (a.roll-b.roll));
            updateUI();
        });
    }

    function updateUI() {
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = '';
        let stats = { ছাত্র: 0, ছাত্রী: 0 };

        allStudents.forEach(s => {
            stats[s.gender]++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><img src="${s.photo || 'https://via.placeholder.com/60'}" class="stu-img"></td>
                <td><b>${s.name}</b><br><span class="info-label">শ্রেণি: ${s.className} | রোল: ${s.roll}</span></td>
                <td><span class="info-label">নিবন্ধন:</span> ${s.birthReg || '-'}<br><span class="info-label">জন্ম:</span> ${s.dob}</td>
                <td><b>${s.fName || '-'}</b><br><span class="info-label">NID: ${s.fNid || '-'}</span><span class="info-label">মোবাইল: ${s.fMobile || '-'}</span></td>
                <td><b>${s.mName || '-'}</b><br><span class="info-label">NID: ${s.mNid || '-'}</span><span class="info-label">মোবাইল: ${s.mMobile || '-'}</span></td>
                <td><button class="btn-edit">এডিট</button><br><button class="btn-del">ডিলিট</button></td>`;
            
            tr.querySelector('.btn-edit').onclick = () => startEdit(s);
            tr.querySelector('.btn-del').onclick = () => deleteStu(s.id);
            listBody.appendChild(tr);
        });

        document.getElementById('totalCount').innerText = allStudents.length;
        document.getElementById('boyCount').innerText = stats.ছাত্র;
        document.getElementById('girlCount').innerText = stats.ছাত্রী;
        updateChart(stats);
    }

    function updateChart(stats) {
        if(genderChart) genderChart.destroy();
        const ctx = document.getElementById('genderChart').getContext('2d');
        genderChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['ছাত্র', 'ছাত্রী'], datasets: [{ data: [stats.ছাত্র, stats.ছাত্রী], backgroundColor: ['#3b82f6', '#ec4899'] }] }
        });
    }

    const processImg = (file) => new Promise(res => {
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = (e) => {
            const i = new Image(); i.src = e.target.result;
            i.onload = () => {
                const c = document.createElement('canvas'); c.width=100; c.height=100;
                c.getContext('2d').drawImage(i,0,0,100,100); res(c.toDataURL('image/jpeg',0.6));
            }
        }
    });

    document.getElementById('studentForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn'); btn.disabled = true;

        const rollVal = parseInt(document.getElementById('roll').value);
        const classVal = document.getElementById('className').value;

        // Validation: Duplicate Roll Check
        const isDuplicate = allStudents.some(s => s.id !== editId && s.roll === rollVal && s.className === classVal);
        if(isDuplicate) {
            Swal.fire('সতর্কতা', 'এই শ্রেণিতে এই রোল নম্বরটি ইতিমধ্যে ব্যবহার করা হয়েছে!', 'warning');
            btn.disabled = false; return;
        }

        try {
            let imgData = editId ? (allStudents.find(x => x.id === editId).photo || "") : "";
            const file = document.getElementById('photoInput').files[0];
            if (file) imgData = await processImg(file);

            const payload = {
                name: document.getElementById('name').value,
                roll: rollVal,
                className: classVal,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                birthReg: document.getElementById('birthReg').value || "",
                fName: document.getElementById('fName').value || "",
                fNid: document.getElementById('fNid').value || "",
                fDob: document.getElementById('fDob').value || "",
                fMobile: document.getElementById('fMobile').value || "",
                mName: document.getElementById('mName').value || "",
                mNid: document.getElementById('mNid').value || "",
                mDob: document.getElementById('mDob').value || "",
                mMobile: document.getElementById('mMobile').value || "",
                photo: imgData
            };

            if(editId) { await updateDoc(doc(db, "students", editId), payload); editId = null; }
            else { await addDoc(collection(db, "students"), payload); }

            Swal.fire('সফল!', 'তথ্য সংরক্ষিত হয়েছে', 'success');
            e.target.reset();
            document.querySelector('[data-sec="list-sec"]').click();
        } catch (err) { Swal.fire('Error', err.message, 'error'); }
        btn.disabled = false;
    };

    function startEdit(s) {
        editId = s.id;
        document.getElementById('formTitle').innerText = "তথ্য সংশোধন - " + s.name;
        document.getElementById('name').value = s.name;
        document.getElementById('roll').value = s.roll;
        document.getElementById('className').value = s.className;
        document.getElementById('gender').value = s.gender;
        document.getElementById('dob').value = s.dob;
        document.getElementById('birthReg').value = s.birthReg || "";
        document.getElementById('fName').value = s.fName || "";
        document.getElementById('fNid').value = s.fNid || "";
        document.getElementById('fDob').value = s.fDob || "";
        document.getElementById('fMobile').value = s.fMobile || "";
        document.getElementById('mName').value = s.mName || "";
        document.getElementById('mNid').value = s.mNid || "";
        document.getElementById('mDob').value = s.mDob || "";
        document.getElementById('mMobile').value = s.mMobile || "";
        document.querySelector('[data-sec="entry-sec"]').click();
    }

    async function deleteStu(id) {
        const res = await Swal.fire({ title: 'নিশ্চিত তো?', text: "ডিলিট করলে তথ্য আর ফিরে পাওয়া যাবে না!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
        if(res.isConfirmed) await deleteDoc(doc(db, "students", id));
    }


    // এই ফাংশনটি শুধু একবার রান করবেন টেস্ট করার জন্য
async function addDemoData() {
    const demoStudents = [
        { name: "আরিফ রহমান", roll: 1, className: "৫ম", gender: "ছাত্র", dob: "2012-05-10", fName: "মোঃ রহমান", fMobile: "01711000000", mName: "রাহেলা বেগম", photo: "" },
        { name: "সুমাইয়া আক্তার", roll: 2, className: "৫ম", gender: "ছাত্রী", dob: "2013-02-15", fName: "আব্দুল করিম", fMobile: "01811000000", mName: "ফাতেমা খাতুন", photo: "" },
        { name: "হাসান মাহমুদ", roll: 1, className: "১ম", gender: "ছাত্র", dob: "2018-11-20", fName: "জহির উদ্দিন", fMobile: "01911000000", mName: "নাজমা বেগম", photo: "" },
        { name: "আয়েশা সিদ্দিকা", roll: 5, className: "৩য়", gender: "ছাত্রী", dob: "2015-08-12", fName: "কামাল হোসেন", fMobile: "01511000000", mName: "শিরিন আক্তার", photo: "" },
        { name: "তামিম ইকবাল", roll: 3, className: "প্রাক", gender: "ছাত্র", dob: "2020-01-05", fName: "শফিক আহমেদ", fMobile: "01311000000", mName: "পারভীন বেগম", photo: "" }
    ];

    for (let s of demoStudents) {
        await addDoc(collection(db, "students"), s);
    }
    Swal.fire('অভিনন্দন!', '৫টি ডেমো ডেটা সফলভাবে যোগ হয়েছে।', 'success');
}

// এটি কল করতে ব্রাউজার কনসোলে লিখুন: addDemoData() 
// অথবা টেম্পোরারি একটি বাটনে সেট করুন।
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি | ডাটাবেস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: radial-gradient(circle at top right, #1e293b, #0a0f1d);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #22d3ee;
        }

        .light-mode {
            --bg-body: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --accent: #0891b2;
        }

        body { 
            font-family: 'SolaimanLipi', sans-serif; 
            background: var(--bg-body);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--border); 
            border-radius: 20px;
        }

        .tab-active { 
            background: var(--accent) !important; 
            color: #fff !important; 
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); 
        }

        input, select { 
            background: rgba(0, 0, 0, 0.05) !important; 
            border: 1px solid var(--border) !important; 
            color: inherit !important;
            padding: 12px; 
            border-radius: 12px; 
            outline: none;
        }

        #viewModal { display: none; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b no-print px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="/logo.svg" alt="Logo" class="h-10 filter drop-shadow-md">
                <div>
                    <h1 class="text-sm md:text-lg font-black tracking-tighter text-cyan-500 leading-tight">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা</h1>
                    <p class="text-[9px] md:text-[10px] uppercase opacity-60 font-bold">সরকারি প্রাথমিক বিদ‌্যালয়</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2 glass rounded-full hover:scale-110 transition-transform">
                    <i id="themeIcon" data-lucide="moon" size="18"></i>
                </button>
                <button id="logoutBtn" class="hidden text-rose-500 p-2"><i data-lucide="log-out"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[80vh] flex items-center justify-center p-4 no-print">
        <div class="glass p-10 w-full max-w-md text-center shadow-2xl">
            <div class="flex justify-center mb-6 text-cyan-500"><i data-lucide="shield-check" size="48"></i></div>
            <h2 class="text-2xl font-black mb-2 uppercase tracking-tighter text-cyan-500">অ্যাডমিন অ্যাক্সেস</h2>
            <p class="text-xs opacity-60 mb-8 font-bold italic">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল আইডি" class="w-full">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="w-full">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-bold hover:bg-cyan-500 transition-all">লগইন করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto py-8">
        <div class="flex justify-center mb-8 gap-2 no-print">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-8 py-2 glass text-xs font-bold tab-active">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-8 py-2 glass text-xs font-bold opacity-60">নতুন এন্ট্রি</button>
        </div>

        <div id="viewTab" class="space-y-8">
            <div class="relative max-w-md mx-auto no-print">
                <i data-lucide="search" class="absolute left-4 top-3.5 text-slate-400" size="18"></i>
                <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="w-full pl-12 glass shadow-lg">
            </div>
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="entryTab" class="hidden glass p-8 max-w-4xl mx-auto no-print">
            <form id="studentForm" class="space-y-6">
                <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                <div class="flex flex-col md:flex-row gap-6 items-center border-b border-white/5 pb-6">
                    <div class="w-32 h-32 glass rounded-3xl border-2 border-dashed border-slate-500 flex items-center justify-center overflow-hidden relative">
                        <img id="imagePreview" class="hidden w-full h-full object-cover">
                        <div id="imgPlaceholder" class="text-center text-[10px] opacity-50"><i data-lucide="camera" class="mx-auto mb-1"></i> ছবি দিন</div>
                        <input type="file" id="stPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" required>
                        <div class="flex gap-2">
                            <select id="class" class="flex-1" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option>
                                <option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option>
                                <option value="৫ম">৫ম শ্রেণি</option>
                            </select>
                            <input type="number" id="roll" placeholder="রোল" class="w-24" required>
                        </div>
                        <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর">
                        <input type="date" id="dob" title="জন্ম তারিখ">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-5 glass space-y-3 bg-cyan-500/5">
                        <p class="text-cyan-500 text-[10px] font-black uppercase tracking-widest">পিতার তথ্য</p>
                        <input type="text" id="fName" placeholder="পিতার নাম" class="w-full">
                        <input type="text" id="fMobile" placeholder="মোবাইল নম্বর" class="w-full">
                        <input type="text" id="fNid" placeholder="পিতার NID" class="w-full">
                        <input type="date" id="fDob" class="w-full" title="পিতার জন্ম তারিখ">
                    </div>
                    <div class="p-5 glass space-y-3 bg-rose-500/5">
                        <p class="text-rose-500 text-[10px] font-black uppercase tracking-widest">মাতার তথ্য</p>
                        <input type="text" id="mName" placeholder="মাতার নাম" class="w-full">
                        <input type="text" id="mMobile" placeholder="মোবাইল নম্বর" class="w-full">
                        <input type="text" id="mNid" placeholder="মাতার NID" class="w-full">
                        <input type="date" id="mDob" class="w-full" title="মাতার জন্ম তারিখ">
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg hover:bg-cyan-500 transition-all">ডাটা সেভ করুন</button>
            </form>
        </div>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm no-print">
        <div class="glass w-full max-w-lg p-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500"><i data-lucide="x-circle"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // থিম সুইচ
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            lucide.createIcons();
        };
        if(localStorage.getItem('theme') === 'light') toggleTheme();

        // অথেনটিকেশন চেক
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            }
        });

        // ট্যাব কন্ট্রোল
        window.switchTab = (id) => {
            document.getElementById('viewTab').classList.toggle('hidden', id !== 'viewTab');
            document.getElementById('entryTab').classList.toggle('hidden', id !== 'entryTab');
            document.getElementById('btnView').classList.toggle('tab-active', id === 'viewTab');
            document.getElementById('btnEntry').classList.toggle('tab-active', id === 'entryTab');
            document.getElementById('btnView').classList.toggle('opacity-60', id !== 'viewTab');
            document.getElementById('btnEntry').classList.toggle('opacity-60', id !== 'entryTab');
        };

        // ডাটা লোড
        function loadData(search = "") {
            onValue(ref(db, 'students'), (snap) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = "";
                const data = snap.val() || {};
                window.allData = data;
                
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const filtered = Object.keys(data).filter(id => 
                        data[id].className === cls && 
                        (data[id].name.toLowerCase().includes(search.toLowerCase()) || data[id].roll.toString().includes(search))
                    ).sort((a,b) => data[a].roll - data[b].roll);

                    if(filtered.length > 0) {
                        let html = `<div class="glass overflow-hidden"><div class="p-4 bg-white/5 border-b border-white/5 flex justify-between"><h3 class="font-black text-cyan-500">${cls} শ্রেণি</h3><span class="text-[10px] opacity-50">${filtered.length} জন</span></div><div class="divide-y divide-white/5">`;
                        filtered.forEach(id => {
                            html += `<div class="p-4 flex justify-between items-center hover:bg-white/5"><div><p class="text-[10px] text-cyan-500 font-bold">রোল: ${data[id].roll}</p><p class="font-bold text-sm">${data[id].name}</p></div><div class="flex gap-2"><button onclick="viewRec('${id}')" class="text-cyan-500 p-2"><i data-lucide="eye" size="16"></i></button><button onclick="editRec('${id}')" class="text-emerald-500 p-2"><i data-lucide="edit-3" size="16"></i></button></div></div>`;
                        });
                        container.innerHTML += html + `</div></div>`;
                        lucide.createIcons();
                    }
                });
            });
        }

        // ফুল ডাটা ভিউ মোডাল
        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col items-center gap-3 mb-6">
                    <img src="${s.photo || ''}" class="w-24 h-24 rounded-2xl border-2 border-cyan-500/20 object-cover shadow-xl">
                    <div class="text-center">
                        <h2 class="text-xl font-black">${s.name}</h2>
                        <p class="text-cyan-500 font-bold text-[10px] uppercase">${s.className} শ্রেণি | রোল: ${s.roll}</p>
                    </div>
                </div>
                <div class="space-y-4 text-xs">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="p-3 glass bg-black/20"><p class="opacity-50 text-[9px] uppercase">জন্ম নিবন্ধন</p><p class="font-bold">${s.birthReg || '---'}</p></div>
                        <div class="p-3 glass bg-black/20"><p class="opacity-50 text-[9px] uppercase">জন্ম তারিখ</p><p class="font-bold">${s.dob || '---'}</p></div>
                    </div>
                    <div class="p-4 glass bg-cyan-500/5">
                        <p class="text-cyan-500 font-black mb-2 flex items-center gap-1"><i data-lucide="user" size="12"></i> পিতার তথ্য</p>
                        <div class="grid grid-cols-2 gap-y-2">
                            <div><p class="opacity-50 text-[9px]">নাম</p><p class="font-bold">${s.fName || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">মোবাইল</p><p class="font-bold">${s.fMobile || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">NID</p><p class="font-bold">${s.fNid || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">জন্ম তারিখ</p><p class="font-bold">${s.fDob || '---'}</p></div>
                        </div>
                    </div>
                    <div class="p-4 glass bg-rose-500/5">
                        <p class="text-rose-500 font-black mb-2 flex items-center gap-1"><i data-lucide="user-round" size="12"></i> মাতার তথ্য</p>
                        <div class="grid grid-cols-2 gap-y-2">
                            <div><p class="opacity-50 text-[9px]">নাম</p><p class="font-bold">${s.mName || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">মোবাইল</p><p class="font-bold">${s.mMobile || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">NID</p><p class="font-bold">${s.mNid || '---'}</p></div>
                            <div><p class="opacity-50 text-[9px]">জন্ম তারিখ</p><p class="font-bold">${s.mDob || '---'}</p></div>
                        </div>
                    </div>
                </div>
                <button onclick="window.print()" class="w-full mt-6 bg-slate-800 py-3 rounded-xl font-bold flex items-center justify-center gap-2"><i data-lucide="printer" size="14"></i> প্রিন্ট</button>
            `;
            document.getElementById('viewModal').style.display = 'flex';
            lucide.createIcons();
        };

        window.closeModal = () => document.getElementById('viewModal').style.display = 'none';

        // ডাটা সেভ এবং ইমেজ হ্যান্ডলিং (আগের ফাংশনগুলো অপরিবর্তিত)
        document.getElementById('stPhoto').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    let side = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-side)/2, (img.height-side)/2, side, side, 0, 0, 200, 200);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoBase64').value = b64;
                    document.getElementById('imagePreview').src = b64;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('imgPlaceholder').classList.add('hidden');
                }
                img.src = ev.target.result;
            }
            reader.readAsDataURL(file);
        });

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const student = {
                name: document.getElementById('stName').value, roll: document.getElementById('roll').value,
                className: document.getElementById('class').value, photo: document.getElementById('photoBase64').value,
                birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value,
                fName: document.getElementById('fName').value, fMobile: document.getElementById('fMobile').value,
                fNid: document.getElementById('fNid').value, fDob: document.getElementById('fDob').value,
                mName: document.getElementById('mName').value, mMobile: document.getElementById('mMobile').value,
                mNid: document.getElementById('mNid').value, mDob: document.getElementById('mDob').value
            };
            set(id ? ref(db, `students/${id}`) : push(ref(db, 'students')), student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('imgPlaceholder').classList.remove('hidden');
                document.getElementById('editKey').value = "";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('photoBase64').value = s.photo || "";
            document.getElementById('birthReg').value = s.birthReg || "";
            document.getElementById('fName').value = s.fName || "";
            document.getElementById('fNid').value = s.fNid || "";
            document.getElementById('mName').value = s.mName || "";
            document.getElementById('mNid').value = s.mNid || "";
            if(s.photo) { document.getElementById('imagePreview').src = s.photo; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgPlaceholder').classList.add('hidden'); }
            switchTab('entryTab');
        };

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(e => alert("ভুল ইমেইল বা পাসওয়ার্ড!"));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
        lucide.createIcons();
    </script>
</body>
</html>

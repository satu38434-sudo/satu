<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass { background: white; border: 1px solid #e2e8f0; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; width: 100%; } }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 bg-blue-50 z-[1000] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-600">
            <h2 class="text-2xl font-bold text-center text-blue-800 mb-6">স্কুল ম্যানেজমেন্ট লগইন</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল আইডি" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">প্রবেশ করুন</button>
            </form>
        </div>
    </div>

    <header class="glass sticky top-0 z-50 p-4 no-print shadow-sm mb-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg md:text-xl font-bold text-blue-700 leading-tight">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</h1>
            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow hover:bg-red-600 transition">লগআউট</button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl">
        <div class="flex flex-wrap gap-2 mb-6 no-print">
            <button onclick="showTab('entry')" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl shadow-md text-sm font-bold">📝 নতুন এন্ট্রি</button>
            <button onclick="showTab('list')" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl shadow-md text-sm font-bold">📋 শিক্ষার্থীর তালিকা</button>
            <button onclick="showTab('attendance')" class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl shadow-md text-sm font-bold">✅ হাজিরা নিন</button>
            <button onclick="showTab('report')" class="px-5 py-2.5 bg-emerald-600 text-white rounded-xl shadow-md text-sm font-bold">📊 রিপোর্ট</button>
        </div>

        <section id="entry" class="tab-content active-tab glass p-6 rounded-2xl shadow-sm">
            <h2 id="formTitle" class="text-xl font-bold mb-6 text-blue-800 border-b pb-2">শিক্ষার্থী ভর্তি ফরম</h2>
            <form id="studentForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <input type="hidden" id="editSid">
                <div class="col-span-full flex flex-col items-center p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                    <input type="file" id="photoInput" accept="image/*" onchange="processImage(event)" class="text-xs">
                    <img id="photoPreview" src="https://via.placeholder.com/150" class="mt-4 w-32 h-32 rounded-lg border-4 border-white shadow-md object-cover">
                    <canvas id="photoCanvas" class="hidden"></canvas>
                </div>
                
                <input type="text" id="stdName" placeholder="শিক্ষার্থীর নাম" class="p-3 border rounded-xl" required>
                <input type="text" id="stdRoll" placeholder="রোল নম্বর" inputmode="numeric" class="p-3 border rounded-xl" required>
                <input type="date" id="stdDOB" class="p-3 border rounded-xl" onchange="updateAgeDisplay(this.value)">
                <select id="stdClass" class="p-3 border rounded-xl">
                    <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                    <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option>
                    <option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option><option value="৫ম">৫ম শ্রেণি</option>
                </select>
                <input type="text" id="fatherPhone" placeholder="অভিভাবকের মোবাইল" inputmode="numeric" class="p-3 border rounded-xl">
                
                <div class="col-span-full flex gap-2">
                    <button type="submit" id="saveBtn" class="flex-1 bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700">তথ্য সংরক্ষণ করুন</button>
                    <button type="button" id="cancelEdit" class="hidden px-6 bg-slate-400 text-white rounded-xl font-bold" onclick="resetForm()">বাতিল</button>
                </div>
            </form>
        </section>

        <section id="list" class="tab-content glass p-6 rounded-2xl shadow-sm">
            <h2 class="text-xl font-bold mb-6">সকল শিক্ষার্থীর তালিকা</h2>
            <div id="studentCardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="attendance" class="tab-content glass p-6 rounded-2xl shadow-sm">
            <div class="max-w-md mx-auto no-print text-center">
                <input type="date" id="attDate" class="w-full p-4 border rounded-xl mb-4 text-center text-lg font-bold">
                <button onclick="startAttendanceFlow()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg">হাজিরা শুরু করুন</button>
            </div>
            <div id="attendanceArea" class="hidden mt-8 max-w-2xl mx-auto">
                <h3 id="attClassLabel" class="text-center font-bold text-2xl p-4 bg-indigo-50 text-indigo-800 rounded-2xl mb-6"></h3>
                <div id="attendanceList" class="space-y-3"></div>
            </div>
        </section>

        <section id="report" class="tab-content glass p-6 rounded-2xl shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 no-print">
                <div class="p-5 bg-blue-50 rounded-2xl border border-blue-100">
                    <label class="block font-bold mb-2">দৈনিক হাজিরা রিপোর্ট</label>
                    <input type="date" id="repDailyDate" class="w-full p-3 border rounded-xl mb-3">
                    <button onclick="generateDailyReport()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">রিপোর্ট দেখুন</button>
                </div>
                <div class="p-5 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <label class="block font-bold mb-2">মাসিক হাজিরা রিপোর্ট</label>
                    <div class="flex gap-2 mb-3">
                        <select id="repMonth" class="flex-1 p-3 border rounded-xl">
                            <option value="01">জানুয়ারি</option><option value="02">ফেব্রুয়ারি</option>
                            <option value="03">মার্চ</option><option value="04">এপ্রিল</option>
                            <option value="05">মে</option><option value="06">জুন</option>
                            <option value="07">জুলাই</option><option value="08">আগস্ট</option>
                            <option value="09">সেপ্টেম্বর</option><option value="10">অক্টোবর</option>
                            <option value="11">নভেম্বর</option><option value="12">ডিসেম্বর</option>
                        </select>
                        <select id="repYear" class="p-3 border rounded-xl">
                            <option value="2024">২০২৪</option><option value="2025">২০২৫</option><option value="2026" selected>২০২৬</option>
                        </select>
                    </div>
                    <button onclick="generateMonthlyReport()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">রিপোর্ট দেখুন</button>
                </div>
            </div>
            <div id="reportArea" class="bg-white p-8 rounded-xl shadow-inner print-area min-h-[300px]"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com",
            projectId: "my-school-database",
            storageBucket: "my-school-database.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let students = {};
        const CLASSES = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
        let currentClassIdx = 0;

        // AUTH FIX
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginOverlay').classList.add('hidden');
                fetchStudents();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
                .catch(() => alert("ভুল ইমেইল বা পাসওয়ার্ড!"));
        };

        document.getElementById('logoutBtn').onclick = () => { if(confirm("লগআউট করতে চান?")) signOut(auth); };

        function fetchStudents() {
            onValue(ref(db, 'students'), (snap) => {
                students = snap.val() || {};
                renderCards();
            });
        }

        // VISIBLE EDIT/DELETE BUTTONS
        function renderCards() {
            const container = document.getElementById('studentCardContainer');
            container.innerHTML = "";
            const list = Object.values(students).sort((a,b) => parseInt(a.roll) - parseInt(b.roll));
            
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border shadow-sm flex flex-col gap-4";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${s.photo || 'https://via.placeholder.com/80'}" class="w-16 h-16 rounded-full border-2 border-blue-100 object-cover">
                        <div>
                            <h4 class="font-bold text-lg text-slate-800">${s.name}</h4>
                            <p class="text-sm text-blue-600 font-bold">${s.class} | রোল: ${toBen(s.roll)}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 no-print">
                        <button onclick="editStudent('${s.id}')" class="flex-1 bg-blue-50 text-blue-700 py-2 rounded-lg font-bold hover:bg-blue-100 transition">✏️ এডিট</button>
                        <button onclick="deleteStudent('${s.id}')" class="flex-1 bg-red-50 text-red-600 py-2 rounded-lg font-bold hover:bg-red-100 transition">🗑️ মুছুন</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // EDIT & DELETE FUNCTIONS
        window.editStudent = (id) => {
            const s = students[id];
            document.getElementById('editSid').value = s.id;
            document.getElementById('stdName').value = s.name;
            document.getElementById('stdRoll').value = s.roll;
            document.getElementById('stdDOB').value = s.dob || "";
            document.getElementById('stdClass').value = s.class;
            document.getElementById('fatherPhone').value = s.fatherPhone || "";
            document.getElementById('photoPreview').src = s.photo || "https://via.placeholder.com/150";
            window.compressedImage = s.photo || "";
            
            document.getElementById('formTitle').innerText = "শিক্ষার্থীর তথ্য এডিট";
            document.getElementById('saveBtn').innerText = "আপডেট তথ্য সেভ করুন";
            document.getElementById('cancelEdit').classList.remove('hidden');
            showTab('entry');
            window.scrollTo(0,0);
        };

        window.deleteStudent = (id) => {
            if(confirm("আপনি কি নিশ্চিতভাবে এই শিক্ষার্থীর তথ্য ডিলিট করতে চান?")) {
                remove(ref(db, `students/${id}`)).then(() => alert("ডিলিট হয়েছে।"));
            }
        };

        window.resetForm = () => {
            document.getElementById('studentForm').reset();
            document.getElementById('editSid').value = "";
            document.getElementById('formTitle').innerText = "শিক্ষার্থী ভর্তি ফরম";
            document.getElementById('saveBtn').innerText = "তথ্য সংরক্ষণ করুন";
            document.getElementById('cancelEdit').classList.add('hidden');
            document.getElementById('photoPreview').src = "https://via.placeholder.com/150";
            window.compressedImage = "";
        };

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault();
            const sid = document.getElementById('editSid').value || Date.now().toString();
            const data = {
                id: sid,
                name: document.getElementById('stdName').value,
                roll: document.getElementById('stdRoll').value,
                dob: document.getElementById('stdDOB').value,
                class: document.getElementById('stdClass').value,
                fatherPhone: document.getElementById('fatherPhone').value,
                photo: window.compressedImage || ""
            };
            set(ref(db, `students/${sid}`), data).then(() => {
                alert("সফলভাবে সেভ হয়েছে!");
                resetForm();
                showTab('list');
            });
        };

        // ATTENDANCE LOGIC
        window.startAttendanceFlow = () => {
            if(!document.getElementById('attDate').value) return alert("তারিখ বাছুন!");
            currentClassIdx = 0; 
            renderAtt();
        };

        function renderAtt() {
            const cls = CLASSES[currentClassIdx];
            document.getElementById('attendanceArea').classList.remove('hidden');
            document.getElementById('attClassLabel').innerText = `শ্রেণি: ${cls}`;
            const list = Object.values(students).filter(s => s.class === cls).sort((a,b)=>parseInt(a.roll)-parseInt(b.roll));
            
            const listArea = document.getElementById('attendanceList');
            listArea.innerHTML = list.length ? list.map(s => `
                <div class="flex justify-between bg-white p-4 rounded-xl border-2 hover:border-indigo-200 transition items-center shadow-sm">
                    <span class="font-bold text-slate-700">${toBen(s.roll)}. ${s.name}</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="att-check sr-only peer" data-id="${s.id}" checked>
                        <div class="w-14 h-7 bg-red-100 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-500"></div>
                    </label>
                </div>`).join('') : '<p class="text-center py-10 text-slate-400">এই শ্রেণিতে কোনো শিক্ষার্থী নেই।</p>';
            
            listArea.innerHTML += `<button onclick="saveAtt()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl mt-8 font-bold shadow-lg">পরবর্তী শ্রেণি →</button>`;
        }

        window.saveAtt = () => {
            const date = document.getElementById('attDate').value;
            const cls = CLASSES[currentClassIdx];
            const data = {};
            document.querySelectorAll('.att-check').forEach(c => data[c.dataset.id] = c.checked ? "present" : "absent");
            
            update(ref(db, `attendance/${date}/${cls}`), data).then(() => {
                if(currentClassIdx < CLASSES.length-1) { currentClassIdx++; renderAtt(); window.scrollTo(0,0); }
                else { alert("সব শ্রেণির হাজিরা সম্পন্ন!"); document.getElementById('attendanceArea').classList.add('hidden'); }
            });
        };

        // FIXED REPORTS
        window.generateDailyReport = () => {
            const date = document.getElementById('repDailyDate').value;
            if(!date) return alert("তারিখ দিন");
            onValue(ref(db, `attendance/${date}`), (snap) => {
                const data = snap.val() || {};
                let html = `<div class="text-center mb-8"><h2 class="text-2xl font-bold">দৈনিক হাজিরা রিপোর্ট</h2><p class="text-slate-500">তারিখ: ${toBen(date)}</p></div>
                            <table class="w-full border-collapse border border-slate-300">
                            <tr class="bg-slate-100">
                                <th class="border border-slate-300 p-2">শ্রেণি</th><th class="border border-slate-300 p-2">মোট</th><th class="border border-slate-300 p-2">উপস্থিত</th>
                            </tr>`;
                CLASSES.forEach(c => {
                    const total = Object.values(students).filter(s => s.class === c).length;
                    const pres = Object.values(data[c] || {}).filter(v => v === "present").length;
                    html += `<tr class="text-center font-semibold">
                                <td class="border border-slate-300 p-3">${c}</td>
                                <td class="border border-slate-300 p-3">${toBen(total)}</td>
                                <td class="border border-slate-300 p-3 text-green-600">${toBen(pres)}</td>
                            </tr>`;
                });
                document.getElementById('reportArea').innerHTML = html + `</table><button onclick="window.print()" class="no-print mt-8 w-full bg-slate-800 text-white py-3 rounded-xl font-bold">প্রিন্ট কপি</button>`;
            });
        };

        window.generateMonthlyReport = () => {
            const month = document.getElementById('repMonth').value;
            const year = document.getElementById('repYear').value;
            const target = `${year}-${month}`; // YYYY-MM
            
            get(ref(db, `attendance`)).then((snap) => {
                const all = snap.val() || {};
                const dates = Object.keys(all).filter(d => d.startsWith(target));
                if(dates.length === 0) return alert("এই মাসের কোনো ডাটা পাওয়া যায়নি।");

                let html = `<div class="text-center mb-6"><h2 class="text-xl font-bold">মাসিক উপস্থিতি হার: ${toBen(target)}</h2></div>
                            <table class="w-full border text-sm"><tr class="bg-slate-50 font-bold">
                            <th class="border p-2">নাম (রোল)</th><th class="border p-2">শ্রেণি</th><th class="border p-2">উপস্থিতি হার (%)</th></tr>`;
                
                Object.values(students).sort((a,b)=>a.class.localeCompare(b.class) || a.roll-b.roll).forEach(s => {
                    let pCount = 0;
                    dates.forEach(d => { if((all[d][s.class] || {})[s.id] === "present") pCount++; });
                    const rate = ((pCount/dates.length)*100).toFixed(1);
                    html += `<tr><td class="border p-2">${s.name} (${toBen(s.roll)})</td><td class="border p-2 text-center">${s.class}</td><td class="border p-2 text-center font-bold text-blue-700">${toBen(rate)}%</td></tr>`;
                });
                document.getElementById('reportArea').innerHTML = html + `</table><button onclick="window.print()" class="no-print mt-6 w-full bg-slate-800 text-white py-3 rounded-xl font-bold">প্রিন্ট মাসিক রিপোর্ট</button>`;
            });
        };

    </script>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        }
        function toBen(n) { return n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : ""; }
        function processImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('photoCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200; canvas.height = 200;
                    ctx.drawImage(img, 0, 0, 200, 200);
                    window.compressedImage = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoPreview').src = window.compressedImage;
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(file);
        }
        function updateAgeDisplay(d) { /* Optional Logic */ }
    </script>
</body>
</html>

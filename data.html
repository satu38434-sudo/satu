<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .student-card { border-left: 4px solid #2563eb; transition: 0.2s; }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; width: 100%; } }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 bg-blue-50 z-[1000] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
            <h2 class="text-2xl font-bold text-center text-blue-800 mb-6">স্কুল ম্যানেজমেন্ট লগইন</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল আইডি" class="w-full p-3 border rounded-lg outline-none" required>
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" class="w-full p-3 border rounded-lg outline-none" required>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">প্রবেশ করুন</button>
            </form>
        </div>
    </div>

    <header class="glass sticky top-0 z-50 p-4 shadow-sm no-print mb-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold text-blue-700">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</h1>
            <div class="flex items-center gap-4">
                <span id="userGreeting" class="text-xs font-semibold"></span>
                <button id="logoutBtn" class="bg-red-500 text-white px-3 py-1 rounded text-xs">লগআউট</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl">
        <div class="flex flex-wrap gap-2 mb-6 no-print">
            <button onclick="showTab('entry')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">📝 তথ্য সংরক্ষণ</button>
            <button onclick="showTab('list')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">📋 শিক্ষার্থীর তালিকা</button>
            <button onclick="showTab('attendance')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">✅ হাজিরা</button>
            <button onclick="showTab('report')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">📊 রিপোর্ট</button>
        </div>

        <section id="entry" class="tab-content active-tab glass p-6 rounded-2xl shadow-lg">
            <h2 id="formTitle" class="text-xl font-bold mb-6 text-blue-800 border-b pb-2">নতুন শিক্ষার্থী ভর্তি ফরম</h2>
            <form id="studentForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="editSid">
                <div class="col-span-full flex flex-col items-center p-4 bg-blue-50 rounded-xl">
                    <input type="file" id="photoInput" accept="image/*" onchange="processImage(event)" class="text-xs">
                    <img id="photoPreview" src="https://via.placeholder.com/150" class="mt-4 w-32 h-32 rounded border shadow object-cover">
                    <canvas id="photoCanvas" class="hidden"></canvas>
                </div>
                <div class="space-y-4">
                    <input type="text" id="stdName" placeholder="শিক্ষার্থীর নাম" class="w-full p-2 border rounded" required>
                    <input type="text" id="stdRoll" placeholder="রোল নম্বর" inputmode="numeric" class="w-full p-2 border rounded">
                    <input type="date" id="stdDOB" class="w-full p-2 border rounded" onchange="updateAgeDisplay(this.value)">
                    <p id="ageDisplay" class="text-xs font-bold text-blue-500"></p>
                    <select id="stdClass" class="w-full p-2 border rounded">
                        <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                        <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option>
                        <option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option><option value="৫ম">৫ম শ্রেণি</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <input type="text" id="fatherName" placeholder="পিতার নাম" class="w-full p-2 border rounded">
                    <input type="text" id="fatherPhone" placeholder="পিতার মোবাইল" inputmode="numeric" class="w-full p-2 border rounded">
                </div>
                <div class="space-y-4">
                    <input type="text" id="motherName" placeholder="মাতার নাম" class="w-full p-2 border rounded">
                    <input type="text" id="motherPhone" placeholder="মাতার মোবাইল" inputmode="numeric" class="w-full p-2 border rounded">
                </div>
                <button type="submit" id="saveBtn" class="col-span-full bg-green-600 text-white py-3 rounded-xl font-bold">তথ্য সংরক্ষণ করুন</button>
                <button type="button" id="cancelEdit" class="hidden col-span-full bg-gray-500 text-white py-2 rounded-xl" onclick="resetForm()">বাতিল করুন</button>
            </form>
        </section>

        <section id="list" class="tab-content glass p-6 rounded-2xl shadow-lg">
            <h2 class="text-xl font-bold mb-6">শিক্ষার্থী তালিকা</h2>
            <div id="studentCardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="attendance" class="tab-content glass p-6 rounded-2xl shadow-lg">
            <input type="date" id="attDate" class="w-full p-3 border rounded-lg mb-4">
            <button onclick="startAttendanceFlow()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">হাজিরা শুরু করুন</button>
            <div id="attendanceArea" class="hidden mt-8">
                <h3 id="attClassLabel" class="text-center font-bold text-xl p-3 bg-indigo-50 rounded-lg mb-4"></h3>
                <div id="attendanceList" class="space-y-2"></div>
            </div>
        </section>

        <section id="report" class="tab-content glass p-6 rounded-2xl shadow-lg">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="p-4 bg-orange-50 rounded-xl">
                    <label class="block text-xs font-bold mb-1">দৈনিক রিপোর্ট:</label>
                    <input type="date" id="repDailyDate" class="w-full p-2 border rounded mb-2">
                    <button onclick="generateDailyReport()" class="w-full bg-blue-600 text-white py-2 rounded">দেখুন</button>
                </div>
                <div class="p-4 bg-purple-50 rounded-xl">
                    <label class="block text-xs font-bold mb-1">মাসিক রিপোর্ট:</label>
                    <input type="month" id="repMonthDate" class="w-full p-2 border rounded mb-2">
                    <button onclick="generateMonthlyReport()" class="w-full bg-purple-600 text-white py-2 rounded">দেখুন</button>
                </div>
            </div>
            <div id="reportArea" class="bg-white p-4 rounded shadow print-area min-h-[200px]"></div>
        </section>
    </main>

    <div id="profileModal" class="fixed inset-0 bg-black/80 z-[2000] hidden flex items-center justify-center p-4">
        <div id="profileContent" class="w-full max-w-2xl"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com",
            projectId: "my-school-database",
            storageBucket: "my-school-database.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let students = {};
        const CLASSES = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
        let currentClassIdx = 0;

        // AUTH FIX
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('userGreeting').innerText = "ইউজার: " + user.email.split('@')[0];
                fetchStudents();
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
                .catch(() => alert("ভুল ইমেইল বা পাসওয়ার্ড!"));
        };

        document.getElementById('logoutBtn').onclick = () => {
            if(confirm("লগআউট করতে চান?")) signOut(auth);
        };

        // STUDENT DATA
        function fetchStudents() {
            onValue(ref(db, 'students'), (snap) => {
                students = snap.val() || {};
                renderCards();
            });
        }

        function renderCards() {
            const container = document.getElementById('studentCardContainer');
            container.innerHTML = "";
            Object.values(students).sort((a,b)=>a.roll-b.roll).forEach(s => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm student-card flex items-center gap-4 relative">
                        <img src="${s.photo || 'https://via.placeholder.com/80'}" class="w-14 h-14 rounded-full border object-cover">
                        <div class="flex-1">
                            <h4 class="font-bold text-blue-900">${s.name}</h4>
                            <p class="text-xs text-gray-500">রোল: ${toBen(s.roll)} | ${s.class}</p>
                        </div>
                        <button onclick="toggleActionMenu('${s.id}')" class="p-2 text-gray-400">⋮</button>
                        <div id="menu-${s.id}" class="hidden absolute right-2 top-10 bg-white border shadow-lg rounded z-10 w-28 text-sm">
                            <button onclick="viewProfile('${s.id}')" class="block w-full p-2 text-left hover:bg-gray-100">👁️ দেখুন</button>
                            <button onclick="editStudent('${s.id}')" class="block w-full p-2 text-left hover:bg-gray-100 text-blue-600">✏️ এডিট</button>
                            <button onclick="deleteStudent('${s.id}')" class="block w-full p-2 text-left hover:bg-red-50 text-red-600">🗑️ মুছুন</button>
                        </div>
                    </div>`;
            });
        }

        // EDIT LOGIC
        window.editStudent = (id) => {
            const s = students[id];
            document.getElementById('editSid').value = s.id;
            document.getElementById('stdName').value = s.name;
            document.getElementById('stdRoll').value = s.roll;
            document.getElementById('stdDOB').value = s.dob;
            document.getElementById('stdClass').value = s.class;
            document.getElementById('fatherName').value = s.fatherName || '';
            document.getElementById('fatherPhone').value = s.fatherPhone || '';
            document.getElementById('motherName').value = s.motherName || '';
            document.getElementById('motherPhone').value = s.motherPhone || '';
            document.getElementById('photoPreview').src = s.photo || "https://via.placeholder.com/150";
            window.compressedImage = s.photo;
            
            document.getElementById('formTitle').innerText = "শিক্ষার্থীর তথ্য এডিট";
            document.getElementById('saveBtn').innerText = "আপডেট করুন";
            document.getElementById('cancelEdit').classList.remove('hidden');
            showTab('entry');
            window.toggleActionMenu(id);
        };

        window.resetForm = () => {
            document.getElementById('studentForm').reset();
            document.getElementById('editSid').value = "";
            document.getElementById('formTitle').innerText = "নতুন শিক্ষার্থী ভর্তি ফরম";
            document.getElementById('saveBtn').innerText = "তথ্য সংরক্ষণ করুন";
            document.getElementById('cancelEdit').classList.add('hidden');
            document.getElementById('photoPreview').src = "https://via.placeholder.com/150";
            window.compressedImage = "";
        };

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault();
            const sid = document.getElementById('editSid').value || Date.now().toString();
            const data = {
                id: sid,
                name: document.getElementById('stdName').value,
                roll: document.getElementById('stdRoll').value,
                dob: document.getElementById('stdDOB').value,
                class: document.getElementById('stdClass').value,
                fatherName: document.getElementById('fatherName').value,
                fatherPhone: document.getElementById('fatherPhone').value,
                motherName: document.getElementById('motherName').value,
                motherPhone: document.getElementById('motherPhone').value,
                photo: window.compressedImage || ""
            };
            set(ref(db, `students/${sid}`), data).then(() => {
                alert("সফলভাবে সংরক্ষিত!");
                resetForm();
                showTab('list');
            });
        };

        // Other Functions
        window.deleteStudent = (id) => { if(confirm("মুছতে চান?")) remove(ref(db, `students/${id}`)); };
        window.toggleActionMenu = (id) => {
            document.querySelectorAll('[id^="menu-"]').forEach(m => m.id !== `menu-${id}` && m.classList.add('hidden'));
            document.getElementById(`menu-${id}`).classList.toggle('hidden');
        };

        // Attendance Step
        window.startAttendanceFlow = () => {
            if(!document.getElementById('attDate').value) return alert("তারিখ দিন!");
            currentClassIdx = 0; renderAtt();
        };
        function renderAtt() {
            const cls = CLASSES[currentClassIdx];
            document.getElementById('attendanceArea').classList.remove('hidden');
            document.getElementById('attClassLabel').innerText = `শ্রেণি: ${cls}`;
            const list = Object.values(students).filter(s => s.class === cls).sort((a,b)=>a.roll-b.roll);
            document.getElementById('attendanceList').innerHTML = list.map(s => `
                <div class="flex justify-between bg-white p-3 rounded border-l-4 border-blue-400 items-center">
                    <span>${toBen(s.roll)}. ${s.name}</span>
                    <input type="checkbox" class="att-check w-6 h-6" data-id="${s.id}" checked>
                </div>`).join('') + `<button onclick="saveAtt()" class="w-full bg-blue-600 text-white py-3 rounded mt-4">সেভ ও পরবর্তী</button>`;
        }
        window.saveAtt = () => {
            const date = document.getElementById('attDate').value;
            const cls = CLASSES[currentClassIdx];
            const data = {};
            document.querySelectorAll('.att-check').forEach(c => data[c.dataset.id] = c.checked ? "present" : "absent");
            set(ref(db, `attendance/${date}/${cls}`), data).then(() => {
                if(currentClassIdx < CLASSES.length-1) { currentClassIdx++; renderAtt(); window.scrollTo(0,0); }
                else { alert("সব শ্রেণির হাজিরা শেষ!"); document.getElementById('attendanceArea').classList.add('hidden'); }
            });
        };

        // Reports
        window.generateDailyReport = () => {
            const date = document.getElementById('repDailyDate').value;
            if(!date) return;
            onValue(ref(db, `attendance/${date}`), (snap) => {
                const data = snap.val() || {};
                let h = `<h3 class="text-center font-bold mb-4">ডেইলি রিপোর্ট: ${toBen(date)}</h3><table class="w-full border text-sm"><tr><th class="border p-1">শ্রেণি</th><th class="border p-1">মোট</th><th class="border p-1">উপস্থিত</th></tr>`;
                CLASSES.forEach(c => {
                    const t = Object.values(students).filter(s => s.class === c).length;
                    const p = Object.values(data[c] || {}).filter(v => v === "present").length;
                    h += `<tr class="text-center"><td class="border p-1">${c}</td><td class="border p-1">${toBen(t)}</td><td class="border p-1">${toBen(p)}</td></tr>`;
                });
                document.getElementById('reportArea').innerHTML = h + `</table><button onclick="window.print()" class="no-print mt-4 w-full bg-gray-700 text-white py-2 rounded">প্রিন্ট</button>`;
            });
        };

        window.generateMonthlyReport = () => {
            const month = document.getElementById('repMonthDate').value; // format YYYY-MM
            if(!month) return alert("মাস সিলেক্ট করুন");
            onValue(ref(db, `attendance`), (snap) => {
                const all = snap.val() || {};
                const dates = Object.keys(all).filter(d => d.startsWith(month));
                let h = `<h3 class="text-center font-bold mb-4">মাসিক রিপোর্ট: ${toBen(month)}</h3><table class="w-full border text-xs"><tr><th class="border p-1">নাম (রোল)</th><th class="border p-1">হাজিরা (%)</th></tr>`;
                Object.values(students).sort((a,b)=>a.roll-b.roll).forEach(s => {
                    let p = 0; dates.forEach(d => { if((all[d][s.class] || {})[s.id] === "present") p++; });
                    const rate = dates.length ? ((p/dates.length)*100).toFixed(1) : 0;
                    h += `<tr><td class="border p-1">${s.name} (${toBen(s.roll)})</td><td class="border p-1 text-center">${toBen(rate)}%</td></tr>`;
                });
                document.getElementById('reportArea').innerHTML = h + `</table><button onclick="window.print()" class="no-print mt-4 w-full bg-gray-700 text-white py-2 rounded">প্রিন্ট</button>`;
            });
        };

        window.viewProfile = (id) => {
            const s = students[id];
            document.getElementById('profileContent').innerHTML = `
                <div class="bg-white p-6 rounded-xl relative">
                    <button onclick="closeModal()" class="absolute right-4 top-4 text-xl">✕</button>
                    <div class="flex flex-col items-center border-b pb-4 mb-4">
                        <img src="${s.photo || ''}" class="w-32 h-32 rounded border mb-2 object-cover">
                        <h2 class="text-xl font-bold">${s.name}</h2>
                        <p>${s.class} | রোল: ${toBen(s.roll)}</p>
                    </div>
                    <div class="space-y-2 text-sm">
                        <p><b>পিতা:</b> ${s.fatherName}</p><p><b>মোবাইল:</b> ${toBen(s.fatherPhone)}</p>
                        <p><b>মাতা:</b> ${s.motherName}</p><p><b>মোবাইল:</b> ${toBen(s.motherPhone)}</p>
                        <p><b>জন্ম তারিখ:</b> ${toBen(s.dob)}</p>
                    </div>
                </div>`;
            document.getElementById('profileModal').classList.remove('hidden');
            window.toggleActionMenu(id);
        };
        window.closeModal = () => document.getElementById('profileModal').classList.add('hidden');
    </script>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        }
        function toBen(n) { return n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : ""; }
        function updateAgeDisplay(d) {
            if(!d) return;
            const age = new Date().getFullYear() - new Date(d).getFullYear();
            document.getElementById('ageDisplay').innerText = `বয়স: ${toBen(age)} বছর (আনুমানিক)`;
        }
        function processImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('photoCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200; canvas.height = 200;
                    ctx.drawImage(img, 0, 0, 200, 200);
                    window.compressedImage = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoPreview').src = window.compressedImage;
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>

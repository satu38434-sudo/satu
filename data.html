<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Manager | Multi-Role Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Siyam Rupali', 'Hind Siliguri', sans-serif; 
            background-color: #f8fafc; 
            letter-spacing: 0.2px; 
        }

        .tab-active { 
            background: #2563eb !important; 
            color: white !important; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }

        .student-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0; 
            background: white;
            position: relative;
        }

        .student-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
            border-color: #3b82f6; 
        }

        /* মোডাল স্ক্রলবার */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center bg-[#0f172a] px-4">
        <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[40px] w-full max-w-md border border-white/10 shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-2xl shadow-lg">🎓</div>
            <h2 class="text-2xl font-black text-white mb-8 italic uppercase tracking-widest">SMS Secure Login</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="w-full p-4 rounded-2xl bg-white/5 text-white outline-none border border-white/10 focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="w-full p-4 rounded-2xl bg-white/5 text-white outline-none border border-white/10 focus:ring-2 focus:ring-blue-500">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black transition-all">লগইন করুন</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="font-black text-slate-800 hidden sm:block">SMS DASHBOARD</h1>
                <div class="flex bg-slate-100 p-1 rounded-2xl">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active">ম্যানেজমেন্ট</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500">নতুন এন্ট্রি</button>
                </div>
                <button id="logoutBtn" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold text-xs">লগ আউট</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-8">
            <div id="statusGrid" class="no-print grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white p-6 rounded-[30px] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">মোট শিক্ষার্থী</p>
                    <h3 id="totalStudents" class="text-3xl font-black text-slate-800">0</h3>
                </div>
                <div class="bg-blue-600 p-6 rounded-[30px] shadow-lg shadow-blue-500/20">
                    <p class="text-[10px] font-bold text-blue-100 uppercase mb-1">আপনার পদবি</p>
                    <h3 id="roleText" class="text-white font-black text-lg italic tracking-tighter">CHECKING...</h3>
                </div>
            </div>

            <div id="entryTab" class="hidden no-print">
                <div class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-2xl border border-slate-100 overflow-hidden">
                    <form id="studentForm" class="p-8 md:p-12">
                        <input type="hidden" id="editKey">
                        <h2 class="text-xl font-black text-slate-800 mb-8 border-l-4 border-blue-600 pl-4 uppercase">স্টুডেন্ট ডাটা এন্ট্রি</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">শিক্ষার্থীর নাম</label>
                                <input type="text" id="stName" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">শ্রেণি</label>
                                <select id="class" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold">
                                    <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                    <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option><option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option><option value="৫ম">৫ম শ্রেণি</option>
                                </select>
                            </div>
                            <input type="number" id="roll" placeholder="রোল" class="p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                            <input type="text" id="birthReg" maxlength="17" placeholder="জন্ম নিবন্ধন" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold" required>
                            <input type="date" id="dob" class="p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            <input type="text" id="mobile" maxlength="11" placeholder="মোবাইল নম্বর" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold" required>
                            <input type="file" id="photoFile" accept="image/*" class="p-4 bg-slate-50 rounded-2xl outline-none text-xs">
                            <input type="hidden" id="base64Photo">
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-xl hover:bg-blue-600 transition-all uppercase">তথ্য সংরক্ষণ করুন</button>
                    </form>
                </div>
            </div>

            <div id="viewTab">
                <div class="flex flex-col md:flex-row gap-6 justify-between items-center mb-10">
                    <h2 class="text-2xl font-black text-slate-800 italic uppercase">Records</h2>
                    <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="w-full md:w-80 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>
                <div id="studentContainer" class="space-y-12"></div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md">
        <div class="bg-white w-full max-w-xl rounded-[40px] flex flex-col shadow-2xl overflow-hidden max-h-[90vh]">
            <div id="modalContent" class="p-8 md:p-12 overflow-y-auto flex-1 custom-scroll bg-white">
                </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">প্রিন্ট</button>
                <button onclick="closeModal()" class="flex-1 bg-white border border-slate-200 py-4 rounded-2xl font-black text-slate-400 active:scale-95 transition-all">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUserRole = "teacher"; 

        const calculateAge = (dob) => {
            if(!dob) return "N/A";
            const birth = new Date(dob);
            const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if(d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if(m < 0) { y--; m += 12; }
            return `${y} বছর ${m} মাস ${d} দিন`;
        };

        window.switchTab = (tabId) => {
            document.getElementById('entryTab').classList.add('hidden');
            document.getElementById('viewTab').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btnView').className = tabId === 'viewTab' ? 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active' : 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500';
            document.getElementById('btnEntry').className = tabId === 'entryTab' ? 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active' : 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500';
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');

                // রোল ভিত্তিক পরিচয় নির্ধারণ
                onValue(ref(db, `roles/${user.uid}`), (snapshot) => {
                    currentUserRole = snapshot.val() || "teacher";
                    const roleText = document.getElementById('roleText');
                    
                    if(currentUserRole === "admin") {
                        roleText.innerText = "প্রশাসক (ADMIN)";
                    } else if(currentUserRole === "head_teacher") {
                        roleText.innerText = "প্রধান শিক্ষক (HEAD)";
                    } else {
                        roleText.innerText = "সহকারী শিক্ষক (TEACHER)";
                    }
                    loadData();
                });
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(() => alert('লগইন ব্যর্থ!'));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function loadData(searchTerm = "") {
            onValue(ref(db, 'students'), (snapshot) => {
                const container = document.getElementById('studentContainer');
                container.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;
                document.getElementById('totalStudents').innerText = Object.keys(data).length;

                const classes = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
                classes.forEach(cls => {
                    const filtered = Object.keys(data).filter(id => {
                        const s = data[id];
                        const match = s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.roll.toString().includes(searchTerm);
                        return s.className === cls && match;
                    });

                    if (filtered.length > 0) {
                        const section = document.createElement('div');
                        section.innerHTML = `<div class="flex items-center gap-4 mb-6"><span class="bg-slate-900 text-white px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest">${cls}</span><div class="h-[1px] flex-1 bg-slate-200"></div></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>`;
                        const grid = section.querySelector('div:last-child');
                        filtered.forEach(id => {
                            const s = data[id];
                            grid.innerHTML += `
                                <div class="student-card p-6 rounded-[32px] flex flex-col items-center text-center">
                                    <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-20 h-20 rounded-full border-4 border-white shadow-xl mb-4 object-cover">
                                    <h3 class="font-bold text-slate-800 mb-1">${s.name}</h3>
                                    <div class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">রোল: ${s.roll}</div>
                                    <div class="text-[9px] font-bold text-slate-400 mt-2 italic">${calculateAge(s.dob)}</div>
                                    <div class="flex gap-2 w-full mt-6">
                                        <button onclick="viewRec('${id}')" class="flex-1 bg-slate-50 text-slate-600 py-2.5 rounded-xl text-[10px] font-black">VIEW</button>
                                        <button onclick="editRec('${id}')" class="flex-1 bg-blue-50 text-blue-600 py-2.5 rounded-xl text-[10px] font-black">EDIT</button>
                                        ${currentUserRole === 'admin' ? `<button onclick="deleteRec('${id}')" class="bg-red-50 text-red-400 p-2.5 rounded-xl hover:bg-red-500 hover:text-white transition-all font-bold">DEL</button>` : ''}
                                    </div>
                                </div>`;
                        });
                        container.appendChild(section);
                    }
                });
            });
        }

        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col items-center text-center mb-8">
                    <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-[35px] shadow-2xl mb-4 object-cover">
                    <h2 class="text-xl font-black text-slate-800">${s.name}</h2>
                    <p class="text-blue-600 font-black uppercase text-[10px] tracking-widest">${s.className} | রোল: ${s.roll}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-slate-50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-slate-400 mb-1">জন্ম নিবন্ধন</p><p class="text-sm font-black tracking-widest">${s.birthReg}</p></div>
                    <div class="bg-blue-50/50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-blue-400 mb-1">পিতা</p><p class="text-xs font-bold">${s.father || 'N/A'}</p></div>
                    <div class="bg-pink-50/50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-pink-400 mb-1">মাতা</p><p class="text-xs font-bold">${s.mother || 'N/A'}</p></div>
                    <div class="col-span-2 bg-green-50 p-5 rounded-3xl flex justify-between items-center">
                        <div><p class="text-[9px] font-black text-green-600 uppercase">মোবাইল</p><p class="text-lg font-black">${s.mobile}</p></div>
                        <div class="text-right"><p class="text-[9px] font-black text-slate-400 uppercase">বয়স</p><p class="text-xs font-black text-blue-600">${calculateAge(s.dob)}</p></div>
                    </div>
                    <div class="col-span-2 text-center pt-2"><p class="text-[8px] font-bold text-slate-300 italic uppercase">Entry By: ${s.creatorEmail || 'System'}</p></div>
                </div>
            `;
            document.getElementById('viewModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const user = auth.currentUser;
            const student = {
                name: document.getElementById('stName').value, 
                roll: document.getElementById('roll').value,
                className: document.getElementById('class').value, 
                birthReg: document.getElementById('birthReg').value,
                dob: document.getElementById('dob').value, 
                mobile: document.getElementById('mobile').value,
                photo: document.getElementById('base64Photo').value,
                creatorEmail: id ? window.allData[id].creatorEmail : user.email
            };
            const saveRef = id ? ref(db, `students/${id}`) : push(ref(db, 'students'));
            set(saveRef, student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('editKey').value = "";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob;
            document.getElementById('mobile').value = s.mobile;
            document.getElementById('base64Photo').value = s.photo || "";
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { 
            if(currentUserRole === 'admin' && confirm("মুছে ফেলতে চান?")) {
                remove(ref(db, `students/${id}`)).catch(() => alert("অনুমতি নেই!"));
            }
        };

        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
/* লগইন সেকশনের বিশেষ স্টাইল */
#login-sec {
    padding: 40px 30px;
    border: none;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    background: #ffffff;
    transition: transform 0.3s ease;
}

#login-sec h3 {
    font-size: 24px;
    margin-bottom: 25px;
    color: var(--dark);
    padding-left: 0; /* ডিফল্ট প্যাডিং সরানোর জন্য */
}

#login-sec input {
    margin-bottom: 15px;
    border: 1.5px solid #e2e8f0;
    padding: 12px;
    transition: all 0.3s ease;
}

#login-sec button {
    margin-top: 10px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    transition: all 0.3s ease;
}

#login-sec button:hover {
    background: var(--dark) !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
}

#login-sec .school-logo {
    font-size: 50px;
    color: var(--primary);
    margin-bottom: 15px;
}
    .student-form-container {
        max-width: auto;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #f9f9f9;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }



    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); /* অটোমেটিক কলাম তৈরি হবে */
        gap: 15px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box; 
        font-size: 14px;
    }

    input:focus, select:focus {
        border-color: #4CAF50;
        outline: none;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }
        
        :root { --primary: #10b981; --bg: #f1f5f9; --dark: #065f46; }
        body { font-family: 'Kalpurush', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        

        .table-box { 
            width: 100%; 
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1100px; 
            background: white;
        }
        th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #eee; color: #64748b; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; white-space: nowrap; } 

        .tab-nav { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-family: 'Kalpurush'; background: #ddd; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-family: 'Kalpurush'; box-sizing: border-box; }
        
        .icon-btn { width: 38px; height: 38px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin: 2px; transition: 0.2s; }
        .btn-view { background: #e0f2fe; color: #0369a1; }
        .btn-edit { background: #ecfdf5; color: #059669; }
        .btn-del { background: #fff1f2; color: #e11d48; }
        
        .hidden { display: none !important; }
        .charts-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        canvas { max-height: 280px; width: 100% !important; }
        h3 { color: var(--dark); padding-left: 10px; margin-top: 30px; }

  #picInp {
     display: inline-block;
    padding: 5px 10px;
    cursor: pointer;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
  }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--dark)">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</h2>

   <div id="login-sec" class="card" style="max-width:400px; margin: 80px auto; text-align:center">
    <h3>লগইন</h3>
    
    <div style="position: relative; margin-bottom: 5px;">
        <span class="material-icons" style="position: absolute; left: 10px; top: 11px; color: #94a3b8; font-size: 20px;">email</span>
        <input type="email" id="loginEmail" autocomplete="off" placeholder="আপনার ইমেইল" style="padding-left: 40px;">
    </div>

    <div style="position: relative; margin-bottom: 5px;">
        <span class="material-icons" style="position: absolute; left: 10px; top: 11px; color: #94a3b8; font-size: 20px;">lock</span>
        <input type="password" id="loginPass" autocomplete="new-password" placeholder="পাসওয়ার্ড" style="padding-left: 40px;">
    </div>

    <button onclick="handleLogin()" style="width:50%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px">লগইন করুন</button>
    
</div>

    <div id="main-content" class="hidden">
        <div style="text-align: right; margin-bottom: 15px;">
            <button onclick="handleLogout()" style="background:#64748b; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; display: inline-flex; align-items: center; gap: 5px;"><span class="material-icons" style="font-size:18px">logout</span> লগ আউট</button>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="openTab('dash', event)"><span class="material-icons">dashboard</span> ড্যাশবোর্ড</button>
            <button class="tab-btn" onclick="openTab('entry', event)"><span class="material-icons">person_add</span> নতুন তথ্য যোগ করুন</button>
            <button class="tab-btn" onclick="openTab('list', event)"><span class="material-icons">list_alt</span> শিক্ষার্থী তালিকা</button>
        </div>

        <div id="dash-sec" class="card">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; text-align:center">
                <div style="background:#f8fafc; padding:10px; border-radius:10px"><span>মোট</span><h2 id="tCount" style="margin:5px 0">0</h2></div>
                <div style="background:#eff6ff; padding:10px; border-radius:10px; color:#3b82f6"><span>ছাত্র</span><h2 id="bCount" style="margin:5px 0">0</h2></div>
                <div style="background:#fdf2f8; padding:10px; border-radius:10px; color:#ec4899"><span>ছাত্রী</span><h2 id="gCount" style="margin:5px 0">0</h2></div>
            </div>
            <div class="charts-wrapper">
                <div style="text-align:center"><h4>লিঙ্গ অনুপাত</h4><canvas id="genderChart"></canvas></div>
                <div style="text-align:center"><h4>বয়স ভিত্তিক বিন্যাস</h4><canvas id="ageChart"></canvas></div>
            </div>
        </div>

        <div id="entry-sec" class="card hidden">
                            <div style="margin-top:15px; background:#f8fafc; padding:15px; border-radius:10px; border:1px dashed #ccc">
                    <label>শিক্ষার্থীর ছবি: </label>
                    <input type="file" id="picInp" accept="image/*">
                </div>
            <form id="stuForm">
<div class="student-form-container">
    <h3>শিক্ষার্থীর ব্যক্তিগত তথ্য</h3>
    <div class="form-grid">
        <input type="text" id="name" placeholder="নাম" required>
        <select id="className">
            <option value="" disabled selected>শ্রেণি নির্বাচন করুন</option>
            <option>প্রাক</option><option>১ম</option><option>২য়</option><option>৩য়</option><option>৪র্থ</option><option>৫ম</option>
        </select>
        <input type="number" id="roll" placeholder="রোল" required>
        <input type="number" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর">
        <input type="date" id="dob" title="শিক্ষার্থীর জন্ম তারিখ">
        <select id="gender">
            <option value="" disabled selected>লিঙ্গ</option>
            <option>ছাত্র</option><option>ছাত্রী</option>
        </select>
        <select id="blood">
            <option value="" disabled selected>রক্তের গ্রুপ</option>
            <option>অজানা</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option>
        </select>
    </div>
    </div>
              <div class="student-form-container">
                <h3>পিতা ও মাতার তথ্য</h3>
                <div class="form-grid">
                    <input type="text" id="fName" placeholder="পিতার নাম">
                    <input type="number" id="fNid" placeholder="পিতার NID">
                     <input type="date" id="fDob" title="পিতার জন্ম তারিখ">
                    <input type="tel" id="fMobile" placeholder="পিতার মোবাইল">
                    <input type="text" id="mName" placeholder="মাতার নাম">
                    <input type="number" id="mNid" placeholder="মাতার NID">
                    <input type="date" id="mDob" title="মাতার জন্ম তারিখ">
                    <input type="tel" id="mMobile" placeholder="মাতার মোবাইল">
                    
                </div>
                </div>
                <center><button type="submit" id="saveBtn" style="width:30%; padding:16px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; margin-top:25px; font-weight:bold; font-size:18px">তথ্য সংরক্ষণ করুন</button></center>
            </form>
        </div>

        <div id="list-sec" class="card hidden">
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0;">
    <div style="flex: 2; min-width: 200px; position: relative;">
        <span class="material-icons" style="position: absolute; left: 10px; top: 10px; color: #94a3b8;">search</span>
        <input type="text" id="searchInput" placeholder="নাম বা রোল দিয়ে খুঁজুন..." 
               onkeyup="filterList()" style="padding-left: 40px; border: 1px solid #cbd5e1;">
    </div>
    
    <div style="flex: 1; min-width: 150px;">
        <select id="classFilter" onchange="filterList()" style="border: 1px solid #cbd5e1; background: white;">
            <option value="">সব শ্রেণি (ফিল্টার)</option>
            <option>প্রাক</option>
            <option>১ম</option>
            <option>২য়</option>
            <option>৩য়</option>
            <option>৪র্থ</option>
            <option>৫ম</option>
        </select>
    </div>
</div>
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>ছবি</th>
                            <th>নাম ও রোল</th>
                            <th>শ্রেণি</th>
                            <th>লিঙ্গ</th>
                            <th>জন্ম নিবন্ধন</th>
                            <th>পিতার নাম</th>
                            <th>মোবাইল</th>
                            <th style="text-align:right">ক্রিয়া</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <p style="text-align:center; color:#94a3b8; font-size:12px; margin-top:10px">ডানে-বামে স্ক্রল করে সব তথ্য দেখুন</p>
        </div>
    </div>
</div>

<script type="module">
    window.filterList = () => {
    const searchText = document.getElementById('searchInput').value.toLowerCase();
    const selectedClass = document.getElementById('classFilter').value;
    const rows = document.querySelectorAll('#tableBody tr');

    rows.forEach(row => {
        // row.cells[1] এ নাম ও রোল আছে, row.cells[2] এ শ্রেণি আছে
        const studentInfo = row.cells[1].innerText.toLowerCase(); 
        const studentClass = row.cells[2].innerText; 
        
        const matchesSearch = studentInfo.includes(searchText);
        const matchesClass = (selectedClass === "") || (studentClass === selectedClass);

        // দুই শর্তই পূরণ হলে রো-টি দেখাবে, নাহলে হাইড করবে
        if (matchesSearch && matchesClass) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
};
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_UID = "MwpHepH5wSPqDF4B3hXKjek4vtq2";

    let allData = [], editId = null, gChart = null, aChart = null;

    window.handleLogin = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (err) { Swal.fire('ভুল!', 'সঠিক ইমেইল বা পাসওয়ার্ড দিন', 'error'); }
    };
   window.handleLogout = () => {
    signOut(auth).then(() => {
        // লগআউট হওয়ার পর ইনপুট ফিল্ডগুলো ম্যানুয়ালি খালি করা
        document.getElementById('loginEmail').value = "";
        document.getElementById('loginPass').value = "";
        
        // সব কার্ড হাইড করে লগইন সেকশন দেখানো
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('login-sec').classList.remove('hidden');
    });
};
    window.openTab = (tab, event) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => { if(c.id !== 'login-sec') c.classList.add('hidden') });
        if(event) event.currentTarget.classList.add('active');
        document.getElementById(tab + '-sec').classList.remove('hidden');
        if(tab === 'entry' && !editId) { document.getElementById('stuForm').reset(); document.getElementById('saveBtn').innerText = "তথ্য সংরক্ষণ করুন"; }
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('login-sec').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            onSnapshot(query(collection(db, "students"), orderBy("className"), orderBy("roll")), snap => {
                allData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI();
            });
        } else {
            document.getElementById('login-sec').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    function updateUI() {
        const body = document.getElementById('tableBody'); body.innerHTML = '';
        let counts = { 'ছাত্র': 0, 'ছাত্রী': 0 };
        let ageDist = {}; for(let i=4; i<=16; i++) ageDist[i + " বছর"] = 0;
        const currentUid = auth.currentUser ? auth.currentUser.uid : "";

        allData.forEach(s => {
            counts[s.gender || 'ছাত্র']++;
            if(s.dob) {
                const age = new Date().getFullYear() - new Date(s.dob).getFullYear();
                if(ageDist[age + " বছর"] !== undefined) ageDist[age + " বছর"]++;
            }

            const delBtn = (currentUid === ADMIN_UID) 
                ? `<button class="icon-btn btn-del" onclick="deleteData('${s.id}')"><span class="material-icons">delete</span></button>` 
                : "";

            body.innerHTML += `
                <tr>
                    <td><img src="${s.photo || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:8px; object-fit:cover; border:1px solid #ddd"></td>
                    <td><b>${s.name}</b><br><small>রোল: ${s.roll}</small></td>
                    <td>${s.className}</td>
                    <td>${s.gender}</td>
                    <td>${s.birthReg || '-'}</td>
                    <td>${s.fName || '-'}</td>
                    <td>${s.fMobile || '-'}</td>
                    <td style="text-align:right">
                        <button class="icon-btn btn-view" onclick="viewData('${s.id}')"><span class="material-icons">visibility</span></button>
                        <button class="icon-btn btn-edit" onclick="editData('${s.id}')"><span class="material-icons">edit</span></button>
                        ${delBtn}
                    </td>
                </tr>`;
        });
        document.getElementById('tCount').innerText = allData.length;
        document.getElementById('bCount').innerText = counts['ছাত্র'];
        document.getElementById('gCount').innerText = counts['ছাত্রী'];
        renderCharts(counts, ageDist);
    }

    function renderCharts(c, ageData) {
        if(gChart) gChart.destroy();
        gChart = new Chart(document.getElementById('genderChart'), {
            type: 'doughnut',
            data: { labels: ['ছাত্র', 'ছাত্রী'], datasets: [{ data: [c['ছাত্র'], c['ছাত্রী']], backgroundColor: ['#3b82f6', '#ec4899'] }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
        if(aChart) aChart.destroy();
        aChart = new Chart(document.getElementById('ageChart'), {
            type: 'bar',
            data: { labels: Object.keys(ageData), datasets: [{ label: 'শিক্ষার্থী', data: Object.values(ageData), backgroundColor: '#10b981' }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.viewData = (id) => {
        const s = allData.find(x => x.id === id);
        Swal.fire({
            title: s.name,
            html: `
                <div style="text-align:left; font-size:14px; line-height:1.8; color:#333">
                    <center><img src="${s.photo || ''}" style="width:120px; border-radius:10px; margin-bottom:15px; border:2px solid #eee"></center>
                    <div style="background:#f8fafc; padding:10px; border-radius:8px">
                        <b>শ্রেণি:</b> ${s.className} | <b>রোল:</b> ${s.roll}<br>
                         <b>জন্ম নিবন্ধন:</b> ${s.birthReg || '-'}<br>
                        <b>জন্ম তারিখ:</b> ${s.dob || '-'}<br>
                        <b>রক্তের গ্রুপ:</b> ${s.blood || 'অজানা'}<br>
                    </div>
                    <div style="margin-top:10px; padding:10px; border:1px solid #eee; border-radius:8px">
                        <b style="color:var(--dark)">অভিভাবকের তথ্য:</b><br>
                        <b>পিতার নাম:</b> ${s.fName || '-'}<br>
                        <b>পিতার NID:</b> ${s.fNid || '-'}<br>
                        <b>পিতার জন্ম তারিখ:</b> ${s.fDob || '-'}<br>
                        <b>মাতার নাম:</b> ${s.mName || '-'}<br>
                        <b>মাতার NID:</b> ${s.mNid || '-'}<br>
                        <b>মাতার জন্ম তারিখ:</b> ${s.mDob || '-'}<br>
                        <b>মোবাইল:</b> ${s.fMobile || '-'}
                    </div>
                </div>`,
            confirmButtonColor: '#10b981',
            confirmButtonText: 'ঠিক আছে'
        });
    };

    window.editData = (id) => {
        const s = allData.find(x => x.id === id);
        editId = id;
        document.getElementById('name').value = s.name;
        document.getElementById('className').value = s.className;
        document.getElementById('roll').value = s.roll;
        document.getElementById('birthReg').value = s.birthReg || '';
        document.getElementById('dob').value = s.dob || '';
        document.getElementById('gender').value = s.gender;
        document.getElementById('blood').value = s.blood || 'অজানা';
        document.getElementById('fName').value = s.fName || '';
        document.getElementById('fNid').value = s.fNid || '';
        document.getElementById('fMobile').value = s.fMobile || '';
        document.getElementById('fDob').value = s.fDob || '';
        document.getElementById('mName').value = s.mName || '';
        document.getElementById('mNid').value = s.mNid || '';
        document.getElementById('mMobile').value = s.mMobile || '';
        document.getElementById('mDob').value = s.mDob || '';
        document.getElementById('saveBtn').innerText = "তথ্য হালনাগাদ করুন";
        openTab('entry');
    };

    window.deleteData = async (id) => {
        if(auth.currentUser.uid !== ADMIN_UID) return Swal.fire('অনুমতি নেই', 'অ্যাডমিন ছাড়া সম্ভব নয়', 'error');
        const res = await Swal.fire({title:'নিশ্চিত?', text:'এটি চিরতরে মুছে যাবে!', icon:'warning', showCancelButton:true, confirmButtonColor:'#e11d48'});
        if(res.isConfirmed) { await deleteDoc(doc(db, "students", id)); Swal.fire('সফল', 'মুছে ফেলা হয়েছে', 'success'); }
    };

    async function resizeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    document.getElementById('stuForm').onsubmit = async (e) => {
        e.preventDefault();
        Swal.fire({title: 'সংরক্ষণ করা হচ্ছে...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        let pic = editId ? allData.find(x => x.id === editId).photo : "";
        const file = document.getElementById('picInp').files[0];
        if(file) pic = await resizeImage(file);
        
        const data = {
            name: document.getElementById('name').value, roll: parseInt(document.getElementById('roll').value), className: document.getElementById('className').value,
            birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value, gender: document.getElementById('gender').value, blood: document.getElementById('blood').value,
            fName: document.getElementById('fName').value, fNid: document.getElementById('fNid').value, fMobile: document.getElementById('fMobile').value, fDob: document.getElementById('fDob').value,
            mName: document.getElementById('mName').value, mNid: document.getElementById('mNid').value, mMobile: document.getElementById('mMobile').value, mDob: document.getElementById('mDob').value,
            photo: pic
        };

        try {
            if(editId) { await updateDoc(doc(db, "students", editId), data); editId = null; } 
            else { await addDoc(collection(db, "students"), data); }
            e.target.reset(); Swal.fire('সফল', 'ডাটাবেস হালনাগাদ হয়েছে', 'success'); openTab('list');
        } catch (err) { Swal.fire('এরর', 'সংরক্ষণ করা যায়নি!', 'error'); }
    };
</script>
</body>
</html>

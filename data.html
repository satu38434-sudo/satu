<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Kalpurush', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* ট্যাব বাটন */
        .tab-nav { display: flex; gap: 5px; }
        .tab-btn { padding: 12px 25px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; font-family: 'Kalpurush'; background: #ddd; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* টেবিল */
        .table-box { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        /* গ্রিড */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-family: 'Kalpurush'; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Kalpurush'; margin-left: 5px; }
        .btn-view { background: #e0f2fe; color: #0369a1; }
        .btn-edit { background: #ecfdf5; color: #059669; }
        .btn-del { background: #fff1f2; color: #e11d48; }
        
        .hidden { display: none; }
        .charts-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        canvas { max-height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#065f46">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</h2>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="openTab('dash')">📊 ড্যাশবোর্ড</button>
        <button class="tab-btn" onclick="openTab('entry')">➕ নতুন তথ্য যোগ</button>
        <button class="tab-btn" onclick="openTab('list')">📋 শিক্ষার্থী তালিকা</button>
    </div>

    <div id="dash-sec" class="card">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:20px; text-align:center">
            <div style="background:#f8fafc; padding:20px; border-radius:12px"><span>মোট শিক্ষার্থী</span><h2 id="tCount">0</h2></div>
            <div style="background:#eff6ff; padding:20px; border-radius:12px; color:#3b82f6"><span>ছাত্র</span><h2 id="bCount">0</h2></div>
            <div style="background:#fdf2f8; padding:20px; border-radius:12px; color:#ec4899"><span>ছাত্রী</span><h2 id="gCount">0</h2></div>
        </div>
        
        <div class="charts-wrapper">
            <div style="text-align:center"><h4>লিঙ্গ অনুপাত</h4><canvas id="genderChart"></canvas></div>
            <div style="text-align:center"><h4>বয়স ভিত্তিক বিন্যাস</h4><canvas id="ageChart"></canvas></div>
        </div>
    </div>

    <div id="entry-sec" class="card hidden">
         <div style="margin-top:10px">
                <label>ছবি নির্বাচন করুন: </label><input type="file" id="picInp" accept="image/*">
        <form id="stuForm">
            <h3>শিক্ষার্থীর ব্যক্তিগত তথ্য</h3>
            <div class="form-grid">
                <input type="text" id="name" placeholder="নাম" required>
                <select id="className"><option>প্রাক</option><option>১ম</option><option>২য়</option><option>৩য়</option><option>৪র্থ</option><option>৫ম</option></select>
                <input type="number" id="roll" placeholder="রোল" required></p>
                <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর">
                <input type="date" id="dob" title="শিক্ষার্থীর জন্ম তারিখ">
                <select id="gender"><option>ছাত্র</option><option>ছাত্রী</option></select>
                <select id="blood"><option>অজানা</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option></select>
            </div>
            <h3>পিতা ও মাতার তথ্য</h3>
            <div class="form-grid">
                <input type="text" id="fName" placeholder="পিতার নাম">
                <input type="text" id="fNid" placeholder="পিতার NID">
                <input type="date" id="fDob" placeholder="পিতার জন্ম তারিখ">
                <input type="tel" id="fMobile" placeholder="পিতার মোবাইল"></p>
                <input type="text" id="mName" placeholder="মাতার নাম">
                <input type="text" id="mNid" placeholder="মাতার NID">
                <input type="date" id="mDob" placeholder="মাতার জন্ম তারিখ">
                <input type="tel" id="mMobile" placeholder="মাতার মোবাইল">
            </div>
            </div>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; margin-top:20px; font-weight:bold">তথ্য সেভ করুন</button>
        </form>
    </div>

    <div id="list-sec" class="card hidden">
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>নাম</th>
                        <th>শ্রেণি</th>
                        <th>রোল</th>
                        <th>জন্ম নিবন্ধন</th>
                        <th>পিতার নাম</th>
                        <th>মাতার নাম</th>
                        <th style="text-align:right">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_UID = "MwpHepH5wSPqDF4B3hXKjek4vtq2";
    let allData = [], editId = null, gChart = null, aChart = null;

    window.openTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        event.target.classList.add('active');
        document.getElementById(tab + '-sec').classList.remove('hidden');
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(query(collection(db, "students"), orderBy("className"), orderBy("roll")), snap => {
                allData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI(user.uid);
            });
        }
    });

    function updateUI(uid) {
        const body = document.getElementById('tableBody'); body.innerHTML = '';
        let c = { ছাত্র: 0, ছাত্রী: 0 };
        let ageDist = {}; for(let i=5; i<=15; i++) ageDist[i + " বছর"] = 0;

        allData.forEach(s => {
            c[s.gender === 'ছাত্র' ? 'ছাত্র' : 'ছাত্রী']++;
            if(s.dob) {
                const age = new Date().getFullYear() - new Date(s.dob).getFullYear();
                if(ageDist[age + " বছর"] !== undefined) ageDist[age + " বছর"]++;
            }
            body.innerHTML += `
                <tr>
                    <td><b>${s.name}</b></td>
                    <td>${s.className}</td>
                    <td>${s.roll}</td>
                    <td>${s.birthReg || '-'}</td>
                    <td>${s.fName || '-'}</td>
                    <td>${s.mName || '-'}</td>
                    <td style="text-align:right">
                        <button class="btn btn-view" onclick="viewData('${s.id}')">ভিউ</button>
                        <button class="btn btn-edit" onclick="editData('${s.id}')">এডিট</button>
                        ${uid === ADMIN_UID ? `<button class="btn btn-del" onclick="deleteData('${s.id}')">ডিলিট</button>` : ''}
                    </td>
                </tr>`;
        });
        document.getElementById('tCount').innerText = allData.length;
        document.getElementById('bCount').innerText = c.ছাত্র;
        document.getElementById('gCount').innerText = c.ছাত্রী;
        renderCharts(c, ageDist);
    }

    function renderCharts(c, ageData) {
        // লিঙ্গ গ্রাফ
        if(gChart) gChart.destroy();
        gChart = new Chart(document.getElementById('genderChart'), {
            type: 'doughnut',
            data: { labels: ['ছাত্র', 'ছাত্রী'], datasets: [{ data: [c.ছাত্র, c.ছাত্রী], backgroundColor: ['#3b82f6', '#ec4899'] }] }
        });

        // বয়স গ্রাফ
        if(aChart) aChart.destroy();
        aChart = new Chart(document.getElementById('ageChart'), {
            type: 'bar',
            data: { labels: Object.keys(ageData), datasets: [{ label: 'শিক্ষার্থী সংখ্যা', data: Object.values(ageData), backgroundColor: '#10b981' }] },
            options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    window.viewData = (id) => {
        const s = allData.find(x => x.id === id);
        Swal.fire({
            title: s.name,
            html: `<div style="text-align:left; line-height:1.8">
                ${s.photo ? `<img src="${s.photo}" style="width:120px; border-radius:10px; border:1px solid #ddd"><br>` : ''}
                <b>রোল:</b> ${s.roll} | <b>শ্রেণি:</b> ${s.className}<br>
                <b>জন্ম নিবন্ধন:</b> ${s.birthReg || '-'}<br>
                <b>পিতার মোবাইল:</b> ${s.fMobile || '-'}<br>
                <b>মাতার মোবাইল:</b> ${s.mMobile || '-'}<br>
                <b>রক্তের গ্রুপ:</b> ${s.blood || 'অজানা'}
            </div>`,
            confirmButtonColor: '#10b981'
        });
    };

    window.editData = (id) => {
        const s = allData.find(x => x.id === id);
        editId = id;
        document.getElementById('name').value = s.name;
        document.getElementById('className').value = s.className;
        document.getElementById('roll').value = s.roll;
        document.getElementById('birthReg').value = s.birthReg || '';
        document.getElementById('fName').value = s.fName || '';
        document.getElementById('fNid').value = s.fNid || '';
        document.getElementById('fMobile').value = s.fMobile || '';
        document.getElementById('mName').value = s.mName || '';
        document.getElementById('mNid').value = s.mNid || '';
        document.getElementById('mMobile').value = s.mMobile || '';
        document.getElementById('gender').value = s.gender;
        document.getElementById('blood').value = s.blood;
        document.getElementById('dob').value = s.dob || '';
        openTab('entry');
    };

    window.deleteData = async (id) => {
        if((await Swal.fire({title:'মুছে ফেলবেন?', icon:'warning', showCancelButton:true, confirmButtonColor:'#e11d48'})).isConfirmed) await deleteDoc(doc(db, "students", id));
    };

    document.getElementById('stuForm').onsubmit = async (e) => {
        e.preventDefault();
        Swal.fire({title: 'সেভ হচ্ছে...', didOpen: () => Swal.showLoading()});
        
        let picBase64 = editId ? allData.find(x => x.id === editId).photo : "";
        const file = document.getElementById('picInp').files[0];
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            picBase64 = await new Promise(r => reader.onload = () => r(reader.result));
        }

        const data = {
            name: document.getElementById('name').value,
            roll: parseInt(document.getElementById('roll').value),
            className: document.getElementById('className').value,
            birthReg: document.getElementById('birthReg').value,
            fName: document.getElementById('fName').value,
            fNid: document.getElementById('fNid').value,
            fMobile: document.getElementById('fMobile').value,
            mName: document.getElementById('mName').value,
            mNid: document.getElementById('mNid').value,
            mMobile: document.getElementById('mMobile').value,
            gender: document.getElementById('gender').value,
            blood: document.getElementById('blood').value,
            dob: document.getElementById('dob').value,
            photo: picBase64
        };

        if(editId) await updateDoc(doc(db, "students", editId), data);
        else await addDoc(collection(db, "students"), data);
        
        editId = null;
        e.target.reset();
        Swal.fire('সফল', 'ডাটা সংরক্ষিত হয়েছে', 'success');
        openTab('list');
    };
</script>
</body>
</html>

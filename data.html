<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
        .tab-active { background: white; color: #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-radius: 12px; }
        .glass-login { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .student-photo { width: 70px; height: 70px; object-fit: cover; border-radius: 50%; border: 3px solid #e2e8f0; }
        .class-header { background: white; color: #1e293b; padding: 12px 20px; border-radius: 16px; font-weight: 700; margin-top: 25px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="glass-login p-10 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-3xl font-black text-white mb-8 italic">School Dashboard</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="w-full p-4 rounded-2xl bg-white/10 text-white outline-none focus:ring-2 focus:ring-blue-500 border border-white/10">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="w-full p-4 rounded-2xl bg-white/10 text-white outline-none focus:ring-2 focus:ring-blue-500 border border-white/10">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/30 transition-all">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print bg-slate-900 text-white p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="font-bold text-lg hidden md:block">SMS Portal</h1>
                <div class="flex bg-slate-800 p-1 rounded-15px rounded-xl">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 text-sm font-bold transition-all tab-active">ম্যানেজমেন্ট</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 text-sm font-bold transition-all">নতুন এন্ট্রি</button>
                </div>
                <button id="logoutBtn" class="text-red-400 text-xs font-bold uppercase hover:text-red-300">লগ আউট</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4 md:p-8">
            
            <div id="adminStats" class="hidden no-print grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-4 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Total</p>
                    <h4 id="totalStudents" class="text-xl font-black text-slate-800">0</h4>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Today</p>
                    <h4 id="todayEntries" class="text-xl font-black text-blue-600">0</h4>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Others</p>
                    <h4 id="othersEntries" class="text-xl font-black text-purple-600">0</h4>
                </div>
                <div id="userBadge" class="bg-blue-600 p-4 rounded-2xl shadow-sm text-center">
                    <p class="text-[10px] uppercase font-bold text-blue-200">Role</p>
                    <h4 id="roleText" class="text-sm font-black text-white uppercase">User</h4>
                </div>
            </div>

            <div id="entryTab" class="hidden no-print max-w-2xl mx-auto">
                <div class="bg-white p-8 rounded-3xl shadow-sm border">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">শিক্ষার্থী নিবন্ধন ফরম</h2>
                    <form id="studentForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="hidden" id="editKey">
                        <div class="md:col-span-2">
                            <label class="text-xs font-bold text-slate-500 ml-1">শিক্ষার্থীর নাম</label>
                            <input type="text" id="stName" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-none mt-1" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">রোল</label>
                            <input type="number" id="roll" class="w-full p-3 bg-slate-50 rounded-xl outline-none border-none mt-1" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">শ্রেণি</label>
                            <select id="class" class="w-full p-3 bg-slate-50 rounded-xl outline-none border-none mt-1" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম</option><option value="২য়">২য়</option><option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-xs font-bold text-slate-500 ml-1">জন্ম নিবন্ধন নম্বর (১৭ ডিজিট)</label>
                            <input type="text" id="birthReg" pattern="\d{17}" class="w-full p-3 bg-slate-50 rounded-xl outline-none border-none mt-1" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">জন্ম তারিখ</label>
                            <input type="date" id="dob" class="w-full p-3 bg-slate-50 rounded-xl outline-none border-none mt-1" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 ml-1">ছবি আপলোড</label>
                            <input type="file" id="photoFile" accept="image/*" class="w-full p-2 text-[10px] bg-slate-50 rounded-xl mt-1">
                            <input type="hidden" id="base64Photo">
                        </div>
                        <div class="md:col-span-2 grid grid-cols-2 gap-4">
                            <input type="text" id="fName" placeholder="পিতার নাম" class="p-3 bg-blue-50/50 rounded-xl border-none text-sm">
                            <input type="text" id="mName" placeholder="মাতার নাম" class="p-3 bg-pink-50/50 rounded-xl border-none text-sm">
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-black transition-all">তথ্য সংরক্ষণ করুন</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="viewTab" class="block">
                <div class="mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">শিক্ষার্থী তালিকা</h2>
                    <input type="text" id="searchBar" placeholder="নাম বা রোল লিখে খুঁজুন..." class="w-full md:w-80 p-3 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div id="studentContainer" class="space-y-8">
                    </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[32px] overflow-hidden shadow-2xl">
            <div id="modalContent" class="p-8"></div>
            <div class="p-6 bg-slate-50 flex gap-3">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold">প্রিন্ট</button>
                <button onclick="closeModal()" class="flex-1 bg-white border py-4 rounded-2xl font-bold">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const ADMIN_UID = "Q9AUB3tOiAYAO9HebLAPpKbjDCx1";

        // ট্যাব সুইচিং লজিক
        window.switchTab = (tabId) => {
            document.getElementById('entryTab').classList.add('hidden');
            document.getElementById('viewTab').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');

            document.getElementById('btnView').classList.remove('tab-active');
            document.getElementById('btnEntry').classList.remove('tab-active');
            if(tabId === 'entryTab') document.getElementById('btnEntry').classList.add('tab-active');
            else document.getElementById('btnView').classList.add('tab-active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const roleTxt = document.getElementById('roleText');
                if(user.uid === ADMIN_UID) {
                    roleTxt.innerText = "Admin"; 
                    document.getElementById('adminStats').classList.remove('hidden');
                } else {
                    roleTxt.innerText = "Staff";
                }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(() => alert('ভুল ইমেইল/পাসওয়ার্ড'));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // ইমেজ হ্যান্ডলিং
        document.getElementById('photoFile').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 150; canvas.height = 150;
                    canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                    document.getElementById('base64Photo').value = canvas.toDataURL('image/jpeg', 0.6);
                };
            };
            reader.readAsDataURL(file);
        });

        function loadData(searchTerm = "") {
            const user = auth.currentUser;
            onValue(ref(db, 'students'), (snapshot) => {
                const container = document.getElementById('studentContainer');
                container.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;
                
                let stats = { total: 0, others: 0, today: 0 };
                const today = new Date().toISOString().split('T')[0];

                Object.values(data).forEach(s => {
                    stats.total++;
                    if(s.createdBy !== user.uid) stats.others++;
                    if(s.createdAt === today) stats.today++;
                });

                if(user.uid === ADMIN_UID) {
                    document.getElementById('totalStudents').innerText = stats.total;
                    document.getElementById('todayEntries').innerText = stats.today;
                    document.getElementById('othersEntries').innerText = stats.others;
                }

                const classes = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
                classes.forEach(cls => {
                    const filtered = Object.keys(data).filter(id => {
                        const s = data[id];
                        const match = s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.roll.toString().includes(searchTerm);
                        return s.className === cls && match && (user.uid === ADMIN_UID || s.createdBy === user.uid);
                    });

                    if (filtered.length > 0) {
                        const section = document.createElement('div');
                        section.innerHTML = `<h2 class="class-header"><span>${cls}</span> <span class="text-xs bg-slate-100 px-3 py-1 rounded-full">${filtered.length} জন</span></h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4"></div>`;
                        const grid = section.querySelector('div');
                        filtered.forEach(id => {
                            const s = data[id];
                            grid.innerHTML += `
                                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 hover:shadow-lg transition-all">
                                    <img src="${s.photo || 'https://via.placeholder.com/80'}" class="student-photo">
                                    <div class="flex-1">
                                        <h3 class="font-bold text-slate-800 text-sm">${s.name}</h3>
                                        <p class="text-[10px] text-blue-500 font-bold">রোল: ${s.roll}</p>
                                        <div class="flex gap-2 mt-2">
                                            <button onclick="viewRec('${id}')" class="text-[9px] font-bold bg-slate-50 px-2 py-1 rounded hover:bg-slate-200">VIEW</button>
                                            <button onclick="editRec('${id}')" class="text-[9px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">EDIT</button>
                                            <button onclick="deleteRec('${id}')" class="text-[9px] font-bold bg-red-50 text-red-400 px-2 py-1 rounded">DEL</button>
                                        </div>
                                    </div>
                                </div>`;
                        });
                        container.appendChild(section);
                    }
                });
            });
        }

        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col items-center">
                    <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-full ring-4 ring-blue-50 mb-4 object-cover">
                    <h2 class="text-xl font-bold text-slate-800">${s.name}</h2>
                    <p class="text-blue-500 font-bold uppercase text-xs tracking-widest">${s.className} | রোল: ${s.roll}</p>
                </div>
                <div class="mt-8 grid grid-cols-2 gap-4 text-xs">
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400">জন্ম নিবন্ধন</p><p class="font-bold">${s.birthReg}</p></div>
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400">জন্ম তারিখ</p><p class="font-bold">${s.dob}</p></div>
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400">পিতার নাম</p><p class="font-bold">${s.father || '-'}</p></div>
                    <div class="bg-slate-50 p-3 rounded-xl"><p class="text-slate-400">মাতার নাম</p><p class="font-bold">${s.mother || '-'}</p></div>
                </div>`;
            document.getElementById('viewModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const user = auth.currentUser;
            const student = {
                name: document.getElementById('stName').value, roll: document.getElementById('roll').value,
                className: document.getElementById('class').value, birthReg: document.getElementById('birthReg').value,
                dob: document.getElementById('dob').value, father: document.getElementById('fName').value,
                mother: document.getElementById('mName').value, photo: document.getElementById('base64Photo').value,
                createdBy: id ? window.allData[id].createdBy : user.uid,
                creatorEmail: id ? window.allData[id].creatorEmail : user.email,
                createdAt: id ? window.allData[id].createdAt : new Date().toISOString().split('T')[0]
            };
            const saveRef = id ? ref(db, `students/${id}`) : push(ref(db, 'students'));
            set(saveRef, student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('editKey').value = "";
                document.getElementById('submitBtn').innerText = "তথ্য সংরক্ষণ করুন";
                switchTab('viewTab'); // সেভ করার পর অটো তালিকায় নিয়ে যাবে
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob;
            document.getElementById('fName').value = s.father || "";
            document.getElementById('mName').value = s.mother || "";
            document.getElementById('base64Photo').value = s.photo || "";
            document.getElementById('submitBtn').innerText = "তথ্য আপডেট করুন";
            switchTab('entryTab'); // এডিট করার সময় ফরম ওপেন হবে
        };

        window.deleteRec = (id) => { if(confirm("মুছে ফেলবেন?")) remove(ref(db, `students/${id}`)); };
    </script>
</body>
</html>

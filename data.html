<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0f1d;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #22d3ee;
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        .light-mode {
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #475569;
            --border: rgba(0, 0, 0, 0.1);
            --accent: #0891b2;
            --input-bg: #f1f5f9;
        }

        body { 
            font-family: 'SolaimanLipi', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            border-radius: 16px;
            color: var(--text-main);
        }

        /* ফন্ট কালার ফিক্স */
        h1, h2, h3, p, span, label { color: var(--text-main); }
        .text-dim { color: var(--text-dim); }
        .text-accent { color: var(--accent); }

        input, select { 
            background: var(--input-bg) !important; 
            border: 1px solid var(--border) !important; 
            color: var(--text-main) !important;
            padding: 10px 14px; 
            border-radius: 10px; 
        }

        .tab-active { 
            background: var(--accent) !important; 
            color: #fff !important; 
        }

        #viewModal { display: none; }
        
        .header-icon {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b no-print px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="/icon.svg" alt="Icon" class="header-icon">
                <div>
                    <h1 class="text-sm md:text-base font-black tracking-tight leading-tight">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা</h1>
                    <p class="text-[9px] uppercase opacity-70 font-bold">সরকারি প্রাথমিক বিদ‌্যালয়</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 glass rounded-full">
                    <i id="themeIcon" data-lucide="moon" size="18"></i>
                </button>
                <button id="logoutBtn" class="hidden text-rose-500 p-2"><i data-lucide="log-out"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4">
        <div class="glass p-8 w-full max-w-sm text-center shadow-xl">
            <img src="/icon.svg" class="w-12 h-12 mx-auto mb-4">
            <h2 class="text-xl font-bold mb-6">অ্যাডমিন লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="w-full">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="w-full">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold hover:bg-cyan-500 transition-all">লগইন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto">
        <div class="flex justify-center my-6 gap-2 no-print">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 glass text-xs font-bold tab-active">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 glass text-xs font-bold opacity-60">নতুন এন্ট্রি</button>
        </div>

        <div id="viewTab" class="space-y-6">
            <div class="relative max-w-md mx-auto">
                <i data-lucide="search" class="absolute left-3.5 top-2.5 opacity-50" size="18"></i>
                <input type="text" id="searchBar" placeholder="খুঁজুন..." class="w-full pl-10 glass">
            </div>
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="entryTab" class="hidden glass p-6 max-w-4xl mx-auto">
            <form id="studentForm" class="space-y-6">
                <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                
                <div class="flex flex-col md:flex-row gap-6 border-b border-white/10 pb-6">
                    <div class="w-28 h-28 glass rounded-2xl flex items-center justify-center overflow-hidden relative border-dashed border-2 border-slate-400">
                        <img id="imagePreview" class="hidden w-full h-full object-cover">
                        <span id="imgPlaceholder" class="text-[10px] opacity-60">ছবি</span>
                        <input type="file" id="stPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" required>
                        <div class="flex gap-2">
                            <select id="class" class="flex-1" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option>
                                <option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option>
                                <option value="৫ম">৫ম শ্রেণি</option>
                            </select>
                            <input type="number" id="roll" placeholder="রোল" class="w-20" required>
                        </div>
                        <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন">
                        <input type="date" id="dob">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-4 glass bg-black/5 space-y-3">
                        <p class="text-[10px] font-bold uppercase text-cyan-600">পিতার তথ্য</p>
                        <input type="text" id="fName" placeholder="নাম" class="w-full">
                        <input type="text" id="fNid" placeholder="NID" class="w-full">
                    </div>
                    <div class="p-4 glass bg-black/5 space-y-3">
                        <p class="text-[10px] font-bold uppercase text-rose-600">মাতার তথ্য</p>
                        <input type="text" id="mName" placeholder="নাম" class="w-full">
                        <input type="text" id="mNid" placeholder="NID" class="w-full">
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold">সেভ করুন</button>
            </form>
        </div>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="glass w-full max-w-md p-6 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 opacity-50"><i data-lucide="x"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        // Firebase Configuration and Auth Logic remains the same as before...
        // Theme Toggle logic with font color correction
        window.toggleTheme = () => {
            const body = document.body;
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            document.getElementById('themeIcon').setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            lucide.createIcons();
        };

        window.switchTab = (id) => {
            document.getElementById('viewTab').classList.toggle('hidden', id !== 'viewTab');
            document.getElementById('entryTab').classList.toggle('hidden', id !== 'entryTab');
            document.getElementById('btnView').classList.toggle('tab-active', id === 'viewTab');
            document.getElementById('btnEntry').classList.toggle('tab-active', id === 'entryTab');
        };

        window.closeModal = () => document.getElementById('viewModal').style.display = 'none';

        // Initialize Lucide Icons
        lucide.createIcons();
        
        // On Page Load Theme Check
        if(localStorage.getItem('theme') === 'light') toggleTheme();
    </script>
</body>
</html>

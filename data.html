<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Database System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body class="antialiased">

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center px-4">
        <div class="glass p-10 rounded-[45px] w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-xl font-bold mb-8 tracking-widest uppercase">System Access</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email/ID" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all active:scale-95">CONNECT</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print glass sticky top-0 z-50 p-4 mb-6 border-b border-white/5">
            <div class="max-w-[1400px] mx-auto flex justify-between items-center">
                <h1 class="font-black text-2xl tracking-tighter text-blue-500">SMS<span class="text-white">CORE</span></h1>
                <div class="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-white/5">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 text-sm font-bold rounded-xl transition-all tab-active">Records</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 text-sm font-bold rounded-xl text-slate-400">Entry</button>
                </div>
                <button id="logoutBtn" class="text-red-400 text-xs font-bold uppercase hover:bg-red-500/10 px-4 py-2 rounded-xl">Exit</button>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-4">
            <div class="mb-8 flex items-center gap-3 bg-white/5 p-3 rounded-2xl inline-flex">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-500 animate-pulse"></div>
                <h3 id="roleText" class="text-[10px] font-mono uppercase tracking-[0.2em] text-slate-400">Syncing...</h3>
            </div>

            <div id="entryTab" class="hidden no-print glass p-8 rounded-[40px] shadow-2xl mb-10">
                <form id="studentForm">
                    <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                    
                    <div class="flex flex-col md:flex-row gap-8 mb-10 items-center">
                        <div class="w-36 h-36 bg-slate-800 rounded-3xl border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden relative group">
                            <img id="imagePreview" class="hidden w-full h-full object-cover">
                            <div id="imgPlaceholder" class="text-center">
                                <span class="text-slate-500 text-[10px] font-bold block uppercase">Student Photo</span>
                                <span class="text-slate-600 text-[8px] mt-1 block">Auto 200x200</span>
                            </div>
                            <input type="file" id="stPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1 w-full">
                            <div><label class="text-[10px] text-slate-500 mb-2 block uppercase font-bold tracking-widest">Full Name</label><input type="text" id="stName" class="w-full p-4 rounded-2xl outline-none" required></div>
                            <div><label class="text-[10px] text-slate-500 mb-2 block uppercase font-bold tracking-widest">Class Segment</label>
                                <select id="class" class="w-full p-4 rounded-2xl outline-none">
                                    <option value="১ম">Class 1</option><option value="২য়">Class 2</option><option value="৩য়">Class 3</option><option value="৪র্থ">Class 4</option><option value="৫ম">Class 5</option>
                                </select>
                            </div>
                            <div><label class="text-[10px] text-slate-500 mb-2 block uppercase font-bold tracking-widest">Identity / Roll</label><input type="number" id="roll" class="w-full p-4 rounded-2xl outline-none" required></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div class="p-8 bg-white/5 rounded-[30px] border border-white/5">
                            <h4 class="text-blue-400 text-xs font-bold mb-6 uppercase tracking-tighter">Paternal Info</h4>
                            <input type="text" id="fName" placeholder="Father's Name" class="w-full p-4 mb-4 rounded-2xl outline-none">
                            <input type="text" id="fMobile" placeholder="Contact Number" class="w-full p-4 rounded-2xl outline-none">
                        </div>
                        <div class="p-8 bg-white/5 rounded-[30px] border border-white/5">
                            <h4 class="text-pink-400 text-xs font-bold mb-6 uppercase tracking-tighter">Maternal Info</h4>
                            <input type="text" id="mName" placeholder="Mother's Name" class="w-full p-4 mb-4 rounded-2xl outline-none">
                            <input type="text" id="mMobile" placeholder="Contact Number" class="w-full p-4 rounded-2xl outline-none">
                        </div>
                    </div>

                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-5 rounded-2xl font-bold transition-all shadow-xl shadow-indigo-500/20 active:scale-95 text-sm uppercase tracking-widest">Execute Save</button>
                </form>
            </div>

            <div id="viewTab" class="glass rounded-[45px] shadow-2xl overflow-hidden mb-10">
                <div class="p-8 flex flex-col md:flex-row justify-between items-center border-b border-white/5 gap-4">
                    <h2 class="font-bold tracking-widest text-slate-400 uppercase text-xs">Registry Node</h2>
                    <input type="text" id="searchBar" placeholder="Quick Search..." class="p-3 px-6 rounded-2xl w-full md:w-80 outline-none text-xs focus:ring-2 focus:ring-blue-500/50">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] uppercase tracking-[0.3em] text-slate-500 bg-slate-900/30">
                            <tr>
                                <th class="p-6 font-bold">Profile</th>
                                <th class="p-6 font-bold">Student Data</th>
                                <th class="p-6 font-bold">Guardian Details</th>
                                <th class="p-6 font-bold text-center no-print">Control</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="text-sm divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- আপনার নির্দিষ্ট UID লজিক ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                
                const roleText = document.getElementById('roleText');
                const dot = document.getElementById('statusDot');
                
                const ADMIN_ID = "Q9AUB3tOiAYAO9HebLAPpKbjDCx1";
                const HEAD_ID = "BcQXWMHQkJNrhhYkbJnVtsIffz33";

                if (user.uid === ADMIN_ID) {
                    window.currentUserRole = "admin";
                    roleText.innerText = "System Architect: 00";
                    dot.className = "w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_15px_#3b82f6]";
                } else if (user.uid === HEAD_ID) {
                    window.currentUserRole = "head_teacher";
                    roleText.innerText = "Supervisor Node: 01";
                    dot.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                } else {
                    window.currentUserRole = "teacher";
                    roleText.innerText = "General Node: Active";
                    dot.className = "w-3 h-3 rounded-full bg-slate-500";
                }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        // --- স্মার্ট ইমেজ প্রসেসিং (200x200 & <50KB) ---
        document.getElementById('stPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200; canvas.height = 200;
                        const ctx = canvas.getContext('2d');
                        
                        // সেন্টার ক্রপিং (Square Crop)
                        let side = Math.min(img.width, img.height);
                        let x = (img.width - side) / 2;
                        let y = (img.height - side) / 2;
                        
                        ctx.drawImage(img, x, y, side, side, 0, 0, 200, 200);
                        
                        // কোয়ালিটি ০.৪ দিলে ছবি ২০-৩৫ কেবি এর মধ্যে থাকবে
                        const compressed = canvas.toDataURL('image/jpeg', 0.4);
                        document.getElementById('photoBase64').value = compressed;
                        document.getElementById('imagePreview').src = compressed;
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('imgPlaceholder').classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        window.switchTab = (id) => {
            document.getElementById('entryTab').classList.toggle('hidden', id !== 'entryTab');
            document.getElementById('viewTab').classList.toggle('hidden', id !== 'viewTab');
            document.getElementById('btnView').classList.toggle('tab-active', id === 'viewTab');
            document.getElementById('btnEntry').classList.toggle('tab-active', id === 'entryTab');
        };

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert('DENIED: ACCESS REVOKED'));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function loadData(searchTerm = "") {
            onValue(ref(db, 'students'), (snapshot) => {
                const body = document.getElementById('studentTableBody');
                body.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;

                Object.keys(data).sort((a,b) => data[a].roll - data[b].roll).forEach(id => {
                    const s = data[id];
                    if (s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.roll.toString().includes(searchTerm)) {
                        body.innerHTML += `
                            <tr class="hover:bg-white/5 transition-all group">
                                <td class="p-6">
                                    <div class="flex items-center gap-4">
                                        <div class="w-14 h-14 rounded-2xl bg-slate-800 border border-white/10 overflow-hidden shadow-lg group-hover:border-blue-500/50 transition-all">
                                            <img src="${s.photo || 'https://via.placeholder.com/200'}" class="w-full h-full object-cover">
                                        </div>
                                        <span class="font-black text-blue-500 text-xl tracking-tighter">#${s.roll}</span>
                                    </div>
                                </td>
                                <td class="p-6">
                                    <div class="font-bold text-slate-200 uppercase tracking-wider">${s.name}</div>
                                    <div class="text-[10px] text-slate-500 font-mono mt-1">${s.className} Segment</div>
                                </td>
                                <td class="p-6 text-xs text-slate-400">
                                    <div class="mb-1">F: ${s.fName || '-'} <span class="text-blue-500/70 ml-2">${s.fMobile || ''}</span></div>
                                    <div>M: ${s.mName || '-'} <span class="text-pink-500/70 ml-2">${s.mMobile || ''}</span></div>
                                </td>
                                <td class="p-6 no-print text-center">
                                    <div class="flex justify-center gap-2">
                                        <button onclick="editRec('${id}')" class="p-3 bg-white/5 rounded-xl hover:bg-blue-600/20 text-blue-400 transition-all active:scale-90">✏️</button>
                                        ${window.currentUserRole === 'admin' ? `<button onclick="deleteRec('${id}')" class="p-3 bg-white/5 rounded-xl hover:bg-red-600/20 text-red-400 transition-all active:scale-90">🗑️</button>` : ''}
                                    </div>
                                </td>
                            </tr>`;
                    }
                });
            });
        }

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const student = {
                name: document.getElementById('stName').value, 
                roll: document.getElementById('roll').value, 
                className: document.getElementById('class').value,
                photo: document.getElementById('photoBase64').value,
                fName: document.getElementById('fName').value, 
                fMobile: document.getElementById('fMobile').value,
                mName: document.getElementById('mName').value, 
                mMobile: document.getElementById('mMobile').value
            };
            set(id ? ref(db, `students/${id}`) : push(ref(db, 'students')), student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('imgPlaceholder').classList.remove('hidden');
                document.getElementById('editKey').value = "";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('photoBase64').value = s.photo || "";
            if(s.photo) {
                document.getElementById('imagePreview').src = s.photo;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imgPlaceholder').classList.add('hidden');
            }
            document.getElementById('fName').value = s.fName || ""; document.getElementById('fMobile').value = s.fMobile || "";
            document.getElementById('mName').value = s.mName || ""; document.getElementById('mMobile').value = s.mMobile || "";
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { if(confirm("PERMANENTLY REMOVE NODE?")) remove(ref(db, `students/${id}`)); };
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয় | ডাটাবেস</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg-body: #0a0f1d; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f1f5f9; --border: rgba(255, 255, 255, 0.1); --accent: #22d3ee; --input-bg: rgba(0, 0, 0, 0.4); --photo-bg: rgba(0, 0, 0, 0.6); }
        .light-mode { --bg-body: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a; --border: rgba(0, 0, 0, 0.1); --accent: #0891b2; --input-bg: #f1f5f9; --photo-bg: #e2e8f0; }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; transition: 0.3s; }
        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        input, select { background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-main) !important; padding: 10px 14px !important; border-radius: 10px; outline: none; width: 100%; font-size: 0.95rem !important; }
        .photo-area { background: var(--photo-bg) !important; border: 2px dashed var(--accent) !important; }
        .tab-active { background: var(--accent) !important; color: #fff !important; }
        #viewModal { display: none; }
        @media print { body * { visibility: hidden; } #viewModal, #viewModal *, #modalContent, #modalContent * { visibility: visible; } #viewModal { position: absolute; left: 0; top: 0; width: 100%; background: white !important; color: black !important; } .no-print { display: none !important; } .glass { border: none !important; background: transparent !important; backdrop-filter: none !important; } }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b no-print px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-2 min-w-0">
                <img src="/icon.svg" class="w-7 h-7 flex-shrink-0">
                <h1 class="text-xs md:text-base font-black truncate">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 glass rounded-full"><i id="themeIcon" data-lucide="moon" size="16"></i></button>
                <button id="logoutBtn" class="hidden text-rose-500 p-2"><i data-lucide="log-out" size="20"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4 no-print">
        <div class="glass p-6 w-full max-w-sm text-center shadow-xl">
            <h2 class="text-xl font-bold mb-6">লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-3 rounded-lg font-bold text-base">লগইন করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto">
        <div class="flex justify-center mb-6 gap-2 no-print overflow-x-auto pb-2">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-5 py-2 glass text-[10px] font-bold tab-active whitespace-nowrap">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-5 py-2 glass text-[10px] font-bold opacity-60 whitespace-nowrap">উপস্থিতি</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-5 py-2 glass text-[10px] font-bold opacity-60 whitespace-nowrap">নতুন এন্ট্রি</button>
        </div>

        <div id="viewTab" class="space-y-4">
            <div class="max-w-md mx-auto space-y-3 no-print">
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400"><i data-lucide="search" size="16"></i></div>
                    <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="pr-10">
                </div>
                <button onclick="exportToExcel()" class="w-full bg-emerald-600/20 text-emerald-500 border border-emerald-500/30 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
                    <i data-lucide="file-down" size="14"></i> এক্সেল ডাউনলোড (Full Data)
                </button>
            </div>
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>

        <div id="attendanceTab" class="hidden max-w-2xl mx-auto space-y-4">
            <div class="glass p-5 text-center space-y-4">
                <div class="p-4 border border-white/10 rounded-xl space-y-3">
                    <p class="text-xs font-bold opacity-70">দৈনিক হাজিরা ও রিপোর্ট</p>
                    <input type="date" id="attDate" class="!w-full mx-auto" onchange="initAttendance()">
                    <button onclick="viewDailyReport()" class="w-full bg-slate-800 text-cyan-400 py-2 rounded-lg text-xs font-bold border border-cyan-500/30">দৈনিক রিপোর্ট দেখুন</button>
                </div>

                <div id="attList" class="space-y-2 text-left"></div>
                <button onclick="saveAttendance()" id="saveAttBtn" class="hidden w-full bg-cyan-600 text-white py-3.5 rounded-xl font-bold">আজকের উপস্থিতি নিশ্চিত করুন</button>

                <div class="p-4 border border-white/10 rounded-xl space-y-3 bg-white/5">
                    <p class="text-xs font-bold opacity-70 text-emerald-400">মাসিক ও ৬ মাসের রিপোর্ট জেনারেশন</p>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="reportYear">
                            <option value="2026">২০২৬</option><option value="2025">২০২৫</option>
                        </select>
                        <select id="reportMonth">
                            <option value="01">জানুয়ারি</option><option value="02">ফেব্রুয়ারি</option><option value="03">মার্চ</option>
                            <option value="04">এপ্রিল</option><option value="05">মে</option><option value="06">জুন</option>
                            <option value="07">জুলাই</option><option value="08">আগস্ট</option><option value="09">সেপ্টেম্বর</option>
                            <option value="10">অক্টোবর</option><option value="11">নভেম্বর</option><option value="12">ডিসেম্বর</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        <button onclick="generatePeriodicReport('monthly')" class="w-full bg-emerald-600/20 text-emerald-500 py-2 rounded-lg text-xs font-bold border border-emerald-500/30">মাসিক রিপোর্ট</button>
                        <button onclick="generatePeriodicReport('sixmonth')" class="w-full bg-blue-600/20 text-blue-500 py-2 rounded-lg text-xs font-bold border border-blue-500/30">৬ মাসের রিপোর্ট</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="entryTab" class="hidden glass p-6 max-w-4xl mx-auto no-print">
            <form id="studentForm" class="space-y-6" autocomplete="off">
                <input type="hidden" id="editKey">
                <input type="hidden" id="photoBase64">
                <div class="flex flex-col md:flex-row gap-6 items-center border-b border-white/10 pb-6">
                    <div class="w-32 h-32 photo-area relative overflow-hidden rounded-xl flex items-center justify-center shadow-inner">
                        <img id="imagePreview" class="hidden w-full h-full object-cover">
                        <span id="imgLabel" class="text-[10px] font-bold opacity-70 text-center">ফটো সিলেক্ট করুন</span>
                        <input type="file" id="stPhoto" accept="image/*" onchange="processImage(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1 w-full">
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" required>
                        <div class="flex gap-2">
                            <select id="class" class="flex-1" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম</option><option value="২য়">২য়</option>
                                <option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                            </select>
                            <input type="text" id="roll" placeholder="রোল" class="w-24" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন নম্বর (১৭ ডিজিট)" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="17">
                        <div>
                            <input type="date" id="dob" required onchange="updateStudentAgePreview()">
                            <p id="studentAgePreview" class="text-[10px] text-cyan-500 font-bold mt-1"></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="md:col-span-2 lg:col-span-3"><p class="text-cyan-500 font-bold text-xs uppercase">পিতার তথ্য</p></div>
                    <input type="text" id="fName" placeholder="পিতার নাম">
                    <input type="text" id="fNid" placeholder="পিতার NID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <input type="date" id="fDob">
                    <input type="text" id="fMobile" placeholder="পিতার মোবাইল" class="md:col-span-2 lg:col-span-3" oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="11">
                    <div class="md:col-span-2 lg:col-span-3 mt-2"><p class="text-rose-500 font-bold text-xs uppercase">মাতার তথ্য</p></div>
                    <input type="text" id="mName" placeholder="মাতার নাম">
                    <input type="text" id="mNid" placeholder="মাতার NID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <input type="date" id="mDob">
                    <input type="text" id="mMobile" placeholder="মাতার মোবাইল" class="md:col-span-2 lg:col-span-3" oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="11">
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white py-3.5 rounded-xl font-bold text-lg">ডাটা সেভ করুন</button>
            </form>
        </div>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass w-full max-w-xl p-5 relative overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 no-print"><i data-lucide="x-circle" size="20"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const toBn = (n) => (!n && n !== 0) ? '---' : n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
        const calculateAge = (dob) => {
            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        window.exportToExcel = () => {
            if (!window.allData) return alert("কোনো ডাটা নেই!");
            const rows = Object.values(window.allData).map(s => ({
                "নাম": s.name, "শ্রেণি": s.className, "রোল": s.roll, "জন্ম নিবন্ধন": s.birthReg, "জন্ম তারিখ": s.dob,
                "পিতার নাম": s.fName, "পিতার মোবাইল": s.fMobile, "মাতার নাম": s.mName, "মাতার মোবাইল": s.mMobile
            }));
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students");
            XLSX.writeFile(wb, "Student_Database_Full.xlsx");
        };

        window.initAttendance = () => {
            const date = document.getElementById('attDate').value;
            const container = document.getElementById('attList');
            if(!date || !window.allData) return;
            container.innerHTML = "";
            document.getElementById('saveAttBtn').classList.remove('hidden');
            Object.keys(window.allData).sort((a,b) => window.allData[a].roll - window.allData[b].roll).forEach(id => {
                const s = window.allData[id];
                container.innerHTML += `<div class="flex justify-between items-center p-3 glass mb-2"><div class="text-[11px]"><p class="font-bold">${s.name}</p><p class="opacity-60">${s.className} | রোল: ${toBn(s.roll)}</p></div><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="att-check sr-only peer" data-id="${id}" checked><div class="w-11 h-6 bg-rose-500 rounded-full peer peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label></div>`;
            });
        };

        window.saveAttendance = () => {
            const date = document.getElementById('attDate').value;
            const attData = {};
            document.querySelectorAll('.att-check').forEach(chk => { attData[chk.dataset.id] = chk.checked ? "P" : "A"; });
            set(ref(db, `attendance/${date}`), attData).then(() => alert("উপস্থিতি সেভ হয়েছে!"));
        };

        window.viewDailyReport = () => {
            const date = document.getElementById('attDate').value;
            if(!date) return alert("তারিখ নির্বাচন করুন!");
            get(ref(db, `attendance/${date}`)).then(snap => {
                const attData = snap.val();
                if(!attData) return alert("রেকর্ড পাওয়া যায়নি!");
                let p = 0, a = 0;
                let html = `<div class="p-4 bg-white text-black rounded-lg"><h2 class="text-center font-black border-b pb-2 mb-4">ডেইলি রিপোর্ট: ${toBn(date)}</h2>`;
                Object.keys(window.allData).forEach(id => {
                    const status = attData[id] || "---";
                    if(status === "P") p++; else a++;
                    html += `<div class="flex justify-between text-[11px] py-1 border-b"><span>${window.allData[id].name} (${toBn(window.allData[id].roll)})</span><span class="font-bold ${status === 'P' ? 'text-emerald-600' : 'text-rose-600'}">${status === 'P' ? 'উপস্থিত' : 'অনুপস্থিত'}</span></div>`;
                });
                html += `<div class="mt-4 p-2 bg-slate-100 flex justify-around text-xs font-bold"><p>উপস্থিত: ${toBn(p)}</p><p>অনুপস্থিত: ${toBn(a)}</p></div></div><button onclick="window.print()" class="w-full mt-4 bg-slate-800 text-white py-2 rounded-lg font-bold text-xs no-print">প্রিন্ট রিপোর্ট</button>`;
                document.getElementById('modalContent').innerHTML = html;
                document.getElementById('viewModal').style.display = 'flex';
            });
        };

        window.generatePeriodicReport = (type) => {
            const year = document.getElementById('reportYear').value;
            const month = document.getElementById('reportMonth').value;
            const target = `${year}-${month}`;
            
            get(ref(db, `attendance`)).then(snap => {
                const allAtt = snap.val() || {};
                let days = [];
                let reportTitle = "";

                if(type === 'monthly') {
                    days = Object.keys(allAtt).filter(d => d.startsWith(target));
                    reportTitle = `মাসিক রিপোর্ট: ${month}/${year}`;
                } else {
                    const mNum = parseInt(month);
                    const range = mNum <= 6 ? ["01","02","03","04","05","06"] : ["07","08","09","10","11","12"];
                    days = Object.keys(allAtt).filter(d => d.startsWith(year) && range.includes(d.split('-')[1]));
                    reportTitle = mNum <= 6 ? `জানুয়ারি-জুন (${year}) রিপোর্ট` : `জুলাই-ডিসেম্বর (${year}) রিপোর্ট`;
                }

                if(days.length === 0) return alert("নির্বাচিত সময়ের কোনো ডাটা নেই!");

                let html = `<div class="p-4 bg-white text-black rounded-lg"><h2 class="text-center font-black border-b pb-2 mb-4">${reportTitle}</h2><table class="w-full text-[10px]"><thead><tr class="border-b"><th>নাম (রোল)</th><th class="text-center">দিন</th><th class="text-center">হার (%)</th></tr></thead><tbody>`;
                Object.keys(window.allData).forEach(id => {
                    let present = 0;
                    days.forEach(d => { if(allAtt[d] && allAtt[d][id] === "P") present++; });
                    const percent = ((present / days.length) * 100).toFixed(0);
                    html += `<tr class="border-b"><td class="py-1">${window.allData[id].name} (${toBn(window.allData[id].roll)})</td><td class="text-center">${toBn(present)}/${toBn(days.length)}</td><td class="text-center font-bold">${toBn(percent)}%</td></tr>`;
                });
                html += `</tbody></table><p class="mt-4 text-[9px] opacity-50 italic text-center">মোট কার্যদিবস: ${toBn(days.length)} দিন</p></div><button onclick="window.print()" class="w-full mt-4 bg-slate-800 text-white py-2 rounded-lg font-bold text-xs no-print">প্রিন্ট রিপোর্ট</button>`;
                document.getElementById('modalContent').innerHTML = html;
                document.getElementById('viewModal').style.display = 'flex';
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        function loadData(search = "") {
            onValue(ref(db, 'students'), (snap) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = "";
                window.allData = snap.val() || {};
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const filtered = Object.keys(window.allData).filter(id => (window.allData[id].name.toLowerCase().includes(search.toLowerCase()) || window.allData[id].roll.includes(search)) && window.allData[id].className === cls);
                    if(filtered.length > 0) {
                        let html = `<div class="glass overflow-hidden mb-3"><div class="p-2 bg-white/5 border-b"><h3 class="font-bold text-[10px] text-cyan-500">${cls} শ্রেণি</h3></div><div class="divide-y divide-white/5">`;
                        filtered.forEach(id => {
                            html += `<div class="p-3 flex justify-between items-center"><div class="flex items-center gap-2 text-[11px]"><img src="${window.allData[id].photo || ''}" class="w-8 h-8 rounded-lg bg-slate-800 object-cover"><div><p class="font-bold">${window.allData[id].name}</p><p class="opacity-50 text-[9px]">রোল: ${toBn(window.allData[id].roll)}</p></div></div><div class="flex gap-1"><button onclick="viewRec('${id}')" class="text-cyan-500 p-1.5"><i data-lucide="eye" size="16"></i></button><button onclick="editRec('${id}')" class="text-emerald-500 p-1.5"><i data-lucide="edit-3" size="16"></i></button><button onclick="deleteRec('${id}')" class="text-rose-500 p-1.5"><i data-lucide="trash-2" size="16"></i></button></div></div>`;
                        });
                        container.innerHTML += html + `</div></div>`;
                        lucide.createIcons();
                    }
                });
            });
        }

        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `<div id="printableCard" class="p-4 bg-white text-black rounded-lg"><div class="flex flex-col items-center gap-2 mb-4"><img src="${s.photo || ''}" class="w-20 h-20 rounded-xl border-2 border-cyan-500 object-cover"><div class="text-center"><h2 class="text-lg font-black">${s.name}</h2><p class="text-cyan-600 font-bold text-[10px] uppercase">${s.className} শ্রেণি | রোল: ${toBn(s.roll)}</p></div></div><div class="space-y-3 text-[10px]"><div class="p-2 border rounded-lg text-center bg-slate-50"><p class="font-bold opacity-50 mb-1">জন্ম নিবন্ধন ও তারিখ</p><p class="text-base font-bold">${toBn(s.birthReg)}</p><p class="text-cyan-600 font-bold">${toBn(s.dob)}</p></div><div class="grid grid-cols-1 md:grid-cols-2 gap-3"><div class="p-2 border-l-2 border-cyan-500 bg-cyan-50"><p class="text-cyan-600 font-black mb-1">পিতার তথ্য</p><p>নাম: ${s.fName || '---'}</p><p>মোবাইল: ${toBn(s.fMobile)}</p></div><div class="p-2 border-l-2 border-rose-500 bg-rose-50"><p class="text-rose-600 font-black mb-1">মাতার তথ্য</p><p>নাম: ${s.mName || '---'}</p><p>মোবাইল: ${toBn(s.mMobile)}</p></div></div></div></div><div class="mt-6 flex gap-2 no-print"><button onclick="window.print()" class="flex-1 bg-slate-800 text-white py-2.5 rounded-lg font-bold text-xs">প্রিন্ট</button><button onclick="closeModal()" class="flex-1 bg-cyan-600 text-white py-2.5 rounded-lg font-bold text-xs">বন্ধ করুন</button></div>`;
            document.getElementById('viewModal').style.display = 'flex';
            lucide.createIcons();
        };

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('class').value = s.className;
            document.getElementById('roll').value = s.roll;
            document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob;
            document.getElementById('fName').value = s.fName || ""; document.getElementById('fMobile').value = s.fMobile || "";
            document.getElementById('mName').value = s.mName || ""; document.getElementById('mMobile').value = s.mMobile || "";
            if(s.photo) { document.getElementById('photoBase64').value = s.photo; document.getElementById('imagePreview').src = s.photo; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgLabel').classList.add('hidden'); }
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { if(confirm("নিশ্চিত?")) remove(ref(db, `students/${id}`)); };
        window.toggleTheme = () => { document.body.classList.toggle('light-mode'); const icon = document.body.classList.contains('light-mode') ? 'sun' : 'moon'; document.getElementById('themeIcon').setAttribute('data-lucide', icon); lucide.createIcons(); };
        window.switchTab = (id) => { ['viewTab', 'entryTab', 'attendanceTab'].forEach(tab => document.getElementById(tab).classList.toggle('hidden', tab !== id)); ['btnView', 'btnEntry', 'btnAttendance'].forEach(btn => document.getElementById(btn).classList.toggle('tab-active', btn.id.includes(id.replace('Tab','')))); };
        window.closeModal = () => document.getElementById('viewModal').style.display = 'none';

        document.getElementById('loginBtn').addEventListener('click', () => { signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(err => alert(err.message)); });
        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('stName').value, className: document.getElementById('class').value, roll: document.getElementById('roll').value, birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value, photo: document.getElementById('photoBase64').value,
                fName: document.getElementById('fName').value, fMobile: document.getElementById('fMobile').value,
                mName: document.getElementById('mName').value, mMobile: document.getElementById('mMobile').value
            };
            set(key ? ref(db, `students/${key}`) : push(ref(db, 'students')), data).then(() => { alert("সেভ হয়েছে!"); switchTab('viewTab'); });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
        lucide.createIcons();
    </script>
</body>
</html>

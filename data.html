<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0f1d; --card: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #22d3ee; --border: rgba(255, 255, 255, 0.1); }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: rgba(0, 0, 0, 0.1); --accent: #0891b2; }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 12px; }
        input, select { background: rgba(0,0,0,0.2) !important; border: 1px solid var(--border) !important; color: var(--text) !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 14px; }
        .tab-active { background: var(--accent) !important; color: #fff !important; box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); }
        .photo-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; border: 2px dashed var(--accent); }
        #viewModal { display: none; }
        @media print { 
            body * { visibility: hidden; } 
            #viewModal, #viewModal *, #modalContent, #modalContent * { visibility: visible; } 
            #viewModal { position: absolute; left: 0; top: 0; width: 100%; background: white !important; color: black !important; display: block !important; } 
            .no-print { display: none !important; } 
            .glass { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b px-4 py-3 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <div class="bg-cyan-500 p-1.5 rounded-lg shadow-lg"><i data-lucide="graduation-cap" class="text-white w-5 h-5"></i></div>
                    <h1 id="userGreeting" class="text-sm md:text-lg font-black truncate">লোড হচ্ছে...</h1>
                </div>
                <p id="userRoleTag" class="text-[10px] font-bold text-cyan-500/80 ml-9"></p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" class="p-2 glass rounded-full hover:bg-white/10 transition"><i id="themeIcon" data-lucide="moon" size="18"></i></button>
                <button id="logoutBtn" class="hidden text-rose-500 p-2 glass rounded-full hover:bg-rose-500/10 transition-all"><i data-lucide="log-out" size="18"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[80vh] flex items-center justify-center p-4 no-print">
        <div class="glass p-8 w-full max-w-sm text-center shadow-2xl border-cyan-500/20">
            <i data-lucide="lock" class="mx-auto mb-4 text-cyan-500" size="40"></i>
            <h2 class="text-xl font-bold mb-6 tracking-tight">প্যানেল লগইন</h2>
            <div class="space-y-4 text-left">
                <input type="email" id="loginEmail" placeholder="ইমেইল">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-3.5 rounded-xl font-bold text-base shadow-lg transition-all active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-6xl mx-auto no-print">
        <div class="text-center mb-6"><p class="text-[10px] font-bold text-cyan-500 tracking-widest uppercase animate-pulse">ট্যালেন্টপুল বৃত্তি অর্জন আমাদের লক্ষ্য</p></div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            <div class="glass p-3 text-center border-b-2 border-cyan-500">
                <p class="text-[10px] opacity-60">মোট শিক্ষার্থী</p>
                <p id="totalCount" class="text-xl font-black text-cyan-500">০</p>
            </div>
            <div class="glass p-3 text-center border-b-2 border-emerald-500">
                <p class="text-[10px] opacity-60">আজকের উপস্থিতি</p>
                <p id="todayCount" class="text-xl font-black text-emerald-500">০</p>
            </div>
        </div>

        <div class="flex justify-center mb-8 gap-2 overflow-x-auto pb-2">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 glass text-[10px] md:text-xs font-bold tab-active whitespace-nowrap">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-6 py-2 glass text-[10px] md:text-xs font-bold opacity-60 whitespace-nowrap">হাজিরা ও রিপোর্ট</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 glass text-[10px] md:text-xs font-bold opacity-60 whitespace-nowrap">নতুন এন্ট্রি</button>
        </div>

        <div id="viewTab" class="space-y-4">
            <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="max-w-md mx-auto block mb-6">
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="attendanceTab" class="hidden space-y-6 max-w-2xl mx-auto">
            <div class="glass p-6 text-center space-y-6">
                <h3 class="font-bold flex items-center justify-center gap-2 text-cyan-500"><i data-lucide="calendar-check"></i> দৈনিক হাজিরা</h3>
                <input type="date" id="attDate" class="max-w-xs mx-auto text-center font-bold" onchange="initAttendance()">
                <div id="attList" class="space-y-2 text-left max-h-[350px] overflow-y-auto pr-2"></div>
                <button onclick="saveAttendance()" id="saveAttBtn" class="hidden w-full bg-cyan-600 text-white py-3.5 rounded-xl font-black shadow-lg">হাজিরা নিশ্চিত করুন</button>
                <hr class="border-white/10 my-6">
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="reportYear" class="font-bold"><option value="2026">২০২৬</option><option value="2025">২০২৫</option></select>
                    <select id="reportMonth" class="font-bold">
                        <option value="01">জানুয়ারি</option><option value="02">ফেব্রুয়ারি</option><option value="03">মার্চ</option>
                        <option value="04">এপ্রিল</option><option value="05">মে</option><option value="06">জুন</option>
                        <option value="07">জুলাই</option><option value="08">আগস্ট</option><option value="09">সেপ্টেম্বর</option>
                        <option value="10">অক্টোবর</option><option value="11">নভেম্বর</option><option value="12">ডিসেম্বর</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <button onclick="viewDailyReport()" class="bg-slate-800 text-cyan-400 py-2.5 rounded-lg text-[10px] font-bold">দৈনিক রিপোর্ট</button>
                    <button onclick="generateMonthlyReport()" class="bg-slate-800 text-emerald-400 py-2.5 rounded-lg text-[10px] font-bold">মাসিক রিপোর্ট</button>
                    <div class="flex gap-1">
                        <button onclick="generateSixMonthReport('01','06')" class="flex-1 bg-slate-800 text-blue-400 py-2.5 rounded-lg text-[9px] font-bold">১ম ৬ মাস</button>
                        <button onclick="generateSixMonthReport('07','12')" class="flex-1 bg-slate-800 text-orange-400 py-2.5 rounded-lg text-[9px] font-bold">২য় ৬ মাস</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="entryTab" class="hidden glass p-6 md:p-8 max-w-4xl mx-auto">
            <form id="studentForm" class="space-y-8" autocomplete="off">
                <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                <div class="flex flex-col md:flex-row gap-8 items-center">
                    <div class="relative group">
                        <img id="imagePreview" src="" class="photo-preview hidden">
                        <div id="imgLabel" class="photo-preview flex flex-col items-center justify-center bg-black/20">
                            <i data-lucide="camera" size="24"></i><p class="text-[10px] font-bold">ছবি দিন</p>
                        </div>
                        <input type="file" accept="image/*" onchange="processImage(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1 w-full">
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" required>
                        <div class="flex gap-2">
                            <select id="class" required>
                                <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                <option value="১ম">১ম</option><option value="২য়">২য়</option><option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                            </select>
                            <input type="text" id="roll" placeholder="রোল" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <input type="text" id="birthReg" placeholder="জন্ম নিবন্ধন" maxlength="17" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="date" id="dob">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 border-t border-white/10 pt-6">
                    <div class="space-y-3 p-4 bg-white/5 rounded-2xl border border-cyan-500/10">
                        <p class="text-[10px] font-bold text-cyan-500 uppercase flex items-center gap-2"><i data-lucide="user"></i> পিতার তথ্য</p>
                        <input type="text" id="fName" placeholder="পিতার নাম">
                        <input type="date" id="fDob">
                        <input type="text" id="fNid" placeholder="পিতার NID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="text" id="fMobile" placeholder="পিতার মোবাইল" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="space-y-3 p-4 bg-white/5 rounded-2xl border border-rose-500/10">
                        <p class="text-[10px] font-bold text-rose-500 uppercase flex items-center gap-2"><i data-lucide="user-plus"></i> মাতার তথ্য</p>
                        <input type="text" id="mName" placeholder="মাতার নাম">
                        <input type="date" id="mDob">
                        <input type="text" id="mNid" placeholder="মাতার NID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="text" id="mMobile" placeholder="মাতার মোবাইল" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-cyan-500 transition active:scale-95">ডাটাবেসে সেভ করুন</button>
            </form>
        </div>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass w-full max-w-4xl p-6 relative overflow-y-auto max-h-[95vh]">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 no-print"><i data-lucide="x-circle"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_UID = "7Lxi5lfMR0ZWHRbBHMj4xD0hbVv2";
        const HEAD_TEACHER_UID = "BcQXWMHQkJNrhhYkbJnVtsIffz33";
        let currentUserUID = "";

        const showMsg = (t, i='success') => Swal.fire({title: t, icon: i, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000});
        const toBn = (n) => n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : '---';

        // Age Calculator Logic
        function calculateAge(dob) {
            if(!dob) return "---";
            const birth = new Date(dob); const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            return `${toBn(y)} বছর, ${toBn(m)} মাস, ${toBn(d)} দিন`;
        }

        onAuthStateChanged(auth, (u) => {
            if(u) {
                currentUserUID = u.uid;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');

                const greetingEl = document.getElementById('userGreeting');
                const roleEl = document.getElementById('userRoleTag');
                const hour = new Date().getHours();
                let timeGreet = hour < 12 ? "সুপ্রভাত" : hour < 17 ? "শুভ অপরাহ্ন" : "শুভ সন্ধ্যা";

                if (currentUserUID === ADMIN_UID) {
                    greetingEl.innerText = `${timeGreet}, অ্যাডমিন স্যার!`;
                    roleEl.innerText = "সিস্টেম অ্যাডমিনিস্ট্রেটর (পূর্ণ ক্ষমতা)";
                } else if (currentUserUID === HEAD_TEACHER_UID) {
                    greetingEl.innerText = `${timeGreet}, প্রধান শিক্ষক মহোদয়!`;
                    roleEl.innerText = "প্রধান শিক্ষক | ২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি";
                } else {
                    greetingEl.innerText = `${timeGreet}, শ্রদ্ধেয় শিক্ষক মহোদয়!`;
                    roleEl.innerText = "সহকারী শিক্ষক | ডিজিটাল প্যানেল";
                }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
            .then(() => showMsg("স্বাগতম!")).catch(() => showMsg("ভুল তথ্য!", "error"));
        };

        window.switchTab = (id) => {
            ['viewTab', 'attendanceTab', 'entryTab'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            ['btnView', 'btnAttendance', 'btnEntry'].forEach(b => document.getElementById(b).classList.remove('tab-active', 'opacity-60'));
            const activeBtnId = id === 'viewTab' ? 'btnView' : id === 'attendanceTab' ? 'btnAttendance' : 'btnEntry';
            document.getElementById(activeBtnId).classList.add('tab-active');
            lucide.createIcons();
        };

        function loadData(search = "") {
            onValue(ref(db, 'students'), (snap) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = ""; window.allData = snap.val() || {};
                const total = Object.keys(window.allData).length;
                document.getElementById('totalCount').innerText = toBn(total);

                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const filtered = Object.keys(window.allData).filter(id => (window.allData[id].name.toLowerCase().includes(search.toLowerCase()) || window.allData[id].roll.includes(search)) && window.allData[id].className === cls);
                    if(filtered.length > 0) {
                        let html = `<div class="glass overflow-hidden mb-4"><div class="p-3 bg-cyan-500/10 border-b border-white/5 flex justify-between"><h3 class="text-xs font-black text-cyan-500">${cls} শ্রেণি</h3><span class="text-[10px] opacity-60">${toBn(filtered.length)} জন</span></div><div class="divide-y divide-white/5">`;
                        filtered.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            const s = window.allData[id];
                            const delBtn = (currentUserUID === ADMIN_UID) ? `<button onclick="deleteRec('${id}')" class="p-2 text-rose-500 hover:bg-rose-500/10 rounded-full transition-colors"><i data-lucide="trash-2" size="16"></i></button>` : '';
                            html += `<div class="p-3 flex justify-between items-center hover:bg-white/5 transition"><div class="flex items-center gap-3"><img src="${s.photo || ''}" class="w-10 h-10 rounded-xl object-cover bg-slate-800 shadow-lg"><div><p class="text-sm font-bold">${s.name}</p><p class="text-[10px] opacity-60">রোল: ${toBn(s.roll)}</p></div></div><div class="flex gap-1"><button onclick="viewRec('${id}')" class="p-2 text-cyan-500"><i data-lucide="eye" size="18"></i></button><button onclick="editRec('${id}')" class="p-2 text-emerald-500"><i data-lucide="edit-3" size="18"></i></button>${delBtn}</div></div>`;
                        });
                        container.innerHTML += html + `</div></div>`;
                    }
                });
                lucide.createIcons();
            });
            // Update Today's Attendance Count
            const today = new Date().toISOString().split('T')[0];
            get(ref(db, `attendance/${today}`)).then(s => {
                const att = s.val(); let count = 0;
                if(att) Object.values(att).forEach(v => { if(v==='P') count++; });
                document.getElementById('todayCount').innerText = toBn(count);
            });
        }

        window.deleteRec = (id) => {
            Swal.fire({title: 'মুছে ফেলবেন?', icon: 'warning', showCancelButton: true, confirmButtonText: 'হ্যাঁ', cancelButtonText: 'না'}).then(r => { if(r.isConfirmed) remove(ref(db, `students/${id}`)); });
        };

        window.generateMonthlyReport = () => {
            const y = document.getElementById('reportYear').value; const m = document.getElementById('reportMonth').value;
            get(ref(db, `attendance`)).then(snap => {
                const all = snap.val(); if (!all) return showMsg("রেকর্ড নেই", "error");
                let html = `<div class="p-6 bg-white text-black text-[10px]"><h2 class="text-center font-black text-sm mb-4 border-b-2 pb-2 uppercase text-slate-800">মাসিক হাজিরা রিপোর্ট: ${m}/${y}</h2>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<h3 class="bg-slate-100 p-1.5 font-black text-center border mt-4">${cls} শ্রেণি</h3><table class="w-full border-collapse border border-slate-300 text-center"><thead><tr class="bg-slate-50"><th>রোল</th><th class="text-left">শিক্ষার্থীর নাম</th><th>উপস্থিতি</th><th>শতকরা (%)</th></tr></thead><tbody>`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            let p = 0, t = 0; Object.keys(all).forEach(d => { if (d.startsWith(`${y}-${m}`)) { t++; if (all[d][id] === "P") p++; } });
                            const pct = t > 0 ? ((p / t) * 100).toFixed(0) : 0;
                            html += `<tr><td class="border p-1">${toBn(window.allData[id].roll)}</td><td class="border p-1 text-left">${window.allData[id].name}</td><td class="border p-1">${toBn(p)}/${toBn(t)}</td><td class="border p-1 font-bold text-cyan-600">${toBn(pct)}%</td></tr>`;
                        });
                        html += `</tbody></table>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `<button onclick="window.print()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-2xl font-black no-print">প্রিন্ট রিপোর্ট</button></div>`;
                document.getElementById('viewModal').style.display = 'flex';
            });
        };

        window.generateSixMonthReport = (startM, endM) => {
            const y = document.getElementById('reportYear').value;
            const monthNames = ["", "জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
            get(ref(db, `attendance`)).then(snap => {
                const all = snap.val(); if (!all) return showMsg("রেকর্ড নেই", "error");
                let html = `<div class="p-6 bg-white text-black text-[8px] md:text-[9px]"><h2 class="text-center font-black text-sm mb-4 border-b-2 pb-2 uppercase">${toBn(y)} সালের ৬ মাসের সামারি রিপোর্ট</h2>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<div class="mb-4"><h3 class="bg-slate-800 text-white p-1 font-bold text-center border">${cls} শ্রেণি</h3>`;
                        html += `<table class="w-full border-collapse border border-slate-300 text-center"><thead><tr class="bg-slate-100"><th>রোল</th><th class="text-left">নাম</th>`;
                        for(let m = parseInt(startM); m <= parseInt(endM); m++) html += `<th>${monthNames[m]}</th>`;
                        html += `<th class="bg-cyan-50">মোট</th></tr></thead><tbody>`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            html += `<tr><td class="border p-1">${toBn(window.allData[id].roll)}</td><td class="border p-1 text-left">${window.allData[id].name}</td>`;
                            let total = 0;
                            for(let m = parseInt(startM); m <= parseInt(endM); m++){
                                let mKey = m.toString().padStart(2, '0'); let pCount = 0;
                                Object.keys(all).forEach(d => { if(d.startsWith(`${y}-${mKey}`) && all[d][id] === "P") pCount++; });
                                html += `<td class="border p-1">${toBn(pCount)}</td>`; total += pCount;
                            }
                            html += `<td class="border p-1 font-black bg-cyan-50">${toBn(total)}</td></tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `<button onclick="window.print()" class="w-full mt-6 bg-slate-900 text-white py-3 rounded-2xl font-black no-print">প্রিন্ট সামারি</button></div>`;
                document.getElementById('viewModal').style.display = 'flex';
            });
        };

        window.viewDailyReport = () => {
            const date = document.getElementById('attDate').value; if(!date) return showMsg("তারিখ দিন", "warning");
            get(ref(db, `attendance/${date}`)).then(snap => {
                const data = snap.val(); if(!data) return showMsg("রেকর্ড নেই", "error");
                let html = `<div class="p-6 bg-white text-black text-xs"><div class="flex justify-between items-center border-b pb-2 mb-4"><h2 class="font-black text-sm uppercase">দৈনিক হাজিরা: ${toBn(date)}</h2></div>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<div class="mb-4"><h3 class="bg-slate-100 p-1 font-bold text-center border">${cls} শ্রেণি</h3>`;
                        clsIds.sort((a,b)=>window.allData[a].roll-window.allData[b].roll).forEach(id => {
                            html += `<div class="flex justify-between border-b p-1 text-[10px]"><span>${window.allData[id].name} (${toBn(window.allData[id].roll)})</span><span class="${data[id]==='P'?'text-emerald-600 font-bold':'text-rose-600'}">${data[id]==='P'?'উপস্থিত':'অনুপস্থিত'}</span></div>`;
                        });
                        html += `</div>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `</div><button onclick="window.print()" class="w-full mt-4 bg-black text-white py-3 rounded-xl no-print font-bold">প্রিন্ট রিপোর্ট</button></div>`;
                document.getElementById('viewModal').style.display = 'flex';
            });
        };

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault(); const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('stName').value, className: document.getElementById('class').value, roll: document.getElementById('roll').value, birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value, photo: document.getElementById('photoBase64').value,
                fName: document.getElementById('fName').value, fDob: document.getElementById('fDob').value, fNid: document.getElementById('fNid').value, fMobile: document.getElementById('fMobile').value,
                mName: document.getElementById('mName').value, mDob: document.getElementById('mDob').value, mNid: document.getElementById('mNid').value, mMobile: document.getElementById('mMobile').value
            };
            set(key ? ref(db, `students/${key}`) : push(ref(db, 'students')), data).then(() => {
                showMsg("সংরক্ষিত!"); document.getElementById('studentForm').reset();
                document.getElementById('imagePreview').classList.add('hidden'); document.getElementById('imgLabel').classList.remove('hidden');
                switchTab('viewTab');
            });
        };

        window.initAttendance = () => {
            const d = document.getElementById('attDate').value; if(!d || !window.allData) return;
            const list = document.getElementById('attList'); list.innerHTML = ""; document.getElementById('saveAttBtn').classList.remove('hidden');
            ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                if(clsIds.length > 0) {
                    list.innerHTML += `<p class="text-[10px] font-bold text-cyan-500 mt-4 mb-2 uppercase border-l-2 border-cyan-500 pl-2">${cls} শ্রেণি</p>`;
                    clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                        list.innerHTML += `<div class="flex justify-between items-center p-3 glass mb-2 border-white/5"><span class="text-[11px] font-bold">${window.allData[id].name} (রোল: ${toBn(window.allData[id].roll)})</span><input type="checkbox" class="att-check w-6 h-6 accent-cyan-500" data-id="${id}" checked></div>`;
                    });
                }
            });
        };

        window.saveAttendance = () => {
            const d = document.getElementById('attDate').value; const att = {};
            document.querySelectorAll('.att-check').forEach(c => att[c.dataset.id] = c.checked ? "P" : "A");
            set(ref(db, `attendance/${d}`), att).then(() => { showMsg("হাজিরা সংরক্ষিত!"); loadData(); });
        };

        window.viewRec = (id) => {
            const s = window.allData[id]; const age = calculateAge(s.dob);
            document.getElementById('modalContent').innerHTML = `
                <div class="p-6 bg-white text-black rounded-3xl">
                    <div class="flex flex-col items-center gap-2 mb-6 border-b pb-6 text-center">
                        <img src="${s.photo || ''}" class="w-24 h-24 rounded-2xl border-4 border-cyan-500 object-cover shadow-xl">
                        <h2 class="text-xl font-black">${s.name}</h2>
                        <span class="bg-cyan-100 text-cyan-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">${s.className} শ্রেণি | রোল: ${toBn(s.roll)}</span>
                        <p class="text-[10px] mt-2 text-slate-500">বর্তমান বয়স: <span class="text-cyan-600 font-bold">${age}</span></p>
                    </div>
                    <div class="space-y-4 text-[11px]">
                        <div class="bg-slate-50 p-3 rounded-xl border">
                            <p><b>জন্ম নিবন্ধন:</b> ${toBn(s.birthReg)}</p>
                            <p><b>জন্ম তারিখ:</b> ${toBn(s.dob)}</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-4 bg-slate-50 rounded-2xl border border-cyan-100">
                                <p class="font-bold text-cyan-600 mb-2 border-b">পিতার তথ্য</p>
                                <p><b>নাম:</b> ${s.fName || '---'}</p>
                                <p><b>জন্ম তারিখ:</b> ${toBn(s.fDob)}</p>
                                <p><b>NID:</b> ${toBn(s.fNid)}</p>
                                <p><b>মোবাইল:</b> ${toBn(s.fMobile)}</p>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl border border-rose-100">
                                <p class="font-bold text-rose-600 mb-2 border-b">মাতার তথ্য</p>
                                <p><b>নাম:</b> ${s.mName || '---'}</p>
                                <p><b>জন্ম তারিখ:</b> ${toBn(s.mDob)}</p>
                                <p><b>NID:</b> ${toBn(s.mNid)}</p>
                                <p><b>মোবাইল:</b> ${toBn(s.mMobile)}</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="window.print()" class="w-full mt-6 bg-slate-900 text-white py-3.5 rounded-2xl font-black no-print shadow-lg active:scale-95">প্রিন্ট আইডি কার্ড</button>
                </div>`;
            document.getElementById('viewModal').style.display = 'flex'; lucide.createIcons();
        };

        window.editRec = (id) => {
            const s = window.allData[id]; document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name; document.getElementById('class').value = s.className;
            document.getElementById('roll').value = s.roll; document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob; 
            document.getElementById('fName').value = s.fName || ''; document.getElementById('fDob').value = s.fDob || '';
            document.getElementById('fNid').value = s.fNid || ''; document.getElementById('fMobile').value = s.fMobile || '';
            document.getElementById('mName').value = s.mName || ''; document.getElementById('mDob').value = s.mDob || '';
            document.getElementById('mNid').value = s.mNid || ''; document.getElementById('mMobile').value = s.mMobile || '';
            if(s.photo) { document.getElementById('photoBase64').value = s.photo; document.getElementById('imagePreview').src = s.photo; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgLabel').classList.add('hidden'); }
            switchTab('entryTab');
        };

        window.processImage = (e) => {
            const reader = new FileReader(); reader.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoBase64').value = b64; document.getElementById('imagePreview').src = b64;
                    document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgLabel').classList.add('hidden');
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(e.target.files[0]);
        };
        window.closeModal = () => document.getElementById('viewModal').style.display = 'none';
        window.toggleTheme = () => { document.body.classList.toggle('light-mode'); lucide.createIcons(); };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('searchBar').oninput = (e) => loadData(e.target.value);
        lucide.createIcons();
    </script>
</body>
</html>

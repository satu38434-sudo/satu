<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল ম্যানেজমেন্ট সিস্টেম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; padding: 12px 16px; border-radius: 12px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } .print-area { display: block !important; } }
    </style>
</head>
<body class="antialiased">

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center px-4">
        <div class="glass p-10 rounded-[45px] w-full max-w-md shadow-2xl text-center">
            <h2 class="text-2xl font-bold mb-8 tracking-widest text-blue-500 uppercase">সিস্টেম লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল আইডি">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print glass sticky top-0 z-50 p-4 mb-6 border-b border-white/5">
            <div class="max-w-[1400px] mx-auto flex justify-between items-center">
                <h1 class="font-black text-2xl tracking-tighter text-blue-500">CORE<span class="text-white">DB</span></h1>
                <div class="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-white/5">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2 text-sm font-bold rounded-xl transition-all tab-active">তালিকা</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2 text-sm font-bold rounded-xl text-slate-400">নতুন এন্ট্রি</button>
                </div>
                <button id="logoutBtn" class="text-red-400 text-xs font-bold uppercase px-4 py-2 rounded-xl border border-red-500/20 hover:bg-red-500/10">লগ আউট</button>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-4">
            <div class="mb-8 flex items-center gap-3 bg-white/5 p-3 rounded-2xl inline-flex border border-white/5">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-500 animate-pulse"></div>
                <h3 id="roleText" class="text-xs font-bold tracking-wide text-slate-300">যাচাই করা হচ্ছে...</h3>
            </div>

            <div id="entryTab" class="hidden no-print glass p-8 rounded-[40px] shadow-2xl mb-10">
                <form id="studentForm">
                    <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                    
                    <div class="flex flex-col md:flex-row gap-8 mb-10 items-center">
                        <div class="w-40 h-40 bg-slate-800 rounded-3xl border-2 border-dashed border-slate-600 flex items-center justify-center overflow-hidden relative group">
                            <img id="imagePreview" class="hidden w-full h-full object-cover">
                            <div id="imgPlaceholder" class="text-center">
                                <span class="text-slate-500 text-[10px] font-bold block uppercase">ছবি নির্বাচন</span>
                                <span class="text-slate-600 text-[8px] mt-1 block">(২০০x২০০ পিক্সেল)</span>
                            </div>
                            <input type="file" id="stPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1 w-full">
                            <div><label class="text-xs text-slate-500 mb-2 block font-bold">শিক্ষার্থীর নাম</label><input type="text" id="stName" required></div>
                            <div><label class="text-xs text-slate-500 mb-2 block font-bold">শ্রেণি</label>
                                <select id="class">
                                    <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option><option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option><option value="৫ম">৫ম শ্রেণি</option>
                                </select>
                            </div>
                            <div><label class="text-xs text-slate-500 mb-2 block font-bold">রোল নম্বর</label><input type="number" id="roll" required></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div><label class="text-xs text-slate-500 mb-2 block font-bold">জন্ম নিবন্ধন নম্বর</label><input type="text" id="birthReg"></div>
                        <div><label class="text-xs text-slate-500 mb-2 block font-bold">জন্ম তারিখ</label><input type="date" id="dob"></div>
                        <div><label class="text-xs text-slate-500 mb-2 block font-bold">রক্তের গ্রুপ</label>
                            <select id="bloodGroup">
                                <option value="">নির্বাচন করুন</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option><option value="AB+">AB+</option><option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                        <div class="p-8 bg-white/5 rounded-[30px] border border-white/5">
                            <h4 class="text-blue-400 text-xs font-bold mb-6 uppercase tracking-widest border-b border-white/10 pb-2">পিতার তথ্য</h4>
                            <div class="space-y-4">
                                <input type="text" id="fName" placeholder="পিতার নাম">
                                <input type="text" id="fMobile" placeholder="পিতার মোবাইল নম্বর">
                                <input type="text" id="fNid" placeholder="পিতার এনআইডি">
                            </div>
                        </div>
                        <div class="p-8 bg-white/5 rounded-[30px] border border-white/5">
                            <h4 class="text-pink-400 text-xs font-bold mb-6 uppercase tracking-widest border-b border-white/10 pb-2">মাতার তথ্য</h4>
                            <div class="space-y-4">
                                <input type="text" id="mName" placeholder="মাতার নাম">
                                <input type="text" id="mMobile" placeholder="মাতার মোবাইল নম্বর">
                                <input type="text" id="mNid" placeholder="মাতার এনআইডি">
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4">
                        <button type="button" onclick="document.getElementById('studentForm').reset();" class="px-8 py-4 rounded-2xl text-slate-400 font-bold hover:bg-white/5 transition-all">রিসেট</button>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-2xl font-bold transition-all active:scale-95 shadow-xl shadow-blue-500/20">ডাটা সেভ করুন</button>
                    </div>
                </form>
            </div>

            <div id="viewTab" class="glass rounded-[45px] shadow-2xl overflow-hidden mb-10">
                <div class="p-8 flex flex-col md:flex-row justify-between items-center border-b border-white/5 gap-4">
                    <h2 class="font-bold text-slate-400 text-xs uppercase tracking-widest">রেজিস্ট্রি ডাটাবেস</h2>
                    <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="p-3 px-6 rounded-2xl w-full md:w-80 outline-none text-xs focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] uppercase tracking-wider text-slate-500 bg-slate-900/30">
                            <tr>
                                <th class="p-6 font-bold">প্রোফাইল</th>
                                <th class="p-6 font-bold">শিক্ষার্থীর নাম ও রোল</th>
                                <th class="p-6 font-bold">অভিভাবক ও যোগাযোগ</th>
                                <th class="p-6 font-bold text-center no-print">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="text-sm divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const roleText = document.getElementById('roleText');
                const dot = document.getElementById('statusDot');
                const u = user.uid;

                // লজিক সংকেত
                const checkA = u.startsWith("Q9AUB") && u.endsWith("Cx1");
                const checkH = u.startsWith("BcQX") && u.includes("WMHQkJN");

                if (checkA) {
                    window.currentUserRole = "admin";
                    roleText.innerText = "পদবি: অ্যাডমিন";
                    dot.className = "w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_#3b82f6]";
                } else if (checkH) {
                    window.currentUserRole = "head_teacher";
                    roleText.innerText = "পদবি: প্রধান শিক্ষক";
                    dot.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                } else {
                    window.currentUserRole = "teacher";
                    roleText.innerText = "পদবি: সহকারী শিক্ষক";
                    dot.className = "w-3 h-3 rounded-full bg-slate-500";
                }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        // ২০০x২০০ ইমেজ প্রসেসিং
        document.getElementById('stPhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200; canvas.height = 200;
                        const ctx = canvas.getContext('2d');
                        let side = Math.min(img.width, img.height);
                        let x = (img.width - side) / 2;
                        let y = (img.height - side) / 2;
                        ctx.drawImage(img, x, y, side, side, 0, 0, 200, 200);
                        const compressed = canvas.toDataURL('image/jpeg', 0.4);
                        document.getElementById('photoBase64').value = compressed;
                        document.getElementById('imagePreview').src = compressed;
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('imgPlaceholder').classList.add('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        window.switchTab = (id) => {
            document.getElementById('entryTab').classList.toggle('hidden', id !== 'entryTab');
            document.getElementById('viewTab').classList.toggle('hidden', id !== 'viewTab');
            document.getElementById('btnView').classList.toggle('tab-active', id === 'viewTab');
            document.getElementById('btnEntry').classList.toggle('tab-active', id === 'entryTab');
        };

        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert('লগইন ব্যর্থ!'));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function loadData(searchTerm = "") {
            onValue(ref(db, 'students'), (snapshot) => {
                const body = document.getElementById('studentTableBody');
                body.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;

                Object.keys(data).sort((a,b) => data[a].roll - data[b].roll).forEach(id => {
                    const s = data[id];
                    if (s.name.includes(searchTerm) || s.roll.toString().includes(searchTerm)) {
                        body.innerHTML += `
                            <tr class="hover:bg-white/5 transition-all group">
                                <td class="p-6">
                                    <img src="${s.photo || 'https://via.placeholder.com/200'}" class="w-14 h-14 rounded-2xl object-cover border border-white/10 group-hover:border-blue-500/50 transition-all">
                                </td>
                                <td class="p-6">
                                    <div class="font-bold text-slate-200">${s.name}</div>
                                    <div class="text-[10px] text-blue-500 font-mono mt-1">শ্রেণি: ${s.className} | রোল: ${s.roll}</div>
                                </td>
                                <td class="p-6 text-xs text-slate-400">
                                    <div>পিতা: ${s.fName || '-'} <span class="text-slate-600">(${s.fMobile || ''})</span></div>
                                    <div>মাতা: ${s.mName || '-'} <span class="text-slate-600">(${s.mMobile || ''})</span></div>
                                </td>
                                <td class="p-6 no-print text-center">
                                    <div class="flex justify-center gap-2">
                                        <button onclick="editRec('${id}')" class="p-3 bg-white/5 rounded-xl hover:bg-blue-600/20 text-blue-400 transition-all">সম্পাদনা</button>
                                        ${window.currentUserRole === 'admin' ? `<button onclick="deleteRec('${id}')" class="p-3 bg-white/5 rounded-xl hover:bg-red-600/20 text-red-400 transition-all">মুছুন</button>` : ''}
                                    </div>
                                </td>
                            </tr>`;
                    }
                });
            });
        }

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const student = {
                name: document.getElementById('stName').value, 
                roll: document.getElementById('roll').value, 
                className: document.getElementById('class').value,
                photo: document.getElementById('photoBase64').value,
                birthReg: document.getElementById('birthReg').value,
                dob: document.getElementById('dob').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                fName: document.getElementById('fName').value, 
                fMobile: document.getElementById('fMobile').value,
                fNid: document.getElementById('fNid').value,
                mName: document.getElementById('mName').value, 
                mMobile: document.getElementById('mMobile').value,
                mNid: document.getElementById('mNid').value
            };
            set(id ? ref(db, `students/${id}`) : push(ref(db, 'students')), student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('imgPlaceholder').classList.remove('hidden');
                document.getElementById('editKey').value = "";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('photoBase64').value = s.photo || "";
            document.getElementById('birthReg').value = s.birthReg || "";
            document.getElementById('dob').value = s.dob || "";
            document.getElementById('bloodGroup').value = s.bloodGroup || "";
            document.getElementById('fName').value = s.fName || ""; 
            document.getElementById('fMobile').value = s.fMobile || "";
            document.getElementById('fNid').value = s.fNid || "";
            document.getElementById('mName').value = s.mName || ""; 
            document.getElementById('mMobile').value = s.mMobile || "";
            document.getElementById('mNid').value = s.mNid || "";
            if(s.photo) {
                document.getElementById('imagePreview').src = s.photo;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imgPlaceholder').classList.add('hidden');
            }
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { 
            if(window.currentUserRole === 'admin') {
                if(confirm("আপনি কি নিশ্চিতভাবে মুছে ফেলতে চান?")) remove(ref(db, `students/${id}`)); 
            } else { alert("অনুমতি নেই!"); }
        };

        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));
    </script>
</body>
</html>

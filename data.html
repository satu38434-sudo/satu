<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ্যালয়</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #006a4e; --sidebar-bg: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Kalpurush', sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar & Menu */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: none; flex-direction: column; z-index: 1000; position: relative; }
        #menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 1100; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .sidebar-header { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); }
        .role-tag { font-size: 11px; background: #fbbf24; color: #000; padding: 3px 10px; border-radius: 12px; margin-top: 8px; display: inline-block; font-weight: bold; }

        /* Content Area */
        #main-content { flex: 1; overflow-y: auto; display: none; padding: 20px; padding-top: 75px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* Tables & Stats */
        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th { background: #f8fafc; color: var(--primary); padding: 15px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 13.5px; vertical-align: top; }
        .stu-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
        .info-label { color: #64748b; font-size: 11px; font-weight: bold; display: block; margin-top: 3px; }

        /* Charts */
        .charts-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; }

        /* Login UI */
        #login-container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--primary); position: fixed; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 360px; text-align: center; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; font-family: 'Kalpurush'; box-sizing: border-box; }

        .btn-edit { background: #f59e0b; color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; margin-right: 5px; font-weight: bold; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-del:disabled { opacity: 0.3; cursor: not-allowed; }

        @media (max-width: 768px) { #sidebar { position: fixed; height: 100vh; left: -260px; display: flex; } #sidebar.open { left: 0; } #menu-toggle { display: block; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<button id="menu-toggle">☰ মেনু</button>

<div id="login-container">
    <div class="login-box">
        <h2 style="color:var(--primary)">স্কুল ম্যানেজমেন্ট</h2>
        <input type="email" id="loginEmail" placeholder="ইমেইল">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
        <button id="loginBtn" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">লগইন</button>
    </div>
</div>

<aside id="sidebar">
    <div class="sidebar-header">
        <h3>ড্যাশবোর্ড</h3>
        <span id="userBadge" class="role-tag">লোডিং...</span>
    </div>
    <div class="nav-item active" data-sec="dashboard-sec">📊 পরিসংখ্যান</div>
    <div class="nav-item" data-sec="entry-sec">📝 ভর্তি ও সংশোধন</div>
    <div class="nav-item" data-sec="list-sec">📋 শিক্ষার্থী তালিকা</div>
    <div id="adminPanel" style="display: none; border-top: 1px solid #334155; margin-top: 20px;">
        <div class="nav-item" id="addDemoBtn" style="color:#10b981">✨ ডেমো ডাটা (Admin)</div>
    </div>
    <div class="nav-item" id="logoutBtn" style="color:#fb7185; margin-top: auto;">🚪 লগআউট</div>
</aside>

<main id="main-content">
    <section id="dashboard-sec">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div class="card" style="text-align: center;">মোট শিক্ষার্থী<h2 id="totalCount">0</h2></div>
            <div class="card" style="text-align: center;">ছাত্র<h2 id="boyCount" style="color:#3b82f6">0</h2></div>
            <div class="card" style="text-align: center;">ছাত্রী<h2 id="girlCount" style="color:#ec4899">0</h2></div>
        </div>
        <div class="charts-container">
            <div class="chart-box"><h3>লিঙ্গ অনুপাত</h3><canvas id="genderChart"></canvas></div>
            <div class="chart-box"><h3>বয়স ভিত্তিক</h3><canvas id="ageChart"></canvas></div>
        </div>
    </section>

    <section id="entry-sec" class="hidden">
        <div class="card">
            <h2 id="formTitle">নতুন শিক্ষার্থী ভর্তি</h2>
            <form id="studentForm">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px;">
                    <div><label>নাম</label><input type="text" id="name" required></div>
                    <div><label>রোল</label><input type="number" id="roll" required></div>
                    <div><label>শ্রেণি</label>
                        <select id="className">
                            <option value="প্রাক">প্রাক-প্রাথমিক</option><option value="১ম">১ম</option>
                            <option value="২য়">২য়</option><option value="৩য়">৩য়</option>
                            <option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                        </select>
                    </div>
                    <div><label>লিঙ্গ</label><select id="gender"><option value="ছাত্র">ছাত্র</option><option value="ছাত্রী">ছাত্রী</option></select></div>
                    <div><label>জন্ম তারিখ</label><input type="date" id="dob" required max="2026-03-26"></div>
                    <div><label>পিতার মোবাইল</label><input type="tel" id="fMobile"></div>
                    <div><label>ছবি</label><input type="file" id="photoInput" accept="image/*"></div>
                </div>
                <button type="submit" id="saveBtn" style="margin-top:20px; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; width:100%">সংরক্ষণ করুন</button>
            </form>
        </div>
    </section>

    <section id="list-sec" class="hidden">
        <div class="card">
            <h2 style="color:var(--primary)">শিক্ষার্থী ডাটাবেস</h2>
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>ছবি</th>
                            <th>নাম ও রোল</th>
                            <th>শ্রেণি</th>
                            <th>মোবাইল</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="listBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_UID = "MwpHepH5wSPqDF4B3hXKjek4vtq2";
    let isAdmin = false, allStudents = [], editId = null, charts = {};

    // Auth Handling
    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(e => Swal.fire('Error', 'ভুল তথ্য', 'error'));
    logoutBtn.onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => {
        if(user) {
            isAdmin = (user.uid === ADMIN_UID);
            userBadge.innerText = isAdmin ? "অ্যাডমিন এক্সেস" : "শিক্ষক (ইউজার)";
            adminPanel.style.display = isAdmin ? "block" : "none";
            login_container.classList.add('hidden');
            sidebar.style.display = 'flex';
            main_content.style.display = 'block';
            syncData();
        }
    });

    // Navigation
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            const id = btn.dataset.sec; if(!id) return;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }
    });

    // Real-time Sync & Class-wise Sorting
    function syncData() {
        onSnapshot(collection(db, "students"), snap => {
            allStudents = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const rank = { "প্রাক": 1, "১ম": 2, "২য়": 3, "৩য়": 4, "৪র্থ": 5, "৫ম": 6 };
            allStudents.sort((a,b) => (rank[a.className] - rank[b.className]) || (a.roll - b.roll));
            updateUI();
        });
    }

    function updateUI() {
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = '';
        let s = { ছাত্র: 0, ছাত্রী: 0 }, aGroup = { "৫-৭": 0, "৮-১০": 0, "১১+": 0 };

        allStudents.forEach(stu => {
            s[stu.gender]++;
            const age = Math.floor((new Date() - new Date(stu.dob)) / 31557600000);
            if(age <= 7) aGroup["৫-৭"]++; else if(age <= 10) aGroup["৮-১০"]++; else aGroup["১১+"]++;

            listBody.innerHTML += `
                <tr>
                    <td><img src="${stu.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="stu-img"></td>
                    <td><b>${stu.name}</b><br><span class="info-label">রোল: ${stu.roll}</span></td>
                    <td>${stu.className}</td>
                    <td>${stu.fMobile || '-'}</td>
                    <td><button class="btn-edit" onclick="window.editStu('${stu.id}')">এডিট</button>
                        <button class="btn-del" ${!isAdmin ? 'disabled' : ''} onclick="window.delStu('${stu.id}')">ডিলিট</button></td>
                </tr>`;
        });
        totalCount.innerText = allStudents.length; boyCount.innerText = s.ছাত্র; girlCount.innerText = s.ছাত্রী;
        renderCharts(s, aGroup);
    }

    // Form Handling
    studentForm.onsubmit = async (e) => {
        e.preventDefault();
        const r = parseInt(roll.value), c = className.value;
        if(allStudents.some(x => x.id !== editId && x.roll === r && x.className === c)) 
            return Swal.fire('সতর্কতা', 'এই ক্লাসে এই রোলটি আছে!', 'warning');

        let img = editId ? (allStudents.find(x => x.id === editId).photo || "") : "";
        if(photoInput.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(photoInput.files[0]);
            img = await new Promise(res => reader.onload = e => res(e.target.result));
        }

        const data = { name: name.value, roll: r, className: c, gender: gender.value, dob: dob.value, fMobile: fMobile.value, photo: img };
        try {
            if(editId) { await updateDoc(doc(db, "students", editId), data); editId = null; }
            else { await addDoc(collection(db, "students"), data); }
            Swal.fire('সফল!', 'তথ্য সংরক্ষিত', 'success');
            studentForm.reset(); document.querySelector('[data-sec="list-sec"]').click();
        } catch(err) { Swal.fire('Error', err.message, 'error'); }
    };

    window.editStu = (id) => {
        const stu = allStudents.find(x => x.id === id); editId = id;
        name.value = stu.name; roll.value = stu.roll; className.value = stu.className;
        gender.value = stu.gender; dob.value = stu.dob; fMobile.value = stu.fMobile;
        document.querySelector('[data-sec="entry-sec"]').click();
        formTitle.innerText = "সংশোধন: " + stu.name;
    };

    window.delStu = async (id) => {
        if(!isAdmin) return;
        const res = await Swal.fire({ title: 'নিশ্চিত?', icon: 'warning', showCancelButton: true });
        if(res.isConfirmed) await deleteDoc(doc(db, "students", id));
    };

    function renderCharts(s, a) {
        if(charts.g) charts.g.destroy(); if(charts.a) charts.a.destroy();
        charts.g = new Chart(genderChart, { type: 'doughnut', data: { labels: ['ছাত্র','ছাত্রী'], datasets: [{ data: [s.ছাত্র, s.ছাত্রী], backgroundColor: ['#3b82f6','#ec4899'] }] }});
        charts.a = new Chart(ageChart, { type: 'bar', data: { labels: Object.keys(a), datasets: [{ label: 'শিক্ষার্থী', data: Object.values(a), backgroundColor: '#006a4e' }] }});
    }

    addDemoBtn.onclick = async () => {
        await addDoc(collection(db, "students"), { name: "আরিফ", roll: 1, className: "৫ম", gender: "ছাত্র", dob: "2015-01-01", fMobile: "017000000" });
        Swal.fire('সফল', 'ডেমো ডাটা যুক্ত হয়েছে', 'success');
    };
</script>
</body>
</html>

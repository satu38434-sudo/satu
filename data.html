<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Manager | Admin & Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* প্রিমিয়াম বাংলা টাইপোগ্রাফি */
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Siyam Rupali', 'Hind Siliguri', sans-serif; 
            background-color: #f8fafc; 
            letter-spacing: 0.2px; 
            line-height: 1.6;
        }

        .tab-active { 
            background: #2563eb !important; 
            color: white !important; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }

        .student-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0; 
            background: white;
        }

        .student-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); 
            border-color: #3b82f6; 
        }

        input::placeholder, select {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 0.9rem !important;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center bg-[#0f172a] px-4">
        <div class="bg-white/5 backdrop-blur-xl p-10 rounded-[40px] w-full max-w-md border border-white/10 shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-2xl shadow-lg shadow-blue-500/20">🎓</div>
            <h2 class="text-2xl font-black text-white mb-8">SMS লগইন প্যানেল</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল এড্রেস" class="w-full p-4 rounded-2xl bg-white/5 text-white outline-none border border-white/10 focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="w-full p-4 rounded-2xl bg-white/5 text-white outline-none border border-white/10 focus:ring-2 focus:ring-blue-500">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all active:scale-95">লগইন করুন</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="no-print bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="font-black text-slate-800 tracking-tight hidden sm:block">SMS DASHBOARD</h1>
                <div class="flex bg-slate-100 p-1 rounded-2xl">
                    <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active">ম্যানেজমেন্ট</button>
                    <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500">নতুন এন্ট্রি</button>
                </div>
                <button id="logoutBtn" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl hover:bg-red-100 font-bold text-xs">লগ আউট</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-8">
            <div id="adminStats" class="hidden no-print grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white p-6 rounded-[30px] border border-slate-100 shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">মোট শিক্ষার্থী</p>
                    <h3 id="totalStudents" class="text-3xl font-black text-slate-800">0</h3>
                </div>
                <div class="bg-blue-600 p-6 rounded-[30px] shadow-lg shadow-blue-500/20">
                    <p class="text-[10px] font-bold text-blue-100 uppercase mb-1">অ্যাকাউন্ট টাইপ</p>
                    <h3 id="roleText" class="text-white font-black text-lg italic">USER</h3>
                </div>
            </div>

            <div id="entryTab" class="hidden no-print fade-in">
                <div class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="bg-slate-900 p-8 text-center"><h2 class="text-xl font-black text-white">শিক্ষার্থী নিবন্ধন ফরম</h2></div>
                    <form id="studentForm" class="p-8 md:p-12">
                        <input type="hidden" id="editKey">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">নাম</label>
                                <input type="text" id="stName" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/20 font-semibold" required>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">শ্রেণি</label>
                                <select id="class" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                                    <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                    <option value="১ম">১ম শ্রেণি</option><option value="২য়">২য় শ্রেণি</option><option value="৩য়">৩য় শ্রেণি</option><option value="৪র্থ">৪র্থ শ্রেণি</option><option value="৫ম">৫ম শ্রেণি</option>
                                </select>
                            </div>
                            <input type="number" id="roll" placeholder="রোল" class="p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                            <input type="text" id="birthReg" maxlength="17" placeholder="জন্ম নিবন্ধন (১৭ ডিজিট)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold tracking-widest" required>
                            <input type="date" id="dob" class="p-4 bg-slate-50 rounded-2xl outline-none font-semibold" required>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            <div class="bg-blue-50/40 p-6 rounded-[30px] space-y-3">
                                <h4 class="text-[10px] font-bold text-blue-600 uppercase">পিতার তথ্য</h4>
                                <input type="text" id="fName" placeholder="পিতার নাম" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                                <input type="text" id="fNid" maxlength="17" placeholder="পিতার NID" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                                <input type="date" id="fDob" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                            </div>
                            <div class="bg-pink-50/40 p-6 rounded-[30px] space-y-3">
                                <h4 class="text-[10px] font-bold text-pink-600 uppercase">মাতার তথ্য</h4>
                                <input type="text" id="mName" placeholder="মাতার নাম" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                                <input type="text" id="mNid" maxlength="17" placeholder="মাতার NID" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                                <input type="date" id="mDob" class="w-full p-3 bg-white rounded-xl outline-none shadow-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            <input type="text" id="mobile" maxlength="11" placeholder="মোবাইল নম্বর (১১ ডিজিট)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold" required>
                            <div class="relative w-full h-[60px] bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center px-4">
                                <input type="file" id="photoFile" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                                <span class="text-xs text-slate-400 font-bold">ছবি নির্বাচন করুন...</span>
                                <input type="hidden" id="base64Photo">
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase shadow-xl hover:bg-blue-600 transition-all">সংরক্ষণ করুন</button>
                    </form>
                </div>
            </div>

            <div id="viewTab" class="fade-in">
                <div class="flex flex-col md:flex-row gap-6 justify-between items-center mb-10">
                    <h2 class="text-2xl font-black text-slate-800 italic">STUDENT LIST</h2>
                    <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="w-full md:w-80 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none">
                </div>
                <div id="studentContainer" class="space-y-12"></div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xl rounded-[40px] overflow-hidden shadow-2xl fade-in">
            <div id="modalContent" class="p-8 md:p-12"></div>
            <div class="p-6 bg-slate-50 flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black">প্রিন্ট</button>
                <button onclick="closeModal()" class="flex-1 bg-white border py-4 rounded-2xl font-black text-slate-400">বন্ধ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4",
            authDomain: "my-school-database.firebaseapp.com",
            projectId: "my-school-database",
            databaseURL: "https://my-school-database-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const ADMIN_UID = "Q9AUB3tOiAYAO9HebLAPpKbjDCx1";

        const calculateAge = (dob) => {
            if(!dob) return "N/A";
            const birth = new Date(dob);
            const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if(d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if(m < 0) { y--; m += 12; }
            return `${y} বছর ${m} মাস ${d} দিন`;
        };

        window.switchTab = (tabId) => {
            document.getElementById('entryTab').classList.add('hidden');
            document.getElementById('viewTab').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btnView').className = tabId === 'viewTab' ? 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active' : 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500';
            document.getElementById('btnEntry').className = tabId === 'entryTab' ? 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all tab-active' : 'px-6 py-2.5 text-xs font-bold rounded-xl transition-all text-slate-500';
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('roleText').innerText = user.uid === ADMIN_UID ? "ADMIN" : "STAFF";
                if(user.uid === ADMIN_UID) document.getElementById('adminStats').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(() => alert('ভুল ইমেইল/পাসওয়ার্ড!'));
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        document.getElementById('photoFile').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 180; canvas.height = 180;
                    canvas.getContext('2d').drawImage(img, 0, 0, 180, 180);
                    document.getElementById('base64Photo').value = canvas.toDataURL('image/jpeg', 0.6);
                };
            };
            reader.readAsDataURL(file);
        });

        function loadData(searchTerm = "") {
            const user = auth.currentUser;
            onValue(ref(db, 'students'), (snapshot) => {
                const container = document.getElementById('studentContainer');
                container.innerHTML = "";
                const data = snapshot.val() || {};
                window.allData = data;
                
                if(user.uid === ADMIN_UID) document.getElementById('totalStudents').innerText = Object.keys(data).length;

                const classes = ["প্রাক-প্রাথমিক", "১ম", "২য়", "৩য়", "৪র্থ", "৫ম"];
                classes.forEach(cls => {
                    const filtered = Object.keys(data).filter(id => {
                        const s = data[id];
                        const match = s.name.toLowerCase().includes(searchTerm.toLowerCase()) || s.roll.toString().includes(searchTerm);
                        return s.className === cls && match;
                    });

                    if (filtered.length > 0) {
                        const section = document.createElement('div');
                        section.innerHTML = `<div class="flex items-center gap-4 mb-6"><span class="bg-slate-900 text-white px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest">${cls}</span><div class="h-[1px] flex-1 bg-slate-200"></div><span class="text-[10px] text-slate-400 font-bold">${filtered.length} জন</span></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>`;
                        const grid = section.querySelector('div:last-child');
                        filtered.forEach(id => {
                            const s = data[id];
                            const isAdmin = (user.uid === ADMIN_UID);
                            grid.innerHTML += `
                                <div class="student-card p-6 rounded-[32px] flex flex-col items-center text-center">
                                    <img src="${s.photo || 'https://via.placeholder.com/100'}" class="w-20 h-20 rounded-full border-4 border-white shadow-xl mb-4 object-cover">
                                    <h3 class="font-bold text-slate-800 mb-1">${s.name}</h3>
                                    <div class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">রোল: ${s.roll}</div>
                                    <div class="text-[9px] font-bold text-slate-400 mt-2">বয়স: ${calculateAge(s.dob)}</div>
                                    <div class="flex gap-2 w-full mt-6">
                                        <button onclick="viewRec('${id}')" class="flex-1 bg-slate-50 text-slate-600 py-2.5 rounded-xl text-[10px] font-black hover:bg-slate-900 hover:text-white transition-all">VIEW</button>
                                        <button onclick="editRec('${id}')" class="flex-1 bg-blue-50 text-blue-600 py-2.5 rounded-xl text-[10px] font-black hover:bg-blue-600 hover:text-white transition-all">EDIT</button>
                                        ${isAdmin ? `<button onclick="deleteRec('${id}')" class="bg-red-50 text-red-400 p-2.5 rounded-xl hover:bg-red-500 hover:text-white transition-all">DEL</button>` : ''}
                                    </div>
                                </div>`;
                        });
                        container.appendChild(section);
                    }
                });
            });
        }

        window.viewRec = (id) => {
            const s = window.allData[id];
            document.getElementById('modalContent').innerHTML = `
                <div class="flex flex-col items-center text-center mb-8">
                    <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-[35px] shadow-2xl mb-4 object-cover">
                    <h2 class="text-xl font-black text-slate-800">${s.name}</h2>
                    <p class="text-blue-600 font-black uppercase text-[10px] tracking-widest">${s.className} | রোল: ${s.roll}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-slate-50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-slate-400 mb-1 uppercase">জন্ম নিবন্ধন নম্বর</p><p class="text-sm font-black text-slate-800 tracking-widest">${s.birthReg}</p></div>
                    <div class="bg-blue-50/50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-blue-400 mb-1 uppercase">পিতার তথ্য</p><p class="text-xs font-bold">${s.father || '-'}</p><p class="text-[9px] text-slate-400">${s.fNid || ''}</p></div>
                    <div class="bg-pink-50/50 p-4 rounded-3xl"><p class="text-[9px] font-bold text-pink-400 mb-1 uppercase">মাতার তথ্য</p><p class="text-xs font-bold">${s.mother || '-'}</p><p class="text-[9px] text-slate-400">${s.mNid || ''}</p></div>
                    <div class="col-span-2 bg-green-50 p-5 rounded-3xl flex justify-between items-center">
                        <div><p class="text-[9px] font-black text-green-600 uppercase">জরুরী যোগাযোগ</p><p class="text-lg font-black">${s.mobile}</p></div>
                        <div class="text-right"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">বয়স</p><p class="text-xs font-black text-blue-600">${calculateAge(s.dob)}</p></div>
                    </div>
                    <div class="col-span-2 text-center pt-2"><p class="text-[8px] font-bold text-slate-300 uppercase">Entry By: ${s.creatorEmail || 'Admin'}</p></div>
                </div>
            `;
            document.getElementById('viewModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');
        document.getElementById('searchBar').addEventListener('input', (e) => loadData(e.target.value));

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editKey').value;
            const user = auth.currentUser;
            const student = {
                name: document.getElementById('stName').value, roll: document.getElementById('roll').value,
                className: document.getElementById('class').value, birthReg: document.getElementById('birthReg').value,
                dob: document.getElementById('dob').value, 
                father: document.getElementById('fName').value, fNid: document.getElementById('fNid').value, fDob: document.getElementById('fDob').value,
                mother: document.getElementById('mName').value, mNid: document.getElementById('mNid').value, mDob: document.getElementById('mDob').value,
                mobile: document.getElementById('mobile').value, photo: document.getElementById('base64Photo').value,
                createdBy: id ? window.allData[id].createdBy : user.uid,
                creatorEmail: id ? window.allData[id].creatorEmail : user.email,
                createdAt: id ? window.allData[id].createdAt : new Date().toISOString().split('T')[0]
            };
            const saveRef = id ? ref(db, `students/${id}`) : push(ref(db, 'students'));
            set(saveRef, student).then(() => {
                document.getElementById('studentForm').reset();
                document.getElementById('editKey').value = "";
                document.getElementById('base64Photo').value = "";
                document.getElementById('submitBtn').innerText = "সংরক্ষণ করুন";
                switchTab('viewTab');
            });
        });

        window.editRec = (id) => {
            const s = window.allData[id];
            document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name;
            document.getElementById('roll').value = s.roll;
            document.getElementById('class').value = s.className;
            document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob;
            document.getElementById('fName').value = s.father || "";
            document.getElementById('fNid').value = s.fNid || "";
            document.getElementById('fDob').value = s.fDob || "";
            document.getElementById('mName').value = s.mother || "";
            document.getElementById('mNid').value = s.mNid || "";
            document.getElementById('mDob').value = s.mDob || "";
            document.getElementById('mobile').value = s.mobile || "";
            document.getElementById('base64Photo').value = s.photo || "";
            document.getElementById('submitBtn').innerText = "আপডেট করুন";
            switchTab('entryTab');
        };

        window.deleteRec = (id) => { 
            if(confirm("আপনি কি নিশ্চিতভাবে মুছে ফেলতে চান?")) {
                remove(ref(db, `students/${id}`))
                .catch(() => alert("দুঃখিত! আপনার মুছে ফেলার অনুমতি নেই।"));
            }
        };
    </script>
</body>
</html>

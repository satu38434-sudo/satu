<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #22d3ee; --border: rgba(255, 255, 255, 0.08); }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: rgba(0, 0, 0, 0.08); --accent: #0891b2; }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.4s; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; }
        .input-style { background: rgba(0,0,0,0.15) !important; border: 1.5px solid var(--border) !important; color: var(--text) !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .input-style:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }
        .tab-active { background: linear-gradient(135deg, #0891b2, #22d3ee) !important; color: #fff !important; transform: translateY(-2px); box-shadow: 0 10px 15px rgba(34, 211, 238, 0.3); }
        .photo-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 16px; border: 2px solid var(--accent); }
        @media print { 
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            #viewModal { position: absolute; left: 0; top: 0; width: 100%; display: block !important; visibility: visible; }
            .glass { border: none !important; box-shadow: none !important; background: transparent !important; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b px-4 py-4 no-print mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500 p-2 rounded-xl shadow-lg shadow-cyan-500/20"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 id="userGreeting" class="text-sm md:text-xl font-black leading-tight">লোড হচ্ছে...</h1>
                    <p id="userRoleTag" class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter"></p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 glass rounded-xl"><i id="themeIcon" data-lucide="moon" size="20"></i></button>
                <button id="logoutBtn" class="hidden text-rose-400 p-2.5 glass rounded-xl"><i data-lucide="log-out" size="20"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4 no-print">
        <div class="glass p-10 w-full max-w-sm text-center shadow-2xl">
            <i data-lucide="lock" class="mx-auto mb-6 text-cyan-500" size="40"></i>
            <h2 class="text-2xl font-black mb-8">প্যানেল লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="input-style">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="input-style">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto no-print">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 text-center border-b-4 border-cyan-500">
                <p class="text-[10px] font-bold opacity-60 uppercase">মোট শিক্ষার্থী</p>
                <p id="totalCount" class="text-2xl font-black text-cyan-500">০</p>
            </div>
            <div class="glass p-4 text-center border-b-4 border-emerald-500">
                <p class="text-[10px] font-bold opacity-60 uppercase">আজকের উপস্থিতি</p>
                <p id="todayCount" class="text-2xl font-black text-emerald-500">০</p>
            </div>
        </div>

        <nav class="flex justify-center mb-10 gap-3 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-8 py-3 glass text-xs font-black tab-active whitespace-nowrap">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap">হাজিরা ও রিপোর্ট</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap">নতুন এন্ট্রি</button>
        </nav>

        <section id="viewTab" class="space-y-6">
            <div class="relative max-w-xl mx-auto mb-10">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 opacity-40"></i>
                <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে শিক্ষার্থী খুঁজুন..." class="input-style !pl-12 shadow-xl">
            </div>
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="attendanceTab" class="hidden space-y-8 max-w-3xl mx-auto">
            <div class="glass p-8 space-y-8 text-center">
                <div class="space-y-2">
                    <h3 class="text-xl font-black text-cyan-500 flex items-center justify-center gap-3"><i data-lucide="calendar-days"></i> দৈনিক হাজিরা</h3>
                    <input type="date" id="attDate" class="input-style max-w-xs mx-auto text-center font-black" onchange="initAttendance()">
                </div>
                <div id="attList" class="space-y-2 text-left max-h-[400px] overflow-y-auto pr-3 no-scrollbar"></div>
                <button onclick="saveAttendance()" id="saveAttBtn" class="hidden w-full bg-cyan-600 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95">হাজিরা সেভ করুন</button>
                
                <div class="pt-8 border-t border-white/10">
                    <h4 class="text-xs font-black mb-6 opacity-60 uppercase tracking-[0.3em]">রিপোর্ট সেন্টার</h4>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <select id="reportYear" class="input-style font-bold"><option value="2026">২০২৬</option><option value="2025">২০২৫</option></select>
                        <select id="reportMonth" class="input-style font-bold">
                            <option value="01">জানুয়ারি</option><option value="02">ফেব্রুয়ারি</option><option value="03">মার্চ</option>
                            <option value="04">এপ্রিল</option><option value="05">মে</option><option value="06">জুন</option>
                            <option value="07">জুলাই</option><option value="08">আগস্ট</option><option value="09">সেপ্টেম্বর</option>
                            <option value="10">অক্টোবর</option><option value="11">নভেম্বর</option><option value="12">ডিসেম্বর</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onclick="viewDailyReport()" class="bg-slate-800 text-cyan-400 py-3 rounded-xl text-[11px] font-black border border-cyan-500/20">দৈনিক তালিকা</button>
                        <button onclick="generateMonthlyReport()" class="bg-slate-800 text-emerald-400 py-3 rounded-xl text-[11px] font-black border border-emerald-500/20">মাসিক রিপোর্ট</button>
                        <div class="flex gap-2">
                            <button onclick="generateSixMonthReport('01','06')" class="flex-1 bg-slate-800 text-blue-400 py-3 rounded-xl text-[10px] font-black border border-blue-500/20">১ম ৬ মাস</button>
                            <button onclick="generateSixMonthReport('07','12')" class="flex-1 bg-slate-800 text-orange-400 py-3 rounded-xl text-[10px] font-black border border-orange-500/20">২য় ৬ মাস</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="entryTab" class="hidden glass p-8 md:p-12 max-w-5xl mx-auto">
            <form id="studentForm" class="space-y-10">
                <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                <div class="flex flex-col md:flex-row gap-10 items-center border-b border-white/5 pb-10">
                    <div class="relative group cursor-pointer">
                        <img id="imagePreview" src="" class="photo-preview hidden shadow-2xl">
                        <div id="imgLabel" class="photo-preview flex flex-col items-center justify-center bg-black/30 border-dashed border-white/20">
                            <i data-lucide="camera" class="mb-2" size="28"></i><p class="text-[10px] font-black uppercase">ছবি</p>
                        </div>
                        <input type="file" accept="image/*" onchange="processImage(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1 w-full text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">শিক্ষার্থীর নাম</label>
                            <input type="text" id="stName" placeholder="নাম লিখুন" required class="input-style">
                        </div>
                        <div class="flex gap-3">
                            <div class="flex-1 space-y-1">
                                <label class="text-[10px] font-black uppercase opacity-60 ml-2">শ্রেণি</label>
                                <select id="class" required class="input-style">
                                    <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                    <option value="১ম">১ম</option><option value="২য়">২য়</option><option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                                </select>
                            </div>
                            <div class="w-24 space-y-1">
                                <label class="text-[10px] font-black uppercase opacity-60 ml-2">রোল</label>
                                <input type="text" id="roll" placeholder="রোল" required class="input-style text-center" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">জন্ম নিবন্ধন (১৭ ডিজিট)</label>
                            <input type="text" id="birthReg" placeholder="০০০০০০০০০০০০০০০০০" maxlength="17" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">জন্ম তারিখ</label>
                            <input type="date" id="dob" class="input-style">
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                    <div class="p-6 bg-cyan-500/5 rounded-3xl border border-cyan-500/10 space-y-4">
                        <p class="text-sm font-black text-cyan-500 uppercase flex items-center gap-2"><i data-lucide="user"></i> পিতার তথ্য</p>
                        <input type="text" id="fName" placeholder="পিতার নাম" class="input-style">
                        <div class="grid grid-cols-2 gap-3"><input type="date" id="fDob" class="input-style"><input type="text" id="fMobile" placeholder="মোবাইল" class="input-style"></div>
                        <input type="text" id="fNid" placeholder="পিতার NID" class="input-style">
                    </div>
                    <div class="p-6 bg-rose-500/5 rounded-3xl border border-rose-500/10 space-y-4">
                        <p class="text-sm font-black text-rose-500 uppercase flex items-center gap-2"><i data-lucide="user-plus"></i> মাতার তথ্য</p>
                        <input type="text" id="mName" placeholder="মাতার নাম" class="input-style">
                        <div class="grid grid-cols-2 gap-3"><input type="date" id="mDob" class="input-style"><input type="text" id="mMobile" placeholder="মোবাইল" class="input-style"></div>
                        <input type="text" id="mNid" placeholder="মাতার NID" class="input-style">
                    </div>
                </div>
                <button type="submit" class="w-full bg-cyan-600 text-white py-5 rounded-3xl font-black text-xl shadow-2xl transition-all active:scale-95">সেভ করুন</button>
            </form>
        </section>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl hidden">
        <div class="glass w-full max-w-4xl p-8 relative overflow-y-auto max-h-[95vh] shadow-2xl border-white/20">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white no-print"><i data-lucide="x-circle" size="30"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_UID = "7Lxi5lfMR0ZWHRbBHMj4xD0hbVv2";
        const HEAD_TEACHER_UID = "BcQXWMHQkJNrhhYkbJnVtsIffz33";
        let currentUserUID = "";

        const showMsg = (t, i='success') => Swal.fire({title: t, icon: i, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff'});
        const toBn = (n) => n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : '---';

        function calculateAge(dob) {
            if(!dob) return "---";
            const birth = new Date(dob); const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            return `${toBn(y)} বছর, ${toBn(m)} মাস, ${toBn(d)} দিন`;
        }

        onAuthStateChanged(auth, (u) => {
            if(u) {
                currentUserUID = u.uid;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                const hour = new Date().getHours();
                let timeGreet = hour < 12 ? "সুপ্রভাত" : hour < 17 ? "শুভ অপরাহ্ন" : "শুভ সন্ধ্যা";
                document.getElementById('userGreeting').innerText = currentUserUID === ADMIN_UID ? `${timeGreet}, অ্যাডমিন স্যার!` : `${timeGreet}, প্রধান শিক্ষক মহোদয়!`;
                document.getElementById('userRoleTag').innerText = currentUserUID === ADMIN_UID ? "পূর্ণ ক্ষমতা সম্পন্ন অ্যাডমিন" : "প্রধান শিক্ষক | ২১৭নং স্কুল";
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
            .then(() => showMsg("সাফল্যের সাথে লগইন হয়েছে!"))
            .catch(() => showMsg("ইমেইল বা পাসওয়ার্ড ভুল!", "error"));
        };

        window.switchTab = (id) => {
            ['viewTab', 'attendanceTab', 'entryTab'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            ['btnView', 'btnAttendance', 'btnEntry'].forEach(b => document.getElementById(b).classList.remove('tab-active', 'opacity-60'));
            document.getElementById(id === 'viewTab' ? 'btnView' : id === 'attendanceTab' ? 'btnAttendance' : 'btnEntry').classList.add('tab-active');
            lucide.createIcons();
        };

        function loadData(search = "") {
            onValue(ref(db, 'students'), (snap) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = ""; window.allData = snap.val() || {};
                document.getElementById('totalCount').innerText = toBn(Object.keys(window.allData).length);

                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const filtered = Object.keys(window.allData).filter(id => {
                        const s = window.allData[id];
                        return (s.name.toLowerCase().includes(search.toLowerCase()) || s.roll.includes(search)) && s.className === cls;
                    });
                    if(filtered.length > 0) {
                        let html = `<div class="glass overflow-hidden"><div class="p-4 bg-cyan-500/10 border-b border-white/5 flex justify-between items-center"><h3 class="text-xs font-black text-cyan-500">${cls} শ্রেণি</h3><span class="text-[10px] bg-cyan-500/20 px-2 py-0.5 rounded-full font-black">${toBn(filtered.length)} জন</span></div><div class="divide-y divide-white/5">`;
                        filtered.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            const s = window.allData[id];
                            const delBtn = (currentUserUID === ADMIN_UID) ? `<button onclick="deleteRec('${id}')" class="p-2 text-rose-400 hover:bg-rose-500/10 rounded-xl transition-all"><i data-lucide="trash-2" size="16"></i></button>` : '';
                            html += `<div class="p-4 flex justify-between items-center hover:bg-white/5 transition-all"><div class="flex items-center gap-4"><img src="${s.photo || ''}" class="w-12 h-12 rounded-xl object-cover bg-slate-800 shadow-xl border-2 border-white/5"><div><p class="text-[13px] font-bold">${s.name}</p><p class="text-[10px] opacity-60 font-black">রোল: ${toBn(s.roll)}</p></div></div><div class="flex gap-1"><button onclick="viewRec('${id}')" class="p-2 text-cyan-400"><i data-lucide="eye" size="18"></i></button><button onclick="editRec('${id}')" class="p-2 text-emerald-400"><i data-lucide="edit-3" size="18"></i></button>${delBtn}</div></div>`;
                        });
                        container.innerHTML += html + `</div></div>`;
                    }
                });
                lucide.createIcons();
            });
            const today = new Date().toISOString().split('T')[0];
            get(ref(db, `attendance/${today}`)).then(s => {
                const att = s.val(); let count = 0;
                if(att) Object.values(att).forEach(v => { if(v==='P') count++; });
                document.getElementById('todayCount').innerText = toBn(count);
            });
        }

        window.deleteRec = (id) => {
            Swal.fire({title: 'মুছে ফেলবেন?', icon: 'warning', showCancelButton: true, confirmButtonText: 'হ্যাঁ', background: '#1e293b', color: '#fff'})
            .then(r => { if(r.isConfirmed) remove(ref(db, `students/${id}`)); });
        };

        window.viewDailyReport = () => {
            const date = document.getElementById('attDate').value; if(!date) return showMsg("তারিখ নির্বাচন করুন", "warning");
            get(ref(db, `attendance/${date}`)).then(snap => {
                const data = snap.val(); if(!data) return showMsg("কোনো রেকর্ড পাওয়া যায়নি", "error");
                let html = `<div class="p-8 bg-white text-black text-xs"><div class="text-center border-b-2 border-black pb-4 mb-6"><h2 class="text-lg font-black uppercase">দৈনিক হাজিরা: ${toBn(date)}</h2><p>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি</p></div>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<div class="mb-4 font-black bg-slate-100 p-1 border border-black">${cls} শ্রেণি</div><div class="grid grid-cols-2 gap-x-10 gap-y-1 mb-6">`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            html += `<div class="flex justify-between border-b border-dotted border-slate-300"><span>${window.allData[id].name} (${toBn(window.allData[id].roll)})</span><span class="${data[id]==='P'?'text-emerald-600 font-bold':'text-rose-600'}">${data[id]==='P'?'P':'A'}</span></div>`;
                        });
                        html += `</div>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `</div><button onclick="window.print()" class="w-full mt-6 bg-black text-white py-4 rounded-xl no-print font-bold uppercase tracking-widest">প্রিন্ট রিপোর্ট</button>`;
                document.getElementById('viewModal').classList.remove('hidden');
            });
        };

        window.generateMonthlyReport = () => {
            const y = document.getElementById('reportYear').value; const m = document.getElementById('reportMonth').value;
            get(ref(db, `attendance`)).then(snap => {
                const all = snap.val(); if (!all) return showMsg("রেকর্ড নেই", "error");
                let html = `<div class="p-8 bg-white text-black"><h2 class="text-center font-black text-lg border-b-2 border-black pb-4 mb-6">মাসিক রিপোর্ট: ${toBn(m)}/${toBn(y)}</h2>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<h3 class="bg-black text-white p-2 font-black text-xs text-center border">${cls} শ্রেণি</h3><table class="w-full border-collapse border border-black text-[10px] mb-6 text-center"><thead><tr class="bg-slate-50"> <th class="border border-black p-2">রোল</th> <th class="border border-black p-2 text-left">নাম</th> <th class="border border-black p-2">উপস্থিতি</th> <th class="border border-black p-2">শতকরা</th> </tr></thead><tbody>`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            let p = 0, t = 0; Object.keys(all).forEach(d => { if (d.startsWith(`${y}-${m}`)) { t++; if (all[d][id] === "P") p++; } });
                            const pct = t > 0 ? ((p / t) * 100).toFixed(0) : 0;
                            html += `<tr> <td class="border border-black p-2 font-bold">${toBn(window.allData[id].roll)}</td> <td class="border border-black p-2 text-left">${window.allData[id].name}</td> <td class="border border-black p-2 font-black">${toBn(p)}/${toBn(t)}</td> <td class="border border-black p-2 font-black">${toBn(pct)}%</td> </tr>`;
                        });
                        html += `</tbody></table>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `</div><button onclick="window.print()" class="w-full mt-6 bg-black text-white py-4 rounded-xl no-print font-bold uppercase">প্রিন্ট মাসিক রিপোর্ট</button>`;
                document.getElementById('viewModal').classList.remove('hidden');
            });
        };

        window.generateSixMonthReport = (startM, endM) => {
            const y = document.getElementById('reportYear').value;
            const months = ["", "জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
            get(ref(db, `attendance`)).then(snap => {
                const all = snap.val(); if (!all) return showMsg("রেকর্ড নেই", "error");
                let html = `<div class="p-6 bg-white text-black text-[9px]"><h2 class="text-center font-black text-lg border-b-2 border-black pb-4 mb-6">${toBn(y)} সালের ৬ মাসের সামারি রিপোর্ট</h2>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<div class="mb-6"><h3 class="bg-slate-900 text-white p-1 font-bold text-center border">${cls} শ্রেণি</h3><table class="w-full border-collapse border border-black text-center"><thead><tr class="bg-slate-100"><th>রোল</th><th class="text-left">নাম</th>`;
                        for(let m = parseInt(startM); m <= parseInt(endM); m++) html += `<th>${months[m]}</th>`;
                        html += `<th class="bg-slate-200">মোট</th></tr></thead><tbody>`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            html += `<tr><td class="border border-black p-1 font-bold">${toBn(window.allData[id].roll)}</td><td class="border border-black p-1 text-left">${window.allData[id].name}</td>`;
                            let total = 0;
                            for(let m = parseInt(startM); m <= parseInt(endM); m++){
                                let mKey = m.toString().padStart(2, '0'); let p = 0;
                                Object.keys(all).forEach(d => { if(d.startsWith(`${y}-${mKey}`) && all[d][id] === "P") p++; });
                                html += `<td class="border border-black p-1">${toBn(p)}</td>`; total += p;
                            }
                            html += `<td class="border border-black p-1 font-black bg-slate-100">${toBn(total)}</td></tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `</div><button onclick="window.print()" class="w-full mt-6 bg-black text-white py-4 rounded-xl no-print font-bold uppercase">প্রিন্ট সামারি</button>`;
                document.getElementById('viewModal').classList.remove('hidden');
            });
        };

        window.viewRec = (id) => {
            const s = window.allData[id]; const age = calculateAge(s.dob);
            document.getElementById('modalContent').innerHTML = `
                <div class="bg-white text-slate-900 rounded-[2rem] overflow-hidden text-left">
                    <div class="h-24 bg-gradient-to-r from-cyan-600 to-blue-700"></div>
                    <div class="px-8 pb-10">
                        <div class="relative -mt-12 flex flex-col items-center mb-8">
                            <img src="${s.photo || ''}" class="w-28 h-28 rounded-3xl border-8 border-white object-cover shadow-2xl">
                            <h2 class="text-2xl font-black mt-4">${s.name}</h2>
                            <p class="bg-cyan-100 text-cyan-700 px-6 py-1.5 rounded-full text-xs font-black mt-2 uppercase">${s.className} শ্রেণি | রোল: ${toBn(s.roll)}</p>
                            <p class="text-[11px] mt-2 font-bold text-slate-400">বর্তমান বয়স: <span class="text-cyan-700">${age}</span></p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-xs">
                            <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><p class="font-black text-cyan-600 mb-2 uppercase border-b pb-1">মৌলিক তথ্য</p><p><b>জন্ম নিবন্ধন:</b> ${toBn(s.birthReg)}</p><p><b>জন্ম তারিখ:</b> ${toBn(s.dob)}</p></div>
                            <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><p class="font-black text-emerald-600 mb-2 uppercase border-b pb-1">পিতার তথ্য</p><p><b>নাম:</b> ${s.fName || '---'}</p><p><b>NID:</b> ${toBn(s.fNid)}</p><p><b>মোবাইল:</b> ${toBn(s.fMobile)}</p></div>
                            <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><p class="font-black text-rose-600 mb-2 uppercase border-b pb-1">মাতার তথ্য</p><p><b>নাম:</b> ${s.mName || '---'}</p><p><b>NID:</b> ${toBn(s.mNid)}</p><p><b>মোবাইল:</b> ${toBn(s.mMobile)}</p></div>
                        </div>
                        <button onclick="window.print()" class="w-full mt-8 bg-black text-white py-4 rounded-2xl font-black no-print uppercase tracking-widest">প্রিন্ট আইডি কার্ড</button>
                    </div>
                </div>`;
            document.getElementById('viewModal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.initAttendance = () => {
            const list = document.getElementById('attList'); list.innerHTML = ""; document.getElementById('saveAttBtn').classList.remove('hidden');
            ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                if(clsIds.length > 0) {
                    list.innerHTML += `<p class="text-[10px] font-black text-cyan-500 mt-6 mb-2 uppercase tracking-widest border-l-4 border-cyan-500 pl-3">${cls} শ্রেণি</p>`;
                    clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                        list.innerHTML += `<label class="flex justify-between items-center p-4 glass mb-2 cursor-pointer hover:bg-white/5 transition-all"><span>${window.allData[id].name} (রোল: ${toBn(window.allData[id].roll)})</span><input type="checkbox" class="att-check w-6 h-6 rounded-lg accent-cyan-500" data-id="${id}" checked></label>`;
                    });
                }
            });
        };

        window.saveAttendance = () => {
            const d = document.getElementById('attDate').value; const att = {};
            document.querySelectorAll('.att-check').forEach(c => att[c.dataset.id] = c.checked ? "P" : "A");
            set(ref(db, `attendance/${d}`), att).then(() => { showMsg("আজকের হাজিরা সংরক্ষিত হয়েছে!"); loadData(); });
        };

        window.editRec = (id) => {
            const s = window.allData[id]; document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name; document.getElementById('class').value = s.className;
            document.getElementById('roll').value = s.roll; document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob; document.getElementById('fName').value = s.fName || '';
            document.getElementById('fDob').value = s.fDob || ''; document.getElementById('fNid').value = s.fNid || '';
            document.getElementById('fMobile').value = s.fMobile || ''; document.getElementById('mName').value = s.mName || '';
            document.getElementById('mDob').value = s.mDob || ''; document.getElementById('mNid').value = s.mNid || '';
            document.getElementById('mMobile').value = s.mMobile || '';
            if(s.photo) { document.getElementById('photoBase64').value = s.photo; document.getElementById('imagePreview').src = s.photo; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgLabel').classList.add('hidden'); }
            switchTab('entryTab');
        };

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault(); const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('stName').value, className: document.getElementById('class').value, roll: document.getElementById('roll').value, 
                birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value, photo: document.getElementById('photoBase64').value,
                fName: document.getElementById('fName').value, fDob: document.getElementById('fDob').value, fNid: document.getElementById('fNid').value, fMobile: document.getElementById('fMobile').value,
                mName: document.getElementById('mName').value, mDob: document.getElementById('mDob').value, mNid: document.getElementById('mNid').value, mMobile: document.getElementById('mMobile').value
            };
            set(key ? ref(db, `students/${key}`) : push(ref(db, 'students')), data).then(() => {
                showMsg("সফলভাবে সেভ হয়েছে!"); document.getElementById('studentForm').reset();
                document.getElementById('editKey').value = ""; document.getElementById('imagePreview').classList.add('hidden');
                document.getElementById('imgLabel').classList.remove('hidden'); switchTab('viewTab');
            });
        };

        window.processImage = (e) => {
            const reader = new FileReader(); reader.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photoBase64').value = b64; document.getElementById('imagePreview').src = b64;
                    document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('imgLabel').classList.add('hidden');
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(e.target.files[0]);
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');
        window.toggleTheme = () => { document.body.classList.toggle('light-mode'); lucide.createIcons(); };
        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('searchBar').oninput = (e) => loadData(e.target.value);
        lucide.createIcons();
    </script>
</body>
</html>

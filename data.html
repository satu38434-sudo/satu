<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা</title>
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #006a4e; --sidebar-bg: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Kalpurush', sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: none; flex-direction: column; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); }

        /* Main Area */
        #main-content { flex: 1; overflow-y: auto; display: none; padding: 25px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* Stats & Charts */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--primary); }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }

        /* Form */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: 'Kalpurush'; box-sizing: border-box; }
        label { font-weight: bold; font-size: 14px; color: #444; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        th { background: #f1f5f9; color: var(--primary); }
        .stu-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        
        .btn-edit { background: #f59e0b; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        #login-container { width: 100%; display: flex; justify-content: center; align-items: center; background: var(--primary); }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } #sidebar { display: none; } }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2 style="color:var(--primary)">লগইন</h2>
        <input type="email" id="loginEmail" placeholder="ইমেইল">
        <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
        <button id="loginBtn" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer; margin-top:10px;">লগইন</button>
    </div>
</div>

<aside id="sidebar">
    <div style="padding:20px; text-align:center; background:rgba(0,0,0,0.2)">
        <h3 style="margin:0">২১৭নং শেখ ফারিয়া</h3>
    </div>
    <div class="nav-item active" onclick="showSection('dashboard-sec')">📊 ড্যাশবোর্ড হোম</div>
    <div class="nav-item" onclick="showSection('entry-sec')">📝 নতুন ডেটা এন্ট্রি</div>
    <div class="nav-item" onclick="showSection('list-sec')">📋 শিক্ষার্থী ডেটাবেস</div>
    <div class="nav-item" onclick="location.reload()" style="color:#f87171">🚪 লগআউট</div>
</aside>

<main id="main-content">
    <section id="dashboard-sec">
        <div class="stats-grid">
            <div class="stat-card">মোট শিক্ষার্থী<h2 id="totalCount">0</h2></div>
            <div class="stat-card">ছাত্র (ছেলে)<h2 id="boyCount">0</h2></div>
            <div class="stat-card">ছাত্রী (মেয়ে)<h2 id="girlCount">0</h2></div>
        </div>
        <div class="charts-row">
            <div class="card"><canvas id="genderChart"></canvas></div>
            <div class="card"><canvas id="ageChart"></canvas></div>
        </div>
    </section>

    <section id="entry-sec" class="hidden">
        <div class="card">
            <h2 id="formTitle">নতুন শিক্ষার্থী এন্ট্রি</h2>
            <form id="studentForm">
                <div class="form-grid">
                    <div><label>নাম</label><input type="text" id="name" required></div>
                    <div><label>রোল</label><input type="number" id="roll" required></div>
                    <div><label>লিঙ্গ</label>
                        <select id="gender" required>
                            <option value="ছাত্র">ছাত্র</option>
                            <option value="ছাত্রী">ছাত্রী</option>
                        </select>
                    </div>
                    <div><label>শ্রেণি</label>
                        <select id="className" required>
                            <option value="প্রাক">প্রাক-প্রাথমিক</option>
                            <option value="১ম">১ম</option><option value="২য়">২য়</option>
                            <option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                        </select>
                    </div>
                    <div><label>জন্ম তারিখ</label><input type="date" id="dob" required></div>
                    <div><label>জন্ম নিবন্ধন নং</label><input type="text" id="birthReg"></div>
                    <div><label>পিতার নাম</label><input type="text" id="fName"></div>
                    <div><label>পিতার NID</label><input type="text" id="fNid"></div>
                    <div><label>মাতার নাম</label><input type="text" id="mName"></div>
                    <div><label>মাতার NID</label><input type="text" id="mNid"></div>
                    <div><label>মোবাইল নম্বর</label><input type="tel" id="mobile" required></div>
                    <div><label>ছবি</label><input type="file" id="photoInput" accept="image/*"></div>
                </div>
                <button type="submit" id="saveBtn" style="margin-top:20px; padding:12px 40px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer;">সেভ করুন</button>
            </form>
        </div>
    </section>

    <section id="list-sec" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2>শিক্ষার্থী তালিকা</h2>
                <input type="text" id="search" placeholder="খুঁজুন..." style="width:200px">
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr><th>ছবি</th><th>রোল</th><th>নাম</th><th>শ্রেণি/লিঙ্গ</th><th>পিতা-মাতা/NID</th><th>মোবাইল</th><th class="no-print">অ্যাকশন</th></tr>
                    </thead>
                    <tbody id="listBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqGQfraSmrz4Ev56TQxQVaqYPaaFi6yLs",
        authDomain: "my-school-data-5f899.firebaseapp.com",
        projectId: "my-school-data-5f899",
        storageBucket: "my-school-data-5f899.firebasestorage.app",
        messagingSenderId: "566276841077",
        appId: "1:566276841077:web:b42f3d65edb922cd03223c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allStudents = [], charts = {}, editId = null;

    // Login
    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(e => alert("ভুল তথ্য!"));
    onAuthStateChanged(auth, user => { if(user) { loginContainer.classList.add('hidden'); sidebar.style.display='flex'; mainContent.style.display='block'; syncData(); } });

    window.showSection = (id) => {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };

    const processImg = (file) => new Promise(res => {
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = (e) => {
            const i = new Image(); i.src = e.target.result;
            i.onload = () => {
                const c = document.createElement('canvas'); c.width=150; c.height=150;
                c.getContext('2d').drawImage(i,0,0,150,150); res(c.toDataURL('image/jpeg',0.6));
            }
        }
    });

    function syncData() {
        const q = query(collection(db, "students"), orderBy("roll", "asc"));
        onSnapshot(q, snap => {
            allStudents = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const rank = {"প্রাক":1, "১ম":2, "২য়":3, "৩য়":4, "৪র্থ":5, "৫ম":6};
            allStudents.sort((a,b) => (rank[a.className]-rank[b.className]) || (a.roll-b.roll));
            updateUI();
        });
    }

    function updateUI() {
        let stats={ছাত্র:0, ছাত্রী:0}, ages={"5+":0,"6+":0,"7+":0,"8+":0,"9+":0,"10+":0};
        listBody.innerHTML = '';
        allStudents.forEach(s => {
            stats[s.gender]++;
            const age = Math.floor((Date.now()-new Date(s.dob))/31557600000);
            const aK = age>=10?"10+":age+"+"; if(ages[aK]!==undefined) ages[aK]++;

            listBody.innerHTML += `<tr>
                <td><img src="${s.photo || 'https://via.placeholder.com/50'}" class="stu-img"></td>
                <td>${s.roll}</td><td><b>${s.name}</b></td>
                <td>${s.className}<br><small>${s.gender}</small></td>
                <td>F: ${s.fName}<br>M: ${s.mName}</td>
                <td>${s.mobile}</td>
                <td class="no-print">
                    <button class="btn-edit" onclick="editStu('${s.id}')">এডিট</button>
                    <button class="btn-del" onclick="delStu('${s.id}')">ডিলিট</button>
                </td>
            </tr>`;
        });
        totalCount.innerText = allStudents.length; boyCount.innerText=stats.ছাত্র; girlCount.innerText=stats.ছাত্রী;
        renderCharts(stats, ages);
    }

    function renderCharts(gD, aD) {
        if(charts.g) charts.g.destroy(); if(charts.a) charts.a.destroy();
        charts.g = new Chart(genderChart, { type:'pie', data:{labels:['ছাত্র','ছাত্রী'], datasets:[{data:[gD.ছাত্র,gD.ছাত্রী], backgroundColor:['#3498db','#e91e63']}]}});
        charts.a = new Chart(ageChart, { type:'bar', data:{labels:Object.keys(aD), datasets:[{label:'শিক্ষার্থী', data:Object.values(aD), backgroundColor:'#006a4e'}]}});
    }

    studentForm.onsubmit = async (e) => {
        e.preventDefault();
        saveBtn.disabled = true;
        let img = editId ? allStudents.find(x=>x.id===editId).photo : "";
        if(photoInput.files[0]) img = await processImg(photoInput.files[0]);

        const data = {
            name: name.value, roll: parseInt(roll.value), gender: gender.value, className: className.value,
            dob: dob.value, birthReg: birthReg.value, fName: fName.value, fNid: fNid.value,
            mName: mName.value, mNid: mNid.value, mobile: mobile.value, photo: img
        };

        if(editId) { await updateDoc(doc(db, "students", editId), data); editId=null; }
        else { await addDoc(collection(db, "students"), data); }
        
        alert("সফল হয়েছে!"); studentForm.reset(); saveBtn.disabled=false; showSection('list-sec');
    };

    window.editStu = (id) => {
        const s = allStudents.find(x => x.id === id);
        editId = id; formTitle.innerText="তথ্য সংশোধন";
        name.value=s.name; roll.value=s.roll; gender.value=s.gender; className.value=s.className;
        dob.value=s.dob; birthReg.value=s.birthReg; fName.value=s.fName; fNid.value=s.fNid;
        mName.value=s.mName; mNid.value=s.mNid; mobile.value=s.mobile;
        showSection('entry-sec');
    };

    window.delStu = async (id) => { if(confirm("ডিলিট করবেন?")) await deleteDoc(doc(db, "students", id)); };
</script>
</body>
</html>

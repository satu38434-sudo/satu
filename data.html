<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: rgba(0, 0, 0, 0.08); --accent: #0891b2; }
        .dark-mode { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #22d3ee; --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.4s; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .input-style { background: rgba(0,0,0,0.03) !important; border: 1.5px solid var(--border) !important; color: var(--text) !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .tab-active { background: linear-gradient(135deg, #0891b2, #06b6d4) !important; color: #fff !important; transform: translateY(-2px); box-shadow: 0 10px 15px rgba(8, 145, 178, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="light-mode">

    <header class="sticky top-0 z-50 glass !rounded-none border-b px-4 py-4 no-print mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500 p-2 rounded-xl"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 id="userGreeting" class="text-sm md:text-xl font-black">লোড হচ্ছে...</h1>
                    <p class="text-[10px] font-bold text-cyan-600 uppercase tracking-widest">Digital Management</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 glass rounded-xl"><i id="themeIcon" data-lucide="sun" size="20"></i></button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-rose-500 p-2.5 glass rounded-xl"><i data-lucide="log-out" size="20"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4">
        <div class="glass p-10 w-full max-w-sm text-center shadow-2xl">
            <i data-lucide="shield-check" class="mx-auto mb-6 text-cyan-500" size="48"></i>
            <h2 class="text-2xl font-black mb-8">অফিস লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="input-style">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="input-style">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-black shadow-xl active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 mb-8">
            <div class="glass p-6 min-w-[200px] text-center border-b-4 border-cyan-500">
                <p class="text-[10px] font-bold opacity-60">মোট শিক্ষার্থী</p>
                <p id="totalCount" class="text-3xl font-black text-cyan-500">০</p>
            </div>
        </div>

        <nav class="flex justify-center mb-10 gap-3 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-8 py-3 glass text-xs font-black tab-active whitespace-nowrap">তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap">হাজিরা</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap">নতুন এন্ট্রি</button>
        </nav>

        <section id="viewTab" class="space-y-6">
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="attendanceTab" class="hidden glass p-8 max-w-2xl mx-auto text-center">
            <input type="date" id="attDate" class="input-style max-w-xs mx-auto mb-6" onchange="loadAttendance()">
            <div id="attList" class="space-y-2 text-left"></div>
            <button onclick="saveAttendance()" id="saveBtn" class="hidden w-full bg-cyan-600 text-white py-4 mt-6 rounded-xl font-bold">সেভ করুন</button>
        </section>

        <section id="entryTab" class="hidden glass p-8 max-w-xl mx-auto">
            <form id="studentForm" class="space-y-4">
                <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" class="input-style" required>
                <select id="class" class="input-style"><option value="১ম">১ম</option><option value="২য়">২য়</option><option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option></select>
                <input type="number" id="roll" placeholder="রোল" class="input-style" required>
                <button type="submit" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-bold">সেভ ডাটা</button>
            </form>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_ID = "7Lxi5lfMR0ZWHRbBHMj4xD0hbVv2";
        const toBn = (n) => n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : '০';

        // Login Logic Fixed
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            if(!email || !pass) return Swal.fire("ইমেইল ও পাসওয়ার্ড দিন", "", "warning");

            signInWithEmailAndPassword(auth, email, pass)
                .catch(err => Swal.fire("লগইন ব্যর্থ!", "ইমেইল বা পাসওয়ার্ড ভুল", "error"));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('userGreeting').innerText = user.uid === ADMIN_ID ? "সুপ্রভাত, অ্যাডমিন!" : "সুপ্রভাত, শিক্ষক!";
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('userGreeting').innerText = "স্বাগতম!";
            }
            lucide.createIcons();
        });

        function loadData() {
            onValue(ref(db, 'students'), (snap) => {
                window.allData = snap.val() || {};
                document.getElementById('totalCount').innerText = toBn(Object.keys(window.allData).length);
                renderList();
            });
        }

        window.renderList = () => {
            const container = document.getElementById('classWiseContainer');
            container.innerHTML = "";
            ["১ম", "২য়", "৩য়", "৪র্থ", "৫ম"].forEach(cls => {
                const students = Object.keys(window.allData || {}).filter(id => window.allData[id].className === cls);
                if(students.length > 0) {
                    let html = `<div class="glass p-5 border-t-4 border-cyan-500"><b>${cls} শ্রেণি</b><div class="mt-3 space-y-2">`;
                    students.forEach(id => {
                        html += `<div class="p-2 bg-black/5 rounded">${window.allData[id].name} (রোল: ${toBn(window.allData[id].roll)})</div>`;
                    });
                    container.innerHTML += html + `</div></div>`;
                }
            });
        };

        window.switchTab = (id) => {
            ['viewTab', 'attendanceTab', 'entryTab'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            ['btnView', 'btnAttendance', 'btnEntry'].forEach(b => document.getElementById(b).classList.remove('tab-active', 'opacity-60'));
            const map = { viewTab: 'btnView', attendanceTab: 'btnAttendance', entryTab: 'btnEntry' };
            document.getElementById(map[id]).classList.add('tab-active');
        };

        window.handleLogout = () => signOut(auth);
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');

        lucide.createIcons();
    </script>
</body>
</html>

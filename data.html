<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #22d3ee; --border: rgba(255, 255, 255, 0.08); }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: rgba(0, 0, 0, 0.08); --accent: #0891b2; }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: all 0.4s ease; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .input-style { background: rgba(0,0,0,0.15) !important; border: 1.5px solid var(--border) !important; color: var(--text) !important; padding: 12px; border-radius: 12px; width: 100%; transition: 0.3s; }
        .input-style:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2); outline: none; }
        .tab-active { background: linear-gradient(135deg, #0891b2, #22d3ee) !important; color: #fff !important; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(34, 211, 238, 0.3); }
        .student-card { transition: transform 0.2s, box-shadow 0.2s; border-left: 4px solid transparent; }
        .student-card:hover { transform: scale(1.02); border-left-color: var(--accent); background: rgba(255,255,255,0.05); }
        .photo-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 16px; border: 2px solid var(--accent); padding: 2px; }
        
        @media print { 
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            #viewModal { position: absolute; left: 0; top: 0; width: 100%; display: block !important; visibility: visible; }
            #modalContent { border: none !important; }
            .glass { border: none !important; box-shadow: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 glass !rounded-none border-b px-4 py-4 no-print mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-cyan-500 to-blue-600 p-2.5 rounded-xl shadow-lg shadow-cyan-500/20">
                    <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 id="userGreeting" class="text-sm md:text-xl font-black tracking-tight leading-tight">লোড হচ্ছে...</h1>
                    <p id="userRoleTag" class="text-[10px] font-bold text-cyan-400 opacity-90"></p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 glass rounded-xl hover:bg-white/10 transition-all"><i id="themeIcon" data-lucide="moon" size="20"></i></button>
                <button id="logoutBtn" class="hidden text-rose-400 p-2.5 glass rounded-xl hover:bg-rose-500/10 transition-all"><i data-lucide="log-out" size="20"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4 no-print">
        <div class="glass p-10 w-full max-w-sm text-center border-cyan-500/20 shadow-2xl">
            <div class="w-16 h-16 bg-cyan-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="text-cyan-500" size="32"></i>
            </div>
            <h2 class="text-2xl font-black mb-8">প্যানেল লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল অ্যাড্রেস" class="input-style">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="input-style">
                <button id="loginBtn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-cyan-600/20 transition-all active:scale-95">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto no-print">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-10">
            <div class="flex gap-4 w-full md:w-auto">
                <div class="glass px-6 py-3 flex-1 md:flex-none text-center border-b-4 border-cyan-500">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">মোট শিক্ষার্থী</p>
                    <p id="totalCount" class="text-2xl font-black text-cyan-500">০</p>
                </div>
                <div class="glass px-6 py-3 flex-1 md:flex-none text-center border-b-4 border-emerald-500">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">আজকের উপস্থিতি</p>
                    <p id="todayCount" class="text-2xl font-black text-emerald-500 animate-pulse">০</p>
                </div>
            </div>
            <p class="text-[11px] font-black text-cyan-500 tracking-[0.2em] uppercase bg-cyan-500/5 px-4 py-2 rounded-full border border-cyan-500/20">ট্যালেন্টপুল বৃত্তি অর্জন আমাদের লক্ষ্য</p>
        </div>

        <nav class="flex justify-center mb-10 gap-3 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-8 py-3 glass text-xs font-black tab-active whitespace-nowrap transition-all">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap transition-all">হাজিরা ও রিপোর্ট</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-8 py-3 glass text-xs font-black opacity-60 whitespace-nowrap transition-all">নতুন এন্ট্রি</button>
        </nav>

        <section id="viewTab" class="space-y-6">
            <div class="relative max-w-xl mx-auto mb-10">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 opacity-40" size="18"></i>
                <input type="text" id="searchBar" placeholder="নাম বা রোল দিয়ে শিক্ষার্থী খুঁজুন..." class="input-style !pl-12 !py-4 shadow-xl">
            </div>
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="attendanceTab" class="hidden space-y-8 max-w-3xl mx-auto">
            <div class="glass p-8 space-y-8 text-center">
                <div class="space-y-2">
                    <h3 class="text-xl font-black text-cyan-500 flex items-center justify-center gap-3"><i data-lucide="calendar-days"></i> দৈনিক হাজিরা সিস্টেম</h3>
                    <p class="text-xs opacity-60">তারিখ নির্বাচন করে শিক্ষার্থীদের উপস্থিতি নিশ্চিত করুন</p>
                </div>
                <input type="date" id="attDate" class="input-style max-w-xs mx-auto text-center font-black text-lg" onchange="initAttendance()">
                <div id="attList" class="space-y-3 text-left max-h-[400px] overflow-y-auto pr-3 custom-scrollbar"></div>
                <button onclick="saveAttendance()" id="saveAttBtn" class="hidden w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">হাজিরা সেভ করুন</button>
                
                <div class="pt-8 border-t border-white/10">
                    <h4 class="text-sm font-black mb-6 opacity-80 uppercase tracking-widest">রিপোর্ট জেনারেটর</h4>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <select id="reportYear" class="input-style font-bold"><option value="2026">২০২৬</option><option value="2025">২০২৫</option></select>
                        <select id="reportMonth" class="input-style font-bold">
                            <option value="01">জানুয়ারি</option><option value="02">ফেব্রুয়ারি</option><option value="03">মার্চ</option>
                            <option value="04">এপ্রিল</option><option value="05">মে</option><option value="06">জুন</option>
                            <option value="07">জুলাই</option><option value="08">আগস্ট</option><option value="09">সেপ্টেম্বর</option>
                            <option value="10">অক্টোবর</option><option value="11">নভেম্বর</option><option value="12">ডিসেম্বর</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onclick="viewDailyReport()" class="bg-slate-800 hover:bg-slate-700 text-cyan-400 py-3 rounded-xl text-[11px] font-black border border-cyan-500/20 uppercase tracking-wider">দৈনিক রিপোর্ট</button>
                        <button onclick="generateMonthlyReport()" class="bg-slate-800 hover:bg-slate-700 text-emerald-400 py-3 rounded-xl text-[11px] font-black border border-emerald-500/20 uppercase tracking-wider">মাসিক রিপোর্ট</button>
                        <div class="flex gap-2">
                            <button onclick="generateSixMonthReport('01','06')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-blue-400 py-3 rounded-xl text-[10px] font-black border border-blue-500/20 uppercase">১ম ৬ মাস</button>
                            <button onclick="generateSixMonthReport('07','12')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-orange-400 py-3 rounded-xl text-[10px] font-black border border-orange-500/20 uppercase">২য় ৬ মাস</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="entryTab" class="hidden glass p-8 md:p-12 max-w-5xl mx-auto">
            <form id="studentForm" class="space-y-10" autocomplete="off">
                <input type="hidden" id="editKey"><input type="hidden" id="photoBase64">
                <div class="flex flex-col md:flex-row gap-10 items-center border-b border-white/5 pb-10">
                    <div class="relative group cursor-pointer">
                        <img id="imagePreview" src="" class="photo-preview hidden shadow-2xl">
                        <div id="imgLabel" class="photo-preview flex flex-col items-center justify-center bg-black/30 hover:bg-black/50 transition-all border-dashed">
                            <i data-lucide="camera" class="mb-2" size="28"></i><p class="text-[10px] font-black uppercase">ছবি আপলোড</p>
                        </div>
                        <input type="file" accept="image/*" onchange="processImage(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1 w-full">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">শিক্ষার্থীর পূর্ণ নাম</label>
                            <input type="text" id="stName" placeholder="নাম লিখুন" required class="input-style">
                        </div>
                        <div class="flex gap-3">
                            <div class="flex-1 space-y-1">
                                <label class="text-[10px] font-black uppercase opacity-60 ml-2">শ্রেণি</label>
                                <select id="class" required class="input-style">
                                    <option value="প্রাক-প্রাথমিক">প্রাক-প্রাথমিক</option>
                                    <option value="১ম">১ম</option><option value="২য়">২য়</option><option value="৩য়">৩য়</option><option value="৪র্থ">৪র্থ</option><option value="৫ম">৫ম</option>
                                </select>
                            </div>
                            <div class="w-24 space-y-1">
                                <label class="text-[10px] font-black uppercase opacity-60 ml-2">রোল</label>
                                <input type="text" id="roll" placeholder="রোল" required class="input-style text-center" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">জন্ম নিবন্ধন নম্বর (১৭ ডিজিট)</label>
                            <input type="text" id="birthReg" placeholder="০০০০০০০০০০০০০০০০০" maxlength="17" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase opacity-60 ml-2">জন্ম তারিখ</label>
                            <input type="date" id="dob" class="input-style">
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4 p-6 bg-cyan-500/5 rounded-3xl border border-cyan-500/10">
                        <div class="flex items-center gap-3 mb-4"><i data-lucide="user" class="text-cyan-500"></i><p class="text-sm font-black text-cyan-500 uppercase">পিতার তথ্য</p></div>
                        <input type="text" id="fName" placeholder="পিতার নাম" class="input-style">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="date" id="fDob" class="input-style">
                            <input type="text" id="fMobile" placeholder="মোবাইল" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <input type="text" id="fNid" placeholder="পিতার NID নম্বর" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div class="space-y-4 p-6 bg-rose-500/5 rounded-3xl border border-rose-500/10">
                        <div class="flex items-center gap-3 mb-4"><i data-lucide="user-plus" class="text-rose-500"></i><p class="text-sm font-black text-rose-500 uppercase">মাতার তথ্য</p></div>
                        <input type="text" id="mName" placeholder="মাতার নাম" class="input-style">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="date" id="mDob" class="input-style">
                            <input type="text" id="mMobile" placeholder="মোবাইল" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <input type="text" id="mNid" placeholder="মাতার NID নম্বর" class="input-style" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 text-white py-5 rounded-3xl font-black text-xl shadow-2xl hover:shadow-cyan-500/30 transition-all active:scale-[0.98]">ডাটাবেসে তথ্য সেভ করুন</button>
            </form>
        </section>
    </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-xl hidden">
        <div class="glass w-full max-w-4xl p-8 relative overflow-y-auto max-h-[95vh] shadow-2xl border-white/20">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white no-print transition-all"><i data-lucide="x-circle" size="30"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_UID = "7Lxi5lfMR0ZWHRbBHMj4xD0hbVv2";
        const HEAD_TEACHER_UID = "BcQXWMHQkJNrhhYkbJnVtsIffz33";
        let currentUserUID = "";

        const showMsg = (t, i='success') => Swal.fire({title: t, icon: i, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: '#1e293b', color: '#fff'});
        const toBn = (n) => n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : '---';

        function calculateAge(dob) {
            if(!dob) return "---";
            const birth = new Date(dob); const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            return `${toBn(y)} বছর, ${toBn(m)} মাস, ${toBn(d)} দিন`;
        }

        onAuthStateChanged(auth, (u) => {
            if(u) {
                currentUserUID = u.uid;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');

                const greetingEl = document.getElementById('userGreeting');
                const roleEl = document.getElementById('userRoleTag');
                const hour = new Date().getHours();
                let timeGreet = hour < 12 ? "সুপ্রভাত" : hour < 17 ? "শুভ অপরাহ্ন" : "শুভ সন্ধ্যা";

                if (currentUserUID === ADMIN_UID) {
                    greetingEl.innerText = `${timeGreet}, অ্যাডমিন স্যার!`;
                    roleEl.innerText = "সিস্টেম অ্যাডমিনিস্ট্রেটর (পূর্ণ ক্ষমতা)";
                } else if (currentUserUID === HEAD_TEACHER_UID) {
                    greetingEl.innerText = `${timeGreet}, প্রধান শিক্ষক মহোদয়!`;
                    roleEl.innerText = "প্রধান শিক্ষক | ২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সপ্রাবি";
                } else {
                    greetingEl.innerText = `${timeGreet}, শ্রদ্ধেয় শিক্ষক মহোদয়!`;
                    roleEl.innerText = "সহকারী শিক্ষক | ডিজিটাল প্যানেল";
                }
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return showMsg("সবগুলো তথ্য দিন", "warning");
            signInWithEmailAndPassword(auth, email, pass)
            .then(() => showMsg("সাফল্যের সাথে লগইন হয়েছে!"))
            .catch((err) => showMsg("লগইন ব্যর্থ! সঠিক ইমেইল ও পাসওয়ার্ড দিন", "error"));
        };

        window.switchTab = (id) => {
            ['viewTab', 'attendanceTab', 'entryTab'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            ['btnView', 'btnAttendance', 'btnEntry'].forEach(b => document.getElementById(b).classList.remove('tab-active', 'opacity-60'));
            const activeBtnId = id === 'viewTab' ? 'btnView' : id === 'attendanceTab' ? 'btnAttendance' : 'btnEntry';
            document.getElementById(activeBtnId).classList.add('tab-active');
            lucide.createIcons();
        };

        function loadData(search = "") {
            onValue(ref(db, 'students'), (snap) => {
                const container = document.getElementById('classWiseContainer');
                container.innerHTML = ""; window.allData = snap.val() || {};
                const total = Object.keys(window.allData).length;
                document.getElementById('totalCount').innerText = toBn(total);

                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const filtered = Object.keys(window.allData).filter(id => {
                        const s = window.allData[id];
                        return (s.name.toLowerCase().includes(search.toLowerCase()) || s.roll.includes(search)) && s.className === cls;
                    });
                    
                    if(filtered.length > 0) {
                        let html = `<div class="glass overflow-hidden h-fit"><div class="p-4 bg-cyan-500/10 border-b border-white/5 flex justify-between items-center"><h3 class="text-xs font-black text-cyan-500 uppercase tracking-widest">${cls} শ্রেণি</h3><span class="text-[10px] bg-cyan-500/20 px-2 py-0.5 rounded-full font-bold">${toBn(filtered.length)} জন</span></div><div class="divide-y divide-white/5">`;
                        filtered.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            const s = window.allData[id];
                            const delBtn = (currentUserUID === ADMIN_UID) ? `<button onclick="deleteRec('${id}')" class="p-2.5 text-rose-400 hover:bg-rose-500/10 rounded-xl transition-all"><i data-lucide="trash-2" size="16"></i></button>` : '';
                            html += `<div class="p-4 flex justify-between items-center student-card group"><div class="flex items-center gap-4"><img src="${s.photo || ''}" class="w-12 h-12 rounded-xl object-cover bg-slate-800 shadow-xl border-2 border-white/5 group-hover:border-cyan-500/50 transition-all"><div><p class="text-[13px] font-bold tracking-tight">${s.name}</p><p class="text-[10px] opacity-60 font-black">রোল: ${toBn(s.roll)}</p></div></div><div class="flex gap-1"><button onclick="viewRec('${id}')" class="p-2.5 text-cyan-400 hover:bg-cyan-500/10 rounded-xl transition-all"><i data-lucide="eye" size="18"></i></button><button onclick="editRec('${id}')" class="p-2.5 text-emerald-400 hover:bg-emerald-500/10 rounded-xl transition-all"><i data-lucide="edit-3" size="18"></i></button>${delBtn}</div></div>`;
                        });
                        container.innerHTML += html + `</div></div>`;
                    }
                });
                lucide.createIcons();
            });
            const today = new Date().toISOString().split('T')[0];
            get(ref(db, `attendance/${today}`)).then(s => {
                const att = s.val(); let count = 0;
                if(att) Object.values(att).forEach(v => { if(v==='P') count++; });
                document.getElementById('todayCount').innerText = toBn(count);
            });
        }

        window.deleteRec = (id) => {
            Swal.fire({
                title: 'শিক্ষার্থী মুছে ফেলবেন?',
                text: "এই তথ্যটি আর পুনরুদ্ধার করা যাবে না!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'হ্যাঁ, মুছুন',
                cancelButtonText: 'না',
                background: '#0f172a',
                color: '#fff'
            }).then(r => { if(r.isConfirmed) remove(ref(db, `students/${id}`)).then(()=>showMsg("শিক্ষার্থী সফলভাবে সরানো হয়েছে")); });
        };

        window.viewRec = (id) => {
            const s = window.allData[id]; const age = calculateAge(s.dob);
            document.getElementById('modalContent').innerHTML = `
                <div class="bg-white text-slate-900 rounded-[2rem] overflow-hidden">
                    <div class="relative h-32 bg-gradient-to-r from-cyan-600 to-blue-700"></div>
                    <div class="px-8 pb-10">
                        <div class="relative -mt-16 flex flex-col items-center mb-8">
                            <img src="${s.photo || ''}" class="w-32 h-32 rounded-3xl border-8 border-white object-cover shadow-2xl">
                            <h2 class="text-2xl font-black mt-4">${s.name}</h2>
                            <p class="bg-cyan-100 text-cyan-700 px-6 py-1.5 rounded-full text-xs font-black mt-2 uppercase tracking-widest">${s.className} শ্রেণি | রোল: ${toBn(s.roll)}</p>
                            <p class="text-[11px] mt-3 font-bold text-slate-400 uppercase tracking-tighter">বর্তমান বয়স: <span class="text-slate-700">${age}</span></p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                <div class="flex items-center gap-2 mb-4 border-b pb-2"><i data-lucide="info" class="text-cyan-600" size="16"></i><p class="font-black text-[10px] uppercase text-slate-500">মৌলিক তথ্য</p></div>
                                <div class="space-y-3 text-xs">
                                    <p class="flex justify-between"><b>জন্ম তারিখ:</b> <span>${toBn(s.dob)}</span></p>
                                    <p class="flex flex-col gap-1"><b>জন্ম নিবন্ধন:</b> <span class="text-[14px] font-black tracking-widest text-cyan-700">${toBn(s.birthReg)}</span></p>
                                </div>
                            </div>
                            <div class="p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                <div class="flex items-center gap-2 mb-4 border-b pb-2"><i data-lucide="phone" class="text-emerald-600" size="16"></i><p class="font-black text-[10px] uppercase text-slate-500">যোগাযোগ</p></div>
                                <div class="space-y-3 text-xs">
                                    <p class="flex justify-between"><b>পিতা:</b> <span>${s.fMobile ? toBn(s.fMobile) : '---'}</span></p>
                                    <p class="flex justify-between"><b>মাতা:</b> <span>${s.mMobile ? toBn(s.mMobile) : '---'}</span></p>
                                </div>
                            </div>
                            <div class="p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                <p class="font-black text-[10px] uppercase text-cyan-600 mb-3 flex items-center gap-2"><i data-lucide="user" size="14"></i> পিতার বিস্তারিত</p>
                                <div class="space-y-2 text-[11px]">
                                    <p><b>নাম:</b> ${s.fName || '---'}</p>
                                    <p><b>NID:</b> ${toBn(s.fNid)}</p>
                                    <p><b>জন্ম:</b> ${toBn(s.fDob)}</p>
                                </div>
                            </div>
                            <div class="p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                <p class="font-black text-[10px] uppercase text-rose-600 mb-3 flex items-center gap-2"><i data-lucide="user-plus" size="14"></i> মাতার বিস্তারিত</p>
                                <div class="space-y-2 text-[11px]">
                                    <p><b>নাম:</b> ${s.mName || '---'}</p>
                                    <p><b>NID:</b> ${toBn(s.mNid)}</p>
                                    <p><b>জন্ম:</b> ${toBn(s.mDob)}</p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-10 flex gap-3 no-print">
                            <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 shadow-xl hover:bg-slate-800 transition-all"><i data-lucide="printer" size="18"></i> প্রিন্ট কার্ড</button>
                            <button onclick="closeModal()" class="px-6 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all">বন্ধ করুন</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('viewModal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.editRec = (id) => {
            const s = window.allData[id]; document.getElementById('editKey').value = id;
            document.getElementById('stName').value = s.name; document.getElementById('class').value = s.className;
            document.getElementById('roll').value = s.roll; document.getElementById('birthReg').value = s.birthReg;
            document.getElementById('dob').value = s.dob; 
            document.getElementById('fName').value = s.fName || ''; document.getElementById('fDob').value = s.fDob || '';
            document.getElementById('fNid').value = s.fNid || ''; document.getElementById('fMobile').value = s.fMobile || '';
            document.getElementById('mName').value = s.mName || ''; document.getElementById('mDob').value = s.mDob || '';
            document.getElementById('mNid').value = s.mNid || ''; document.getElementById('mMobile').value = s.mMobile || '';
            if(s.photo) {
                document.getElementById('photoBase64').value = s.photo;
                document.getElementById('imagePreview').src = s.photo;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('imgLabel').classList.add('hidden');
            }
            switchTab('entryTab');
        };

        // Standard logic for Monthly, Daily and Six Month reports with the same UI consistency
        window.generateMonthlyReport = () => {
            const y = document.getElementById('reportYear').value; const m = document.getElementById('reportMonth').value;
            get(ref(db, `attendance`)).then(snap => {
                const all = snap.val(); if (!all) return showMsg("কোনো হাজিরা রেকর্ড পাওয়া যায়নি", "error");
                let html = `<div class="p-8 bg-white text-black"><div class="text-center border-b-2 border-slate-900 pb-6 mb-8"><h2 class="text-xl font-black">মাসিক হাজিরা রিপোর্ট</h2><p class="text-sm font-bold uppercase mt-1">${m}/${y}</p><p class="text-[10px] mt-1">২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</p></div>`;
                ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                    const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                    if(clsIds.length > 0) {
                        html += `<div class="mb-8"><h3 class="bg-slate-900 text-white p-2 font-black text-center text-xs mb-2">${cls} শ্রেণি</h3><table class="w-full border-collapse border border-slate-400 text-[10px]"><thead><tr class="bg-slate-100"> <th class="border border-slate-400 p-2">রোল</th> <th class="border border-slate-400 p-2 text-left">শিক্ষার্থীর নাম</th> <th class="border border-slate-400 p-2">মোট দিন</th> <th class="border border-slate-400 p-2">উপস্থিতি</th> <th class="border border-slate-400 p-2">শতকরা</th> </tr></thead><tbody>`;
                        clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                            let p = 0, t = 0; Object.keys(all).forEach(d => { if (d.startsWith(`${y}-${m}`)) { t++; if (all[d][id] === "P") p++; } });
                            const pct = t > 0 ? ((p / t) * 100).toFixed(0) : 0;
                            html += `<tr> <td class="border border-slate-400 p-2 text-center font-bold">${toBn(window.allData[id].roll)}</td> <td class="border border-slate-400 p-2 font-bold">${window.allData[id].name}</td> <td class="border border-slate-400 p-2 text-center">${toBn(t)}</td> <td class="border border-slate-400 p-2 text-center font-black">${toBn(p)}</td> <td class="border border-slate-400 p-2 text-center font-black text-cyan-700">${toBn(pct)}%</td> </tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                });
                document.getElementById('modalContent').innerHTML = html + `<button onclick="window.print()" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-black no-print">রিপোর্ট প্রিন্ট করুন</button></div>`;
                document.getElementById('viewModal').classList.remove('hidden');
            });
        };

        // Basic helper functions
        window.initAttendance = () => {
            const d = document.getElementById('attDate').value; if(!d || !window.allData) return;
            const list = document.getElementById('attList'); list.innerHTML = ""; document.getElementById('saveAttBtn').classList.remove('hidden');
            ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                const clsIds = Object.keys(window.allData).filter(id => window.allData[id].className === cls);
                if(clsIds.length > 0) {
                    list.innerHTML += `<p class="text-[10px] font-black text-cyan-500 mt-6 mb-3 uppercase tracking-widest border-l-4 border-cyan-500 pl-3">${cls} শ্রেণি</p>`;
                    clsIds.sort((a,b)=>window.allData[a].roll - window.allData[b].roll).forEach(id => {
                        list.innerHTML += `<label class="flex justify-between items-center p-4 glass mb-2 cursor-pointer hover:bg-white/5 transition-all"><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-cyan-500/10 flex items-center justify-center text-[10px] font-black text-cyan-500">${toBn(window.allData[id].roll)}</span><span class="text-xs font-bold">${window.allData[id].name}</span></div><input type="checkbox" class="att-check w-6 h-6 rounded-lg accent-cyan-500" data-id="${id}" checked></label>`;
                    });
                }
            });
        };

        window.saveAttendance = () => {
            const d = document.getElementById('attDate').value; const att = {};
            document.querySelectorAll('.att-check').forEach(c => att[c.dataset.id] = c.checked ? "P" : "A");
            set(ref(db, `attendance/${d}`), att).then(() => { showMsg("আজকের হাজিরা সফলভাবে সংরক্ষিত হয়েছে!"); loadData(); });
        };

        window.processImage = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('photoBase64').value = b64;
                    document.getElementById('imagePreview').src = b64;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('imgLabel').classList.add('hidden');
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(file);
        };

        document.getElementById('studentForm').onsubmit = (e) => {
            e.preventDefault(); const key = document.getElementById('editKey').value;
            const data = {
                name: document.getElementById('stName').value, className: document.getElementById('class').value, roll: document.getElementById('roll').value, 
                birthReg: document.getElementById('birthReg').value, dob: document.getElementById('dob').value, photo: document.getElementById('photoBase64').value,
                fName: document.getElementById('fName').value, fDob: document.getElementById('fDob').value, fNid: document.getElementById('fNid').value, fMobile: document.getElementById('fMobile').value,
                mName: document.getElementById('mName').value, mDob: document.getElementById('mDob').value, mNid: document.getElementById('mNid').value, mMobile: document.getElementById('mMobile').value
            };
            set(key ? ref(db, `students/${key}`) : push(ref(db, 'students')), data).then(() => {
                showMsg(key ? "তথ্য আপডেট হয়েছে" : "নতুন শিক্ষার্থী যুক্ত হয়েছে");
                document.getElementById('studentForm').reset();
                document.getElementById('editKey').value = "";
                document.getElementById('imagePreview').classList.add('hidden'); document.getElementById('imgLabel').classList.remove('hidden');
                switchTab('viewTab');
            });
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');
        window.toggleTheme = () => { document.body.classList.toggle('light-mode'); lucide.createIcons(); };
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => showMsg("সফলভাবে লগ-আউট হয়েছে", "info"));
        document.getElementById('searchBar').oninput = (e) => loadData(e.target.value);
        lucide.createIcons();
    </script>
</body>
</html>

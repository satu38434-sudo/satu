<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>২১৭নং শেখ ফারিয়া জান্নাত শান্তনা সরকারি প্রাথমিক বিদ‌্যালয়</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: rgba(0, 0, 0, 0.08); --accent: #0891b2; }
        .dark-mode { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #22d3ee; --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.4s; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; }
        .input-style { background: rgba(0,0,0,0.05) !important; border: 1.5px solid var(--border) !important; color: var(--text) !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .tab-active { background: linear-gradient(135deg, #0891b2, #22d3ee) !important; color: #fff !important; transform: translateY(-2px); box-shadow: 0 10px 15px rgba(34, 211, 238, 0.3); }
        @media print { .no-print { display: none !important; } #viewModal { position: absolute; left: 0; top: 0; width: 100%; display: block !important; } }
    </style>
</head>
<body class="light-mode">
    <header class="sticky top-0 z-50 glass !rounded-none border-b px-4 py-4 no-print mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-cyan-500 p-2 rounded-xl"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 id="userGreeting" class="text-sm md:text-xl font-black">লোড হচ্ছে...</h1>
                    <p class="text-[10px] font-bold text-cyan-600 uppercase">২১৭নং স্কুল ম্যানেজমেন্ট</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 glass rounded-xl"><i id="themeIcon" data-lucide="moon"></i></button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-rose-500 p-2.5 glass rounded-xl"><i data-lucide="log-out"></i></button>
            </div>
        </div>
    </header>

    <div id="loginArea" class="min-h-[70vh] flex items-center justify-center p-4">
        <div class="glass p-10 w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-8">প্যানেল লগইন</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="ইমেইল" class="input-style">
                <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" class="input-style">
                <button id="loginBtn" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-black">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <main id="mainApp" class="hidden p-4 max-w-7xl mx-auto no-print">
        <div class="flex justify-center items-center gap-4 mb-8">
            <div class="glass p-5 min-w-[150px] text-center"><p class="text-[10px] font-bold opacity-60">মোট শিক্ষার্থী</p><p id="totalCount" class="text-3xl font-black text-cyan-500">০</p></div>
            <div class="glass p-5 min-w-[150px] text-center"><p class="text-[10px] font-bold opacity-60">আজকের উপস্থিতি</p><p id="todayCount" class="text-3xl font-black text-emerald-500">০</p></div>
        </div>

        <nav class="flex justify-center mb-10 gap-3">
            <button onclick="switchTab('viewTab')" id="btnView" class="px-6 py-3 glass text-xs font-black tab-active">শিক্ষার্থী তালিকা</button>
            <button onclick="switchTab('attendanceTab')" id="btnAttendance" class="px-6 py-3 glass text-xs font-black opacity-60">হাজিরা</button>
            <button onclick="switchTab('entryTab')" id="btnEntry" class="px-6 py-3 glass text-xs font-black opacity-60">নতুন এন্ট্রি</button>
        </nav>

        <section id="viewTab" class="space-y-6">
            <input type="text" id="searchBar" oninput="renderList()" placeholder="নাম বা রোল দিয়ে খুঁজুন..." class="input-style max-w-md mx-auto block mb-6">
            <div id="classWiseContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        </main>

    <div id="viewModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 hidden">
        <div class="glass w-full max-w-4xl p-8 relative overflow-y-auto max-h-[95vh]">
            <button onclick="closeModal()" class="absolute top-6 right-6 no-print text-rose-500"><i data-lucide="x"></i></button>
            <div id="modalContent"></div>
            <button onclick="window.print()" class="mt-6 bg-cyan-600 text-white px-6 py-2 rounded-lg no-print">প্রিন্ট রিপোর্ট</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCx74hxIsdqUd7nC_MKdGV4M0GoWHK4uf4", authDomain: "my-school-database.firebaseapp.com", projectId: "my-school-database", databaseURL: "https://my-school-database-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const toBn = n => n ? n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]) : '০';

        // Auth Logic
        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('userGreeting').innerText = "সুপ্রভাত, " + (u.email.includes('admin') ? "অ্যাডমিন স্যার!" : "প্রধান শিক্ষক!");
                loadData();
            }
        });

        // Data Management
        window.loadData = () => {
            onValue(ref(db, 'students'), (snap) => {
                window.allData = snap.val() || {};
                renderList();
                document.getElementById('totalCount').innerText = toBn(Object.keys(window.allData).length);
            });
        };

        window.renderList = () => {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const container = document.getElementById('classWiseContainer');
            container.innerHTML = "";
            
            ["প্রাক-প্রাথমিক","১ম","২য়","৩য়","৪র্থ","৫ম"].forEach(cls => {
                const students = Object.keys(window.allData || {})
                    .filter(id => window.allData[id].className === cls)
                    .filter(id => window.allData[id].name.toLowerCase().includes(query) || window.allData[id].roll.toString().includes(query));

                if(students.length > 0) {
                    let html = `<div class="glass p-5 border-t-4 border-cyan-500"><h3 class="font-black mb-3 border-b pb-2">${cls} শ্রেণি</h3><div class="space-y-2">`;
                    students.forEach(id => {
                        html += `<div class="flex justify-between items-center text-sm p-2 hover:bg-black/5 rounded-lg">
                                    <span>${window.allData[id].name}</span>
                                    <span class="font-bold text-cyan-600">রোল: ${toBn(window.allData[id].roll)}</span>
                                 </div>`;
                    });
                    container.innerHTML += html + `</div></div>`;
                }
            });
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', document.body.classList.contains('dark-mode') ? 'sun' : 'moon');
            lucide.createIcons();
        };

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("লগইন ব্যর্থ!"));
        };

        window.closeModal = () => document.getElementById('viewModal').classList.add('hidden');
        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Theme Image Resizer</title>
    <style>
        /* CSS Variables for Theme Support */
        :root {
            --bg-color: #ffffff;
            --card-bg: #f3f4f6;
            --text-color: #1f2937;
            --border-color: #d1d5db;
            --primary-color: #2563eb;
            --input-bg: #ffffff;
        }

        /* Dark Mode Override */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --card-bg: #1f2937;
                --text-color: #f9fafb;
                --border-color: #374151;
                --input-bg: #374151;
            }
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.3s ease;
        }

        .container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px; /* Mobile friendly width */
            box-sizing: border-box;
        }

        h2 { text-align: center; margin-bottom: 1.5rem; }

        .upload-section {
            border: 2px dashed var(--border-color);
            padding: 30px 10px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        /* Ensure input doesn't overflow on small screens */
        input[type="file"] {
            max-width: 100%;
        }

        .controls {
            display: flex;
            flex-direction: column; /* Stacked for mobile */
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Side-by-side inputs on larger screens */
        @media (min-width: 400px) {
            .input-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
        }

        .input-group { display: flex; flex-direction: column; }

        label { font-size: 0.8rem; margin-bottom: 4px; opacity: 0.8; }

        input[type="number"] {
            padding: 12px; /* Larger tap target for mobile */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #preview-container {
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0,0,0,0.05);
        }

        img { width: 100%; height: auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Resizer</h2>
    
    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="controls">
        <div class="input-row">
            <div class="input-group">
                <label>Width (px)</label>
                <input type="number" id="widthInput" placeholder="Width">
            </div>
            <div class="input-group">
                <label>Height (px)</label>
                <input type="number" id="heightInput" placeholder="Height">
            </div>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="aspectRatio" checked>
            <label for="aspectRatio">Lock Aspect Ratio</label>
        </div>
    </div>

    <button id="downloadBtn" disabled>Download</button>

    <div id="preview-container">
        <img id="previewImg">
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    /* ... The JavaScript logic from the previous response remains the same ... */
    const imageInput = document.getElementById('imageInput');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const aspectRatio = document.getElementById('aspectRatio');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewImg = document.getElementById('previewImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let originalImg = new Image();
    let ratio = 1;

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => originalImg.src = event.target.result;
        reader.readAsDataURL(file);
    });

    originalImg.onload = () => {
        ratio = originalImg.width / originalImg.height;
        widthInput.value = originalImg.width;
        heightInput.value = originalImg.height;
        previewImg.src = originalImg.src;
        previewImg.style.display = 'block';
        downloadBtn.disabled = false;
    };

    widthInput.addEventListener('input', () => {
        if (aspectRatio.checked) heightInput.value = Math.round(widthInput.value / ratio);
    });

    heightInput.addEventListener('input', () => {
        if (aspectRatio.checked) widthInput.value = Math.round(heightInput.value * ratio);
    });

    downloadBtn.addEventListener('click', () => {
        const w = parseInt(widthInput.value);
        const h = parseInt(heightInput.value);
        canvas.width = w; canvas.height = h;
        ctx.drawImage(originalImg, 0, 0, w, h);
        const link = document.createElement('a');
        link.download = `resized-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>satu.pro.bd | Pro Image Studio</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Scripts & Fonts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-gradient: radial-gradient(circle at top right, #e2e8f0, #f1f5f9);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-hover: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent-cyan: #0891b2;
            --accent-gold: #b45309;
            --accent-red: #e11d48;
            --text-main: #0f172a;
            --text-dim: #475569;
            --header-bg: rgba(255, 255, 255, 0.85);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0a0f1d;
                --bg-gradient: radial-gradient(circle at top right, #1e293b, #0a0f1d);
                --glass: rgba(30, 41, 59, 0.7);
                --glass-hover: rgba(51, 65, 85, 0.9);
                --glass-border: rgba(255, 255, 255, 0.1);
                --accent-cyan: #22d3ee;
                --accent-gold: #fbbf24;
                --accent-red: #f43f5e;
                --text-main: #f1f5f9;
                --text-dim: #94a3b8;
                --header-bg: rgba(10, 15, 29, 0.85);
            }
        }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'SolaimanLipi', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            display: flex; justify-content: center; align-items: center;
            padding: 12px 15px; background: var(--header-bg);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-img { height: 35px; filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4)); }

        main { max-width: 600px; margin: 30px auto; padding: 0 15px 50px; }

        .tool-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* Drag & Drop */
        .drop-zone {
            border: 2px dashed var(--accent-cyan);
            border-radius: 18px;
            padding: 35px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
            margin-bottom: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .drop-zone:hover { background: rgba(34, 211, 238, 0.08); border-color: var(--accent-gold); }

        .section-label { 
            font-size: 0.95rem; color: var(--accent-cyan); 
            font-weight: 700; margin-bottom: 12px; display: block;
        }

        /* Grid Controls */
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; opacity: 0.8; }
        
        input, select {
            padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: var(--glass); color: var(--text-main); font-size: 16px;
            font-family: inherit;
        }

        input[type="range"] { padding: 0; cursor: pointer; accent-color: var(--accent-cyan); }

        /* Presets */
        .preset-row { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .preset-btn {
            flex: 1; min-width: 80px; padding: 10px; font-size: 0.8rem; border-radius: 10px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text-main); cursor: pointer; transition: 0.2s;
        }
        .preset-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        .btn-process {
            width: 100%; padding: 18px; border-radius: 15px;
            background: var(--accent-cyan); color: #fff; border: none;
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
            margin-top: 10px;
        }
        .btn-process:disabled { background: var(--text-dim); opacity: 0.5; box-shadow: none; cursor: not-allowed; }

        #preview-wrap {
            margin-top: 30px; border-radius: 18px; overflow: hidden;
            border: 1px solid var(--glass-border); display: none;
            background: #000;
        }
        img { width: 100%; display: block; }

        footer { text-align: center; padding: 30px; opacity: 0.6; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <a href="/"><img src="/logo.svg" alt="satu.pro.bd" class="header-img"></a>
</header>

<main>
    <div class="tool-card">
        <h2 style="text-align:center; margin-top:0; color:var(--accent-gold);">প্রো ইমেজ স্টুডিও</h2>

        <!-- Upload Section -->
        <div class="drop-zone" id="dropZone">
            <i data-lucide="upload-cloud" size="42" style="color:var(--accent-cyan)"></i>
            <span id="dropText">ছবি ড্রাগ করুন অথবা এখানে ক্লিক করুন</span>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <!-- Preset Section -->
        <span class="section-label">প্রিসেট সাইজ (Quick Presets)</span>
        <div class="preset-row">
            <button onclick="setPreset(300, 300)" class="preset-btn">ID (1:1)</button>
            <button onclick="setPreset(1280, 720)" class="preset-btn">News (16:9)</button>
            <button onclick="setPreset(1080, 1920)" class="preset-btn">Story (9:16)</button>
            <button onclick="setPreset(1200, 630)" class="preset-btn">FB Post</button>
        </div>

        <!-- Resizing Section -->
        <span class="section-label">রিসাইজ অপশন</span>
        <div class="settings-grid">
            <div class="field">
                <label>প্রস্থ (Width px)</label>
                <input type="number" id="wInput" placeholder="0">
            </div>
            <div class="field">
                <label>উচ্চতা (Height px)</label>
                <input type="number" id="hInput" placeholder="0">
            </div>
            <div class="field">
                <label>ফরম্যাট</label>
                <select id="format">
                    <option value="image/webp">WebP (Modern)</option>
                    <option value="image/jpeg">JPEG (Small)</option>
                    <option value="image/png">PNG (Clear)</option>
                </select>
            </div>
            <div class="field">
                <label>কোয়ালিটি (<span id="qVal">90</span>%)</label>
                <input type="range" id="quality" min="1" max="100" value="90">
            </div>
        </div>

        <!-- Filter Section -->
        <span class="section-label">এডিটিং ফিল্টার</span>
        <div class="settings-grid">
            <div class="field">
                <label>উজ্জ্বলতা (Brightness: <span id="brVal">100</span>%)</label>
                <input type="range" id="brightness" min="50" max="150" value="100">
            </div>
            <div class="field">
                <label>কন্ট্রাস্ট (Contrast: <span id="ctVal">100</span>%)</label>
                <input type="range" id="contrast" min="50" max="150" value="100">
            </div>
        </div>

        <button class="btn-process" id="saveBtn" disabled>
            <i data-lucide="download"></i> ডাউনলোড করুন
        </button>

        <div id="preview-wrap">
            <img id="previewImg">
        </div>
    </div>
</main>

<footer>
    &copy; 2026 <b>satu.pro.bd</b> | All Rights Reserved.
</footer>

<canvas id="canvas" style="display:none"></canvas>

<script>
    const $ = id => document.getElementById(id);
    let originalImg = new Image();
    let ratio = 1;

    // Lucide Icons
    lucide.createIcons();

    // File Upload Logic
    const handleFile = file => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => originalImg.src = e.target.result;
        reader.readAsDataURL(file);
        $('dropText').innerText = file.name;
    };

    $('dropZone').onclick = () => $('fileInput').click();
    $('fileInput').onchange = e => handleFile(e.target.files[0]);

    // Drag and Drop Effects
    $('dropZone').ondragover = e => { e.preventDefault(); $('dropZone').style.borderColor = 'var(--accent-gold)'; };
    $('dropZone').ondragleave = () => $('dropZone').style.borderColor = 'var(--accent-cyan)';
    $('dropZone').ondrop = e => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
    };

    originalImg.onload = () => {
        ratio = originalImg.width / originalImg.height;
        $('wInput').value = originalImg.width;
        $('hInput').value = originalImg.height;
        $('previewImg').src = originalImg.src;
        $('preview-wrap').style.display = 'block';
        $('saveBtn').disabled = false;
    };

    // Resizing & Filter Inputs
    $('wInput').oninput = () => $('hInput').value = Math.round($('wInput').value / ratio);
    $('hInput').oninput = () => $('wInput').value = Math.round($('hInput').value * ratio);
    
    window.setPreset = (w, h) => {
        if(!originalImg.src) return;
        $('wInput').value = w;
        $('hInput').value = h;
        ratio = w / h;
    };

    $('quality').oninput = e => $('qVal').innerText = e.target.value;
    $('brightness').oninput = e => $('brVal').innerText = e.target.value;
    $('contrast').oninput = e => $('ctVal').innerText = e.target.value;

    // Final Canvas Processing
    $('saveBtn').onclick = () => {
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d');
        const w = parseInt($('wInput').value);
        const h = parseInt($('hInput').value);
        
        canvas.width = w;
        canvas.height = h;

        // Apply Native Canvas Filters
        ctx.filter = `brightness(${$('brightness').value}%) contrast(${$('contrast').value}%)`;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        ctx.drawImage(originalImg, 0, 0, w, h);

        const format = $('format').value;
        const link = document.createElement('a');
        link.download = `satu-pro-${Date.now()}.${format.split('/')[1]}`;
        link.href = canvas.toDataURL(format, $('quality').value / 100);
        link.click();
    };

    // PWA Offline Support (Service Worker Registration)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
    }
</script>

</body>
</html>

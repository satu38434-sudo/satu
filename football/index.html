<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATU PRO TV - Live Streaming (satu.pro.bd)</title>
    <!-- Tailwind CSS for Responsive Layout & Styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HLS.js Library to support live television stream (.m3u8) playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Custom scrollbar matching the dark theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header Banner -->
    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 text-white text-xs font-bold px-2.5 py-1 rounded-sm uppercase tracking-wider animate-pulse">LIVE</div>
                <h1 class="text-2xl font-black text-red-500 tracking-tight">SATU PRO <span class="text-white font-light">TV</span></h1>
            </div>
            <div class="text-xs text-gray-400 bg-gray-800 px-4 py-2 rounded-lg border border-gray-750 max-w-sm text-center sm:text-right">
                <span class="text-red-400 font-semibold">Official Portal:</span> satu.pro.bd Live IPTV Service
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow w-full">
        
        <!-- Left/Top Section: Video Player & Current Info -->
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800 aspect-video relative group">
                <video id="video-player" controls autoplay class="w-full h-full object-contain"></video>
            </div>
            
            <!-- Player Controller Panel Details -->
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <p class="text-xs text-gray-400 uppercase font-semibold tracking-wider">Now Playing</p>
                    <h2 id="current-channel-title" class="text-xl font-bold text-white mt-1">Select a Channel</h2>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="prev-btn" class="flex-1 sm:flex-initial bg-gray-800 hover:bg-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition border border-gray-700 cursor-pointer">◀ Prev</button>
                    <button id="next-btn" class="flex-1 sm:flex-initial bg-gray-800 hover:bg-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition border border-gray-700 cursor-pointer">Next ▶</button>
                </div>
            </div>
        </div>

        <!-- Right Section: Categories & Channel List -->
        <div class="flex flex-col bg-gray-900 rounded-xl border border-gray-800 overflow-hidden h-[calc(100vh-180px)] lg:h-[600px]">
            <!-- Category Selection Row -->
            <div id="category-container" class="flex gap-2 overflow-x-auto p-3 bg-gray-950 border-b border-gray-800 whitespace-nowrap">
                <!-- Categories injected dynamically via JS -->
            </div>

            <!-- Dynamic Channel Listing Grid -->
            <div id="channels-grid" class="grid grid-cols-2 gap-2.5 p-3 overflow-y-auto flex-grow content-start">
                <!-- Channel Items injected dynamically via JS -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-950 border-t border-gray-900 p-4 text-center text-xs text-gray-500 mt-auto">
        <p>&copy; 2026 <a href="https://satu.pro.bd" class="text-red-400 hover:underline font-medium">satu.pro.bd</a>. All rights reserved. Powered by Satu Pro IPTV.</p>
    </footer>

    <!-- Frontend Core Application Script -->
    <script>
        // Working Dataset (Replace URLs with your own premium .m3u8 streams if needed)
        const channelData = [
            { id: 1, name: "Somoy TV (Test)", category: "Bangla", logo: "🔥", url: "https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8" },
            { id: 2, name: "Jamuna TV (Test)", category: "Bangla", logo: "📺", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { id: 3, name: "T Sports (Test)", category: "Sports", logo: "⚽", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8" },
            { id: 4, name: "Sony Sports (Test)", category: "Sports", logo: "🏏", url: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8" },
            { id: 5, name: "Discovery (Test)", category: "Infotainment", logo: "🌍", url: "https://test-streams.mux.dev/pts_live/playlist.m3u8" }
        ];

        const categories = ["All", "Bangla", "Sports", "Infotainment"];
        
        let currentCategory = "All";
        let activeChannelIndex = 0;
        let filteredChannels = [...channelData];

        const video = document.getElementById('video-player');
        const channelTitle = document.getElementById('current-channel-title');
        const categoryContainer = document.getElementById('category-container');
        const channelsGrid = document.getElementById('channels-grid');

        function initApp() {
            renderCategories();
            renderChannels();
            if(filteredChannels.length > 0) {
                loadChannel(0);
            }
        }

        function renderCategories() {
            categoryContainer.innerHTML = categories.map(cat => {
                const count = cat === "All" ? channelData.length : channelData.filter(c => c.category === cat).length;
                const isActive = cat === currentCategory;
                return `
                    <button onclick="setCategory('${cat}')" class="px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide border transition duration-200 cursor-pointer ${
                        isActive 
                        ? 'bg-red-600 text-white border-red-500 shadow-md shadow-red-900/20' 
                        : 'bg-gray-900 text-gray-400 border-gray-800 hover:bg-gray-800 hover:text-white'
                    }">
                        ${cat} (${count})
                    </button>
                `;
            }).join('');
        }

        function renderChannels() {
            filteredChannels = currentCategory === "All" 
                ? [...channelData] 
                : channelData.filter(c => c.category === currentCategory);

            channelsGrid.innerHTML = filteredChannels.map((channel, idx) => {
                const isPlaying = filteredChannels[activeChannelIndex]?.id === channel.id;
                return `
                    <div onclick="selectChannelCard(${idx})" class="group p-3 rounded-xl border transition-all duration-200 cursor-pointer flex items-center gap-3 ${
                        isPlaying 
                        ? 'bg-red-950/40 border-red-600 shadow-sm' 
                        : 'bg-gray-850 border-gray-800 hover:border-gray-700 hover:bg-gray-800'
                    }">
                        <div class="w-10 h-10 rounded-lg bg-gray-900 flex items-center justify-center text-lg shadow-inner group-hover:scale-105 transition-transform duration-200">
                            ${channel.logo}
                        </div>
                        <div class="overflow-hidden">
                            <h4 class="text-xs font-bold truncate text-gray-100">${channel.name}</h4>
                            <p class="text-[10px] text-gray-400 font-medium tracking-wide mt-0.5">${channel.category}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.setCategory = function(category) {
            currentCategory = category;
            activeChannelIndex = 0; 
            renderCategories();
            renderChannels();
            if(filteredChannels.length > 0) {
                loadChannel(0);
            }
        };

        window.selectChannelCard = function(idx) {
            loadChannel(idx);
        };

        function loadChannel(index) {
            if (index < 0 || index >= filteredChannels.length) return;
            
            activeChannelIndex = index;
            const channel = filteredChannels[index];
            channelTitle.textContent = channel.name;

            renderChannels();

            if (!channel.url) return;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Autoplay waiting for trigger..."));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (activeChannelIndex > 0) {
                loadChannel(activeChannelIndex - 1);
            } else {
                loadChannel(filteredChannels.length - 1);
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (activeChannelIndex < filteredChannels.length - 1) {
                loadChannel(activeChannelIndex + 1);
            } else {
                loadChannel(0);
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>

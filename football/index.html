<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ স্ট্রিম প্লেয়ার</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .player-container {
            max-width: 800px;
            margin: 30px auto;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .status-message {
            margin-top: 15px;
            font-size: 14px;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <h2>লাইভ টিভি স্ট্রিমিং প্লেয়ার</h2>
    
    <div class="player-container">
        <video id="videoElement" controls autoplay muted></video>
    </div>

    <p class="status-message" id="status">প্লেয়ার লোড হচ্ছে...</p>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // আপনার দেওয়া লাইভ স্ট্রিম লিংক
            var streamUrl = 'http://fastshare1.com:8080//live/25711345/late8airline/52500.ts';
            var statusText = document.getElementById('status');

            // ব্রাউজার MSE (Media Source Extensions) সাপোর্ট করে কিনা পরীক্ষা করা
            if (mpegts.getFeatureList().mseLivePlayback) {
                var videoElement = document.getElementById('videoElement');
                
                // প্লেয়ার কনফিগারেশন
                var player = mpegts.createPlayer({
                    type: 'mpegts',  // স্ট্রিম ফরম্যাট .ts এর জন্য
                    isLive: true,    // লাইভ স্ট্রিমের জন্য true
                    url: streamUrl
                });

                player.attachMediaElement(videoElement);
                player.load();
                
                // প্লে করার চেষ্টা
                player.play().then(() => {
                    statusText.innerText = "লাইভ স্ট্রিম সফলভাবে চলছে।";
                }).catch(error => {
                    statusText.innerText = "অটো-প্লে ব্লক হয়েছে। প্লেয়ারের Play বাটনে ক্লিক করুন।";
                    console.log("Play error:", error);
                });

                // কোনো এরর বা সমস্যা হলে তা হ্যান্ডেল করা
                player.on(mpegts.Events.ERROR, function(type, detail, info) {
                    console.error('Player Error:', type, detail, info);
                    statusText.innerText = "স্ট্রিমটি লোড করা যাচ্ছে না। (CORS বা Mixed Content সমস্যা হতে পারে)";
                });

            } else {
                statusText.innerText = "দুঃখিত, আপনার ব্রাউজারটি এই লাইভ স্ট্রিম সাপোর্ট করে না।";
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayZ TV Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --card-hover: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--sidebar-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2e3e56;
            z-index: 10;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .search-box {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #475569;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 250px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent-color);
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .sidebar {
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2e3e56;
        }

        .filter-container {
            padding: 10px;
            border-bottom: 1px solid #2e3e56;
        }

        .category-select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid #475569;
            outline: none;
            cursor: pointer;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.02);
            transition: background-color 0.2s, transform 0.1s;
        }

        .channel-item:hover {
            background-color: var(--card-hover);
            transform: translateX(2px);
        }

        .channel-item.active {
            background-color: var(--accent-color);
        }

        .channel-logo {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: contain;
            background-color: #1e293b;
            margin-right: 15px;
            border: 1px solid #334155;
        }

        .channel-info {
            flex: 1;
            overflow: hidden;
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-group {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .channel-item.active .channel-group {
            color: #e2e8f0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--sidebar-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                overflow-y: auto;
            }
            .player-section {
                flex: none;
                height: 56.25vw; /* 16:9 Aspect Ratio */
            }
            .sidebar {
                flex: 1;
                max-width: 100%;
                min-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>PlayZ TV Portal</h1>
        <input type="text" id="search" class="search-box" placeholder="Search channels...">
    </header>

    <div class="main-container">
        <section class="player-section">
            <video id="video" controls autoplay playsinline></video>
        </section>

        <aside class="sidebar">
            <div class="filter-container">
                <select id="categoryFilter" class="category-select">
                    <option value="all">All Categories</option>
                </select>
            </div>
            <div id="channelList" class="channel-list">
                </div>
        </aside>
    </div>

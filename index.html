<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SATU - News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-gradient: radial-gradient(circle at 50% -20%, #064e3b 0%, #020617 80%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(251, 191, 36, 0.2);
            --accent-gold: #fbbf24;
            --text-bright: #f8fafc;
            --color-news: #38bdf8;
            --color-notice: #10b981;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base) var(--bg-gradient) fixed;
            color: var(--text-bright); margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- HEADER & MENU BESIDE LOGO --- */
        .masthead {
            max-width: 1100px; margin: 0 auto; padding: 20px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px double var(--border);
        }

        .logo-area { display: flex; flex-direction: column; align-items: flex-start; }
        .main-banner { max-width: 220px; width: 100%; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.15)); }

        .nav-links { display: flex; gap: 15px; }
        .nav-item {
            color: var(--text-bright); text-decoration: none; font-size: 0.75rem;
            font-weight: 600; padding: 8px 12px; border: 1px solid var(--border);
            border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .nav-item:hover { background: rgba(251, 191, 36, 0.1); border-color: var(--accent-gold); color: var(--accent-gold); }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border);
            overflow: hidden; white-space: nowrap; display: flex; align-items: center; height: 35px;
        }
        .ticker-label { background: #b91c1c; color: white; padding: 0 12px; height: 100%; display: flex; align-items: center; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker-move 100s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 30px; font-size: 0.8rem; opacity: 0.9; }
        @keyframes ticker-move { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- GRID LAYOUT --- */
        main { max-width: 1100px; margin: 0 auto; padding: 20px 15px 80px; }
        .section-label { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent-gold); margin: 30px 0 15px; display: flex; align-items: center; gap: 12px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 15px; display: flex; align-items: center; gap: 12px; text-decoration: none;
            color: var(--text-bright); transition: 0.3s;
        }
        .card:hover { border-color: var(--accent-gold); transform: translateY(-2px); background: rgba(251,191,36,0.05); }
        .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        @media (max-width: 768px) {
            .masthead { flex-direction: column; gap: 15px; text-align: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-label">Live</div>
        <div class="ticker-content" id="newsTicker">Connecting to news servers...</div>
    </div>

    <header class="masthead">
        <div class="logo-area">
            <img src="logo.svg" alt="SATU" class="main-banner">
            <div id="currentDate" style="font-size: 0.6rem; font-weight: 700; color: var(--accent-gold); margin-top: 5px;"></div>
        </div>

        <nav class="nav-links">
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank" class="nav-item"><i data-lucide="map-pin" size="14"></i> Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices" target="_blank" class="nav-item"><i data-lucide="bell" size="14"></i> National</a>
            <a href="age.html" class="nav-item"><i data-lucide="calculator" size="14"></i> Age Calc</a>
            <a href="salary.html" class="nav-item"><i data-lucide="banknote" size="14"></i> Salary</a>
        </nav>
    </header>

    <main>
        <div class="section-label">Top News Headlines (20 Cards)</div>
        <div class="grid" id="newsGrid">
            </div>
    </main>

    <script>
        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            
            const feeds = [
                { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/collection/latest" },
                { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" },
                { name: "Daily Star", url: "https://bangla.thedailystar.net/rss.xml" },
                { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" }
            ];

            ticker.innerHTML = '';

            for (const feed of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();

                    if (data.status === 'ok') {
                        data.items.slice(0, 5).forEach(item => {
                            // Update Ticker
                            ticker.innerHTML += `<span class="ticker-item">● <b>${feed.name}:</b> ${item.title}</span>`;

                            // Add Grid Card
                            const card = document.createElement('a');
                            card.href = item.link;
                            card.target = "_blank";
                            card.className = "card";
                            card.innerHTML = `
                                <div class="dot" style="background:${item.title.includes('প্রাথমিক') ? '#ef4444' : 'var(--color-news)'}"></div>
                                <div>
                                    <div style="font-size: 0.55rem; color: var(--accent-gold); font-weight:700;">${feed.name.toUpperCase()}</div>
                                    <div style="font-size: 0.8rem; font-weight:500; line-height:1.3;">${item.title}</div>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) {
                    console.log("Error loading " + feed.name);
                }
            }
        }

        lucide.createIcons();
        fetchNews();

        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        }).toUpperCase();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SATU - News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-gradient: radial-gradient(circle at 50% -20%, #064e3b 0%, #020617 80%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(251, 191, 36, 0.2);
            --accent-gold: #fbbf24;
            --text-bright: #f8fafc;
            --color-news: #38bdf8;
            --color-alert: #ef4444;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base) var(--bg-gradient) fixed;
            color: var(--text-bright); margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            overflow: hidden; white-space: nowrap; display: flex; align-items: center; height: 35px;
            position: sticky; top: 0; z-index: 1000;
        }
        .ticker-label { background: #b91c1c; color: white; padding: 0 12px; height: 100%; display: flex; align-items: center; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker-move 350s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 30px; font-size: 0.8rem; }
        @keyframes ticker-move { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- HEADER --- */
        .masthead { max-width: 1100px; margin: 0 auto; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; }
        .main-banner { max-width: 240px; width: 100%; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.2)); }

        .nav-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            width: 100%; max-width: 500px; margin-bottom: 20px;
        }
        .nav-item {
            color: var(--text-bright); text-decoration: none; font-size: 0.75rem;
            font-weight: 600; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; transition: 0.3s; display: flex; align-items: center; 
            justify-content: center; gap: 8px; background: rgba(255,255,255,0.03);
        }
        .nav-item:hover { background: rgba(251, 191, 36, 0.1); border-color: var(--accent-gold); color: var(--accent-gold); }

        /* --- SEARCH BAR --- */
        .search-container { width: 100%; max-width: 500px; position: relative; margin-bottom: 10px; }
        .search-input {
            width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border);
            padding: 12px 40px; border-radius: 25px; color: white; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .search-icon { position: absolute; left: 15px; top: 12px; color: var(--accent-gold); }

        /* --- NEWS GRID --- */
        main { max-width: 1100px; margin: 0 auto; padding: 20px 15px 80px; }
        .section-label { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent-gold); margin: 35px 0 15px; display: flex; align-items: center; gap: 12px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 18px; display: flex; align-items: center; gap: 15px; text-decoration: none;
            color: var(--text-bright); transition: 0.3s;
        }
        .card:hover { border-color: var(--accent-gold); transform: translateY(-2px); background: rgba(251,191,36,0.08); }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* --- BACK TO TOP --- */
        .back-top {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent-gold);
            color: black; padding: 10px; border-radius: 50%; cursor: pointer; display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 2000;
        }

        @media (min-width: 768px) { .nav-grid { grid-template-columns: repeat(4, 1fr); max-width: 800px; } }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-label">Live</div>
        <div class="ticker-content" id="newsTicker">Initializing Mega Feed...</div>
    </div>

    <header class="masthead">
        <img src="logo.svg" alt="SATU" class="main-banner">
        <nav class="nav-grid">
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank" class="nav-item"><i data-lucide="map-pin" size="12"></i>DPE Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices" target="_blank" class="nav-item"><i data-lucide="bell" size="12"></i> DPE</a>
            <a href="age.html" class="nav-item"><i data-lucide="calculator" size="12"></i> Age Calc</a>
            <a href="salary.html" class="nav-item"><i data-lucide="banknote" size="12"></i> Salary</a>
        </nav>
        
        <div class="search-container">
            <i data-lucide="search" class="search-icon" size="18"></i>
            <input type="text" id="newsSearch" class="search-input" placeholder="Search 200 news headlines...">
        </div>
    </header>

    <main>
        <div class="section-label" id="statusLabel">Loading 40 News Sources...</div>
        <div class="grid" id="newsGrid"></div>
    </main>

    <div class="back-top" id="backTop" onclick="window.scrollTo(0,0)"><i data-lucide="arrow-up"></i></div>

    <script>
        const feeds = [
            // 1-10
  
            { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" },
            { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" },
            { name: "Jugantor", url: "https://www.jugantor.com/rss.xml" },
            { name: "bdnews24", url: "https://bangla.bdnews24.com/?widgetName=rssfeed&widgetId=1151&getXmlFeed=true" },
            { name: "Somoy News", url: "https://www.somoynews.tv/rss" },
            { name: "Ittefaq", url: "https://www.ittefaq.com.bd/rss.xml" },
            { name: "Banglanews24", url: "https://www.banglanews24.com/rss/rss.xml" },
            { name: "Jago News", url: "https://www.jagonews24.com/rss/rss.xml" },
            // 11-20
   
            { name: "RTV Online", url: "https://www.rtvonline.com/feed/bangladesh" },
            { name: "Channel 24", url: "https://www.channel24bd.tv/rss/rss.xml" },
            { name: "Inqilab", url: "https://www.dailyinqilab.com/rss.xml" },
            { name: "Nayadiganta", url: "https://www.dailynayadiganta.com/rss.xml" },
            { name: "Manab Zamin", url: "https://mzamin.com/rss.php" },
            { name: "Bhorer Kagoj", url: "https://www.bhorerkagoj.com/feed" },
            { name: "Daily Janakantha", url: "https://www.dailyjanakantha.com/rss.xml" },
            { name: "Amader Shomoy", url: "https://www.dainikamadershomoy.com/rss.xml" },
            { name: "Dhaka Tribune", url: "https://bangla.dhakatribune.com/feed" },
            // 21-30
            { name: "Bonik Barta", url: "https://bonikbarta.net/home/rss" },
            { name: "Desh Rupantor", url: "https://www.deshrupantor.com/rss.xml" },
            { name: "Daily Sun", url: "https://www.daily-sun.com/rss" },
            { name: "Financial Express", url: "https://thefinancialexpress.com.bd/rss/home" },
            { name: "Daily Observer", url: "https://www.observerbd.com/rss.php" },
            { name: "Protidin", url: "https://www.bd-pratidin.com/rss.xml" },
            { name: "Sangbad", url: "https://sangbad.net.bd/rss.xml" },
            { name: "Dainik Azadi", url: "https://dainikazadi.net/feed" },
            { name: "Daily Purbokone", url: "https://purbokone.net/feed" },
            { name: "Sylhet View 24", url: "https://www.sylhetview24.net/rss.xml" },
            // 31-40
            { name: "Barisal Times", url: "https://www.barisaltimes.com/feed" },
            { name: "RisingBD", url: "https://www.risingbd.com/rss/rss.xml" },
            { name: "Varendra News", url: "https://varendranews.com/feed" },
            { name: "Khulna News", url: "https://www.khulnanews.com/feed" },
            { name: "Coxsbazar News", url: "https://www.coxsbazarnews.com/feed" },
            { name: "Dainik Shiksha", url: "https://www.dainikshiksha.com/feed" },
            { name: "Education BD", url: "https://educationbd.com/feed" },
            { name: "Diganta News", url: "https://www.digantanews.com/feed" },
            { name: "Barta24", url: "https://barta24.com/rss/rss.xml" },
            { name: "Dainik Bangla", url: "https://www.dainikbangla.com.bd/rss.xml" }
        ];

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            ticker.innerHTML = '';

            for (const feed of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();

                    if (data.status === 'ok') {
                        data.items.slice(0, 5).forEach(item => {
                            ticker.innerHTML += `<span class="ticker-item">● <b>${feed.name}:</b> ${item.title}</span>`;
                            const card = document.createElement('a');
                            card.href = item.link; card.target = "_blank"; card.className = "card";
                            card.setAttribute('data-title', item.title.toLowerCase());
                            card.innerHTML = `
                                <div class="dot" style="background:${item.title.includes('প্রাথমিক') ? 'var(--color-alert)' : 'var(--color-news)'}"></div>
                                <div>
                                    <div style="font-size: 0.55rem; color: var(--accent-gold); font-weight:700;">${feed.name.toUpperCase()}</div>
                                    <div style="font-size: 0.82rem; font-weight:500; line-height:1.4;">${item.title}</div>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) { console.log("Error: " + feed.name); }
            }
            document.getElementById('statusLabel').innerText = "Live Mega Feed";
        }

        // Search Logic
        document.getElementById('newsSearch').oninput = function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(val) ? 'flex' : 'none';
            });
        };

        // Scroll Logic
        window.onscroll = function() {
            document.getElementById('backTop').style.display = window.scrollY > 500 ? 'block' : 'none';
        };

        lucide.createIcons();
        fetchNews();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SATU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-gradient: radial-gradient(circle at 50% -20%, #064e3b 0%, #020617 80%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(251, 191, 36, 0.2);
            --accent-gold: #fbbf24;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --color-ai: #a78bfa;
            --color-news: #38bdf8;
            --color-notice: #10b981;
            --color-alert: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base) var(--bg-gradient) fixed;
            color: var(--text-bright);
            margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SMART ALERT ANIMATION --- */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); border-color: var(--accent-gold); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); border-color: var(--accent-gold); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: var(--border); }
        }
        .new-alert { animation: pulse-gold 2s infinite; position: relative; }
        .badge-new {
            background: var(--accent-gold); color: black; font-size: 0.55rem;
            padding: 2px 6px; border-radius: 4px; font-weight: 800;
            position: absolute; top: -8px; right: 8px; z-index: 5;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border);
            overflow: hidden; white-space: nowrap; display: flex; align-items: center; height: 40px;
        }
        .ticker-label { background: #b91c1c; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; z-index: 10; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker-move 80s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 40px; color: var(--text-bright); text-decoration: none; font-size: 0.85rem; }
        @keyframes ticker-move { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- LAYOUT --- */
        .masthead { max-width: 1100px; margin: 0 auto; padding: 20px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px double var(--border); }
        .menu-trigger { background: none; border: 1px solid var(--border); color: var(--accent-gold); padding: 10px; border-radius: 10px; cursor: pointer; }
        .banner-center-group { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; margin-right: 45px; }
        .main-banner { max-width: 250px; width: 100%; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.15)); }
        
        main { max-width: 1100px; margin: 0 auto; padding: 0 15px 80px; }
        .section-label { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent-gold); margin: 40px 0 15px; display: flex; align-items: center; gap: 12px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; display: flex; align-items: center; gap: 15px; text-decoration: none;
            color: var(--text-bright); transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--accent-gold); transform: translateY(-3px); background: rgba(251,191,36,0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* --- SIDEBAR --- */
        .side-menu {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%;
            background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .side-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .menu-item { display: flex; align-items: center; gap: 12px; color: var(--text-bright); text-decoration: none; padding: 12px; border-radius: 10px; margin-bottom: 5px; }
        .menu-item:hover { background: rgba(251, 191, 36, 0.1); color: var(--accent-gold); }

        @media (max-width: 600px) { .main-banner { max-width: 160px; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <nav class="side-menu" id="sideMenu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <span style="font-family:'Playfair Display'; color:var(--accent-gold); font-size:1.4rem;">Menu</span>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white;"><i data-lucide="x"></i></button>
        </div>
        <div style="color:var(--accent-gold); font-size:0.6rem; letter-spacing:1px; margin-bottom:10px;">GOVERNMENT PORTALS</div>
        <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank" class="menu-item"><i data-lucide="external-link"></i> Gopalganj DPE</a>
        <a href="https://dpe.gov.bd/pages/notices" target="_blank" class="menu-item"><i data-lucide="external-link"></i> National DPE</a>
        <div style="margin-top:20px; color:var(--accent-gold); font-size:0.6rem; letter-spacing:1px; margin-bottom:10px;">TOOLS</div>
        <a href="age.html" class="menu-item"><i data-lucide="calculator"></i> Age Calculator</a>
        <a href="salary.html" class="menu-item"><i data-lucide="banknote"></i> Salary Fixation</a>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker-label">Breaking</div>
        <div class="ticker-content" id="newsTicker">Syncing with news servers...</div>
    </div>

    <header class="masthead">
        <button class="menu-trigger" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
        <div class="banner-center-group">
            <img src="logo.svg" alt="SATU" class="main-banner">
            <div id="currentDate" style="font-size: 0.6rem; font-weight: 700; color: var(--accent-gold); margin-top: 5px; letter-spacing: 1px;"></div>
        </div>
    </header>

    <main>
        <div class="section-label">Official Education Notices</div>
        <div class="grid">
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank" class="card">
                <div class="dot" style="background:var(--color-notice); box-shadow: 0 0 10px var(--color-notice)"></div>
                <div>
                    <div style="font-size: 0.6rem; color: var(--accent-gold);">GOPALGANJ</div>
                    <div style="font-weight: 600; font-size: 0.9rem;">District Education Office Notices</div>
                </div>
            </a>
            <a href="https://dpe.gov.bd/pages/notices" target="_blank" class="card">
                <div class="dot" style="background:var(--color-notice); box-shadow: 0 0 10px var(--color-notice)"></div>
                <div>
                    <div style="font-size: 0.6rem; color: var(--accent-gold);">NATIONAL</div>
                    <div style="font-weight: 600; font-size: 0.9rem;">DPE Directorate Main Notices</div>
                </div>
            </a>
        </div>

        <div class="section-label">Live Headlines (5 Cards per Source)</div>
        <div class="grid" id="liveNewsGrid">
            </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        document.getElementById('overlay').onclick = toggleMenu;

        async function fetchSmartNews() {
            const ticker = document.getElementById('newsTicker');
            const newsGrid = document.getElementById('liveNewsGrid');
            const feeds = [
                { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/collection/latest" },
                { name: "Daily Star", url: "https://bangla.thedailystar.net/rss.xml" },
                { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" }
            ];

            ticker.innerHTML = '';
            newsGrid.innerHTML = '';
            const today = new Date().toDateString();
            
            // Notice keywords to watch for
            const keywords = /প্রাথমিক|নিয়োগ|ফলাফল|পরীক্ষা|ছুটি|Primary|Result|Exam|Notice|DPE/i;

            for (const feed of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();

                    if (data.status === 'ok') {
                        // Take 5 items per website
                        data.items.slice(0, 5).forEach((item) => {
                            const isNew = new Date(item.pubDate).toDateString() === today;
                            const hasKeyword = keywords.test(item.title);

                            // 1. Add to Ticker
                            const tItem = document.createElement('span');
                            tItem.className = "ticker-item";
                            tItem.innerHTML = ` ● <b>${feed.name}:</b> ${item.title}`;
                            ticker.appendChild(tItem);

                            // 2. Add to Grid
                            const card = document.createElement('a');
                            card.href = item.link;
                            card.target = "_blank";
                            // If it has a keyword or is from today, make it pulse/alert
                            card.className = `card ${(isNew || hasKeyword) ? 'new-alert' : ''}`;
                            
                            card.innerHTML = `
                                ${isNew ? '<span class="badge-new">RECENT</span>' : ''}
                                <div class="dot" style="background:${hasKeyword ? 'var(--color-alert)' : 'var(--color-news)'}"></div>
                                <div>
                                    <div style="font-size: 0.6rem; color: var(--accent-gold); font-weight:700;">${feed.name.toUpperCase()}</div>
                                    <div style="font-size: 0.85rem; font-weight: 500; line-height:1.4;">${item.title}</div>
                                </div>
                            `;
                            newsGrid.appendChild(card);
                        });
                    }
                } catch (e) {
                    console.error("Error fetching " + feed.name);
                }
            }
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        // Run functions
        fetchSmartNews();
        setInterval(fetchSmartNews, 600000); // Auto-refresh every 10 mins

        // Set Date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options).toUpperCase();
    </script>
</body>
</html>

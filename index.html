<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>satu.pro.bd | Live News</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #fbbf24;
            --accent-blue: #3b82f6;
            --color-alert: #ef4444;
            --color-news: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-img {
            height: 35px;
            margin-bottom: 4px;
        }

        #statusLabel {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            margin: 0;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover { background: var(--glass-border); }

        /* --- Slide-out Menu --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #1e293b;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 2000;
            padding: 25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-menu.active { left: 0; }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 1500;
        }

        .menu-overlay.active { display: block; }

        .side-menu h3 {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-top: 0;
            color: var(--accent-gold);
        }

        .side-menu nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .side-menu nav a:hover { background: var(--glass); color: var(--accent-blue); }

        /* --- Search Bar Toggle --- */
        .search-container {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #1e293b;
            padding: 15px;
            display: none;
            border-bottom: 2px solid var(--accent-blue);
            animation: slideDown 0.3s ease;
        }

        .search-container.active { display: block; }

        #newsSearch {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: block;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        /* --- Ticker --- */
        .ticker-wrap {
            background: #000;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-move {
            display: inline-block;
            animation: ticker 40s linear infinite;
        }

        .ticker-item {
            margin-right: 40px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* --- News Cards --- */
        #newsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            background: rgba(255,255,255,0.08);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .card-meta {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.5;
        }

        /* --- Utilities --- */
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #backTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <h3>Quick Access</h3>
        <nav>
            <a href="https://dpe.gopalganj.gov.bd/pages/notices"><i data-lucide="building-2"></i> DPE Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices"><i data-lucide="graduation-cap"></i> DPE</a>
            <a href="/age.html"><i data-lucide="calendar"></i> Age Calculator</a>
            <a href="/salary.html"><i data-lucide="calculator"></i> Salary Calculator</a>
        </nav>
    </div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()">
            <i data-lucide="menu"></i>
        </button>

        <div class="header-center">
            <img src="/logo.svg" class="header-img">
            <div id="statusLabel"></div>
        </div>

        <button class="icon-btn" onclick="toggleSearch()">
            <i data-lucide="search"></i>
        </button>

        <div class="search-container" id="searchContainer">
            <input type="text" id="newsSearch" placeholder="টাইপ করে খুঁজুন...">
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-move" id="newsTicker"></div>
    </div>

    <div id="newsGrid"></div>

    <button id="backTop" class="icon-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i data-lucide="arrow-up-to-line"></i>
    </button>

    <script>
        const feeds = [
            { name: "Barta24", url: "https://barta24.com/rss/rss.xml" },
            { name: "Dainik Bangla", url: "https://www.dainikbangla.com.bd/rss.xml" }
        ];

        // UI Interactions
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleSearch() {
            const container = document.getElementById('searchContainer');
            container.classList.toggle('active');
            if(container.classList.contains('active')) document.getElementById('newsSearch').focus();
        }

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            grid.innerHTML = '';
            ticker.innerHTML = '';

            for (const feed of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();

                    if (data.status === 'ok') {
                        data.items.slice(0, 8).forEach(item => {
                            // Add to Ticker
                            ticker.innerHTML += `<span class="ticker-item">● <b>${feed.name}:</b> ${item.title}</span>`;
                            
                            // Create News Card
                            const card = document.createElement('a');
                            card.href = item.link; 
                            card.target = "_blank"; 
                            card.className = "card";
                            card.setAttribute('data-title', item.title.toLowerCase());
                            
                            const dotColor = item.title.includes('প্রাথমিক') ? 'var(--color-alert)' : 'var(--color-news)';
                            
                            card.innerHTML = `
                                <div class="dot" style="background:${dotColor}"></div>
                                <div>
                                    <div class="card-meta">${feed.name}</div>
                                    <div class="card-title">${item.title}</div>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) { console.log("Error: " + feed.name); }
            }
            document.getElementById('statusLabel').innerText = "Live Mega Feed";
        }

        // Search Logic
        document.getElementById('newsSearch').oninput = function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(val) ? 'flex' : 'none';
            });
        };

        // Scroll Logic
        window.onscroll = function() {
            document.getElementById('backTop').style.display = window.scrollY > 500 ? 'flex' : 'none';
        };

        // Initialize
        lucide.createIcons();
        fetchNews();
    </script>
</body>
</html>

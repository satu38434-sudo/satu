<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>satu.pro.bd | Premium News Feed</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #fbbf24;
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background: radial-gradient(circle at top right, #0d1117, #07090f);
            color: var(--text-main);
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* --- Glass Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(7, 9, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            margin-bottom: 45px;
        }

        .header-img {
            height: 38px;
            filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.3));
        }

        .date-display {
            font-size: 0.75rem;
            color: var(--accent-emerald);
            margin-top: 5px;
            font-weight: 600;
        }

        /* --- Side Menu Fix --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: rgba(13, 17, 23, 0.98);
            backdrop-filter: blur(15px);
            box-shadow: 20px 0 50px rgba(0,0,0,0.9);
            z-index: 2000;
            padding: 30px 20px;
        }

        .side-menu.active { left: 0; }

        .side-menu h3 {
            color: var(--accent-gold);
            font-size: 1.4rem;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent-emerald);
            padding-left: 15px;
        }

        .side-menu nav { display: flex; flex-direction: column; gap: 12px; }

        .side-menu nav a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
        }

        .side-menu nav a:hover {
            background: var(--glass-hover);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateX(10px);
        }

        /* --- Ticker --- */
        .ticker-wrap {
            background: rgba(0,0,0,0.5);
            padding: 12px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 55s linear infinite;
        }

        .ticker-item {
            margin-right: 60px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* --- Breaking Badge Animation --- */
        .breaking-badge {
            background: var(--accent-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 10px;
            animation: pulse-red 1.5s infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- News Cards --- */
        #newsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 25px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .card:hover {
            background: var(--glass-hover);
            border-color: var(--accent-emerald);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .source-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-tag {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.6;
        }

        /* --- Controls --- */
        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
        }

        .icon-btn:hover {
            background: var(--accent-emerald);
            box-shadow: 0 0 15px var(--accent-emerald);
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 1500;
        }

        .menu-overlay.active { display: block; }

        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <h3>Quick Links</h3>
        <nav>
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank"><i data-lucide="map-pin"></i> DPE Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices" target="_blank"><i data-lucide="bell"></i> DPE News</a>
            <a href="/age.html"><i data-lucide="calculator"></i> Age Calculator</a>
            <a href="/salary.html"><i data-lucide="wallet"></i> Salary Tool</a>
        </nav>
    </div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()">
            <i data-lucide="menu"></i>
        </button>

        <div style="text-align: center;">
            <img src="/logo.svg" alt="Satu.pro.bd" class="header-img" onerror="this.src='https://via.placeholder.com/150x40/10b981/ffffff?text=SATU.PRO.BD'">
            <div id="currentDate" class="date-display"></div>
        </div>

        <button class="icon-btn" onclick="toggleSearch()">
            <i data-lucide="search"></i>
        </button>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-move" id="newsTicker"></div>
    </div>

    <div id="newsGrid"></div>

    <script>
        const feeds = [
            { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" },
            { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/rss" },
            { name: "Somoy News", url: "https://www.somoynews.tv/rss.xml" },
            { name: "Jugantor", url: "https://www.jugantor.com/rss.xml" },
            { name: "Ittefaq", url: "https://www.ittefaq.com.bd/rss.xml" },
            { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" },
            { name: "Bdnews24", url: "https://bangla.bdnews24.com/?widgetName=rssfeed&widgetId=1151&getXmlFeed=true" },
            { name: "Bangla Tribune", url: "https://www.banglatribune.com/rss.xml" },
            { name: "Barta24", url: "https://barta24.com/rss/rss.xml" },
            { name: "Dainik Bangla", url: "https://www.dainikbangla.com.bd/rss.xml" }
        ];

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateDate() {
            const now = new Date();
            document.getElementById('currentDate').innerText = new Intl.DateTimeFormat('bn-BD', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(now);
        }

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            
            const promises = feeds.map(async (feed) => {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        data.items.slice(0, 4).forEach(item => {
                            const isBreaking = item.title.includes('ব্রেকিং') || item.title.includes('Breaking') || item.title.includes('জরুরি');
                            const breakingHtml = isBreaking ? `<span class="breaking-badge">ব্রেকিং</span>` : '';

                            ticker.innerHTML += `<span class="ticker-item">● <b>${feed.name}:</b> ${item.title}</span>`;
                            
                            const card = document.createElement('a');
                            card.href = item.link; card.target = "_blank"; card.className = "card";
                            card.innerHTML = `
                                <div class="source-row">
                                    <div class="source-tag">${feed.name}</div>
                                    ${breakingHtml}
                                </div>
                                <div class="card-title">${item.title}</div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) { console.error(feed.name + " failed"); }
            });
            await Promise.all(promises);
        }

        updateDate();
        lucide.createIcons();
        fetchNews();
    </script>
</body>
</html>

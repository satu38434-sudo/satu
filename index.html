<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SATU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-gradient: radial-gradient(circle at 50% -20%, #064e3b 0%, #020617 80%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(251, 191, 36, 0.2);
            --accent-gold: #fbbf24;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --color-ai: #a78bfa;
            --color-wp: #fb7185;
            --color-news: #38bdf8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base) var(--bg-gradient) fixed;
            color: var(--text-bright);
            margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- STRETCH MENU (SIDEBAR) --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .side-menu.active {
            left: 0;
            box-shadow: 20px 0 60px rgba(0,0,0,0.8);
        }

        .menu-header {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            font-size: 1.5rem;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-category {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin: 20px 0 10px 10px;
            opacity: 0.7;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-bright);
            text-decoration: none;
            font-weight: 500;
            padding: 12px 15px;
            border-radius: 10px;
            transition: 0.2s;
            margin-bottom: 4px;
        }

        .menu-item:hover {
            background: rgba(251, 191, 36, 0.1);
            color: var(--accent-gold);
            padding-left: 20px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 999;
        }
        .overlay.active { display: block; }

        /* --- Masthead Fixed for Mobile --- */
        .masthead {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 15px;
            border-bottom: 4px double var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-trigger {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent-gold);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .banner-center-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            /* Balanced Margin to keep logo centered */
            margin-right: 45px; 
        }

        .main-banner {
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.15));
        }

        .masthead-info-row {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            padding-top: 8px;
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* --- Pro Search Bar --- */
        .search-wrapper {
            max-width: 550px;
            margin: 30px auto 10px;
            padding: 0 20px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }

        #linkSearch {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #linkSearch:focus {
            border-color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.5);
        }

        /* --- Main Content --- */
        main { max-width: 1000px; margin: 0 auto; padding: 0 15px 80px; }
        
        .section-label {
            font-family: 'Playfair Display', serif; font-style: italic;
            color: var(--accent-gold); margin: 45px 0 15px;
            display: flex; align-items: center; gap: 12px;
        }
        
        .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; display: flex; align-items: center; gap: 15px; text-decoration: none;
            color: var(--text-bright); font-weight: 600; transition: 0.3s;
        }
        
        .card:hover { border-color: var(--accent-gold); transform: translateY(-2px); }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
        
        footer { text-align: center; padding: 50px 20px; color: var(--text-dim); font-size: 0.65rem; border-top: 1px solid var(--border); }

        @media (max-width: 600px) {
            .main-banner { max-width: 200px; }
            .banner-center-group { margin-right: 42px; } /* Adjust centering for mobile */
            .masthead-info-row { font-size: 0.55rem; letter-spacing: 1px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <nav class="side-menu" id="sideMenu">
        <div class="menu-header">
            <span>Navigation</span>
            <button onclick="toggleMenu()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="menu-category">Calculators</div>
        <a href="age.html" class="menu-item"><i data-lucide="calendar"></i> Age Calculator</a>
        <a href="salary" class="menu-item"><i data-lucide="banknote"></i> Salary Calculator</a>
        
        <div class="menu-category">Intelligence</div>
        <a href="https://chatgpt.com" class="menu-item" target="_blank"><i data-lucide="bot"></i> ChatGPT</a>
        <a href="https://claude.ai" class="menu-item" target="_blank"><i data-lucide="brain"></i> Claude AI</a>
        
        <div class="menu-category">Media</div>
        <a href="#" class="menu-item"><i data-lucide="image"></i> Wallpapers</a>
        <a href="#" class="menu-item"><i data-lucide="video"></i> Video Portals</a>
    </nav>

    <header class="masthead">
        <button class="menu-trigger" onclick="toggleMenu()">
            <i data-lucide="menu"></i>
        </button>

        <div class="banner-center-group">
            <div class="banner-container">
                <img src="logo.svg" alt="Satu.pro.bd" class="main-banner">
            </div>
            <div class="masthead-info-row" id="currentDate">LOADING...</div>
        </div>
    </header>

    <div class="search-wrapper">
        <i data-lucide="search" class="search-icon" size="18"></i>
        <input type="text" id="linkSearch" placeholder="Search resources..." onkeyup="filterLinks()">
    </div>

    <main>
        <div class="section-label">Featured Quick Links</div>
        <div class="grid">
            <a href="age.html" class="card">
                <div class="dot" style="color:var(--color-news); background:var(--color-news)"></div> <span>Age Calculator</span>
            </a>
            <a href="salary.html" class="card">
                <div class="dot" style="color:var(--color-news); background:var(--color-news)"></div> <span>Salary Fixation</span>
            </a>
            <a href="https://chatgpt.com" class="card" target="_blank">
                <div class="dot" style="color:var(--color-ai); background:var(--color-ai)"></div> <span>ChatGPT</span>
            </a>
        </div>
    </main>

    <footer>© 2026 S&D • Designed for Gopalganj</footer>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        document.getElementById('overlay').onclick = toggleMenu;

        function filterLinks() {
            let input = document.getElementById('linkSearch').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "flex" : "none";
            });
        }

        lucide.createIcons();

        // Dynamic Date Refresh
        function updateDate() {
            const d = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            document.getElementById('currentDate').innerText = "GOPALGANJ, BANGLADESH • " + d.toLocaleDateString(undefined, options).toUpperCase();
        }
        updateDate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SATU - News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-gradient: radial-gradient(circle at 50% -20%, #064e3b 0%, #020617 80%);
            --card-bg: rgba(15, 23, 42, 0.7);
            --border: rgba(251, 191, 36, 0.2);
            --accent-gold: #fbbf24;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --color-news: #38bdf8;
            --color-notice: #10b981;
            --color-alert: #ef4444;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base) var(--bg-gradient) fixed;
            color: var(--text-bright); margin: 0; padding: 0; min-height: 100vh;
        }

        /* --- TICKER --- */
        .ticker-wrap {
            width: 100%; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            overflow: hidden; white-space: nowrap; display: flex; align-items: center; height: 40px;
            position: sticky; top: 0; z-index: 100;
        }
        .ticker-label { background: #b91c1c; color: white; padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker-move 100s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 40px; color: var(--text-bright); text-decoration: none; font-size: 0.85rem; }
        @keyframes ticker-move { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- LAYOUT --- */
        .masthead { max-width: 1100px; margin: 0 auto; padding: 20px 15px; display: flex; align-items: center; justify-content: space-between; }
        .main-banner { max-width: 250px; width: 100%; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.2)); }
        
        main { max-width: 1100px; margin: 0 auto; padding: 0 15px 80px; }
        .section-label { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent-gold); margin: 40px 0 15px; display: flex; align-items: center; gap: 12px; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; display: flex; align-items: center; gap: 15px; text-decoration: none;
            color: var(--text-bright); transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--accent-gold); transform: translateY(-3px); background: rgba(251,191,36,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        
        /* Pulse for New Content */
        .new-alert { border-color: var(--accent-gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }

        .loader { text-align: center; padding: 40px; color: var(--accent-gold); font-weight: 600; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker-label">Live Updates</div>
        <div class="ticker-content" id="newsTicker">Fetching the latest headlines from Bangladesh...</div>
    </div>

    <header class="masthead">
        <div style="width: 40px;"></div> <div style="text-align: center;">
            <img src="logo.svg" alt="SATU" class="main-banner">
            <div id="currentDate" style="font-size: 0.6rem; color: var(--accent-gold); margin-top: 5px;"></div>
        </div>
        <div style="width: 40px;"></div>
    </header>

    <main>
        <div class="section-label">Top News (20 Cards)</div>
        <div id="loader" class="loader">Processing feeds...</div>
        <div class="grid" id="newsGrid"></div>
    </main>

    <script>
        async function fetchWithFallback(rssUrl) {
            // First attempt: Primary Bridge
            const primary = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=oynptixk9ubf2m3zsqb1f9f2v762xbt3f4u8nyln`;
            // Second attempt: Backup Bridge
            const backup = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

            try {
                let response = await fetch(primary);
                let data = await response.json();
                if (data.status === 'ok') return data.items;
                throw new Error('Primary failed');
            } catch (e) {
                try {
                    // AllOrigins requires manual XML parsing
                    let response = await fetch(backup);
                    let data = await response.json();
                    let parser = new DOMParser();
                    let xml = parser.parseFromString(data.contents, "text/xml");
                    let items = Array.from(xml.querySelectorAll("item")).map(el => ({
                        title: el.querySelector("title").textContent,
                        link: el.querySelector("link").textContent,
                        pubDate: el.querySelector("pubDate")?.textContent || ""
                    }));
                    return items;
                } catch (err) {
                    console.error("Both proxies failed for:", rssUrl);
                    return [];
                }
            }
        }

        async function loadAllNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            const loader = document.getElementById('loader');
            
            const sources = [
                { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/collection/latest" },
                { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" },
                { name: "The Daily Star", url: "https://bangla.thedailystar.net/rss.xml" },
                { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" }
            ];

            const today = new Date().toDateString();
            const keywords = /প্রাথমিক|নিয়োগ|ফলাফল|পরীক্ষা|Primary|Result|Exam/i;

            let allItems = [];
            ticker.innerHTML = '';

            for (const source of sources) {
                const items = await fetchWithFallback(source.url);
                const slice = items.slice(0, 5); // Take exactly 5 per site

                slice.forEach(item => {
                    const isNew = new Date(item.pubDate).toDateString() === today;
                    const hasKey = keywords.test(item.title);

                    // Add to Global Ticker
                    ticker.innerHTML += `<span class="ticker-item">● <b>${source.name}:</b> ${item.title}</span>`;

                    // Create Card
                    const card = document.createElement('a');
                    card.href = item.link;
                    card.target = "_blank";
                    card.className = `card ${isNew ? 'new-alert' : ''}`;
                    card.innerHTML = `
                        <div class="dot" style="background:${hasKey ? 'var(--color-alert)' : 'var(--color-news)'}"></div>
                        <div>
                            <div style="font-size: 0.6rem; color: var(--accent-gold); font-weight:700; opacity:0.8;">${source.name.toUpperCase()}</div>
                            <div style="font-size: 0.85rem; font-weight: 500; line-height:1.4;">${item.title}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
            loader.style.display = 'none';
        }

        // Init
        loadAllNews();
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

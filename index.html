<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>satu.pro.bd | News Feed</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #fbbf24;
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            color: var(--text-main);
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(7, 9, 15, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            text-align: center;
        }

        .home-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-img {
            height: 32px;
            width: auto;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.3));
        }

        .date-display {
            font-size: 0.75rem;
            color: var(--accent-emerald);
            font-weight: 600;
        }

        /* --- Ticker Bar (Readable Speed) --- */
        .ticker-container {
            display: flex;
            background: #0d1117;
            border-bottom: 2px solid var(--accent-emerald);
            overflow: hidden;
            height: 48px;
            align-items: center;
            z-index: 999;
        }

        .ticker-label {
            background: var(--accent-red);
            color: white;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 800;
            font-size: 0.85rem;
            z-index: 10;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            white-space: nowrap;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        .ticker-wrap {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-move {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-crawl 180s linear infinite; 
            will-change: transform;
        }

        .ticker-move:hover {
            animation-play-state: paused;
            cursor: pointer;
        }

        .ticker-item {
            display: inline-block;
            margin-right: 80px;
            font-size: 1rem;
            color: var(--text-main);
        }

        .ticker-item b {
            color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* --- News Grid --- */
        main { flex: 1; margin-top: 20px; }
        #newsGrid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 0 15px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            #newsGrid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 22px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card:hover {
            border-color: var(--accent-emerald);
            background: var(--glass-hover);
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.6;
        }

        /* --- UI Elements --- */
        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .search-container {
            display: none;
            padding: 15px;
            background: #0d1117;
            border-bottom: 2px solid var(--accent-emerald);
            width: 100%;
            animation: slideDown 0.3s ease;
        }

        .search-container.active { display: block; }

        #newsSearch {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--bg-dark);
            color: white;
            outline: none;
            font-family: 'Hind Siliguri', sans-serif;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 280px;
            height: 100%;
            background: #0d1117;
            box-shadow: 20px 0 50px rgba(0,0,0,0.9);
            z-index: 2000;
            padding: 30px 20px;
            transition: 0.4s ease;
        }

        .side-menu.active { left: 0; }
        .side-menu h3 { color: var(--accent-gold); border-left: 4px solid var(--accent-emerald); padding-left: 15px; margin-bottom: 25px; }

        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .menu-overlay.active { display: block; }

        /* --- Centered Footer --- */
        footer { 
            background: #0d1117; 
            padding: 30px 20px; 
            border-top: 1px solid var(--glass-border); 
            margin-top: auto; 
        }

        .footer-bottom { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            gap: 10px; 
            color: var(--text-dim); 
            font-size: 0.9rem; 
            text-align: center; 
        }

        @keyframes ticker-crawl { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-animation { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <h3>Quick Access</h3>
        <nav style="display:flex; flex-direction:column; gap:12px;">
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" style="display:flex; align-items:center; gap:10px; color:white; text-decoration:none; padding:15px; background:var(--glass); border-radius:10px;" target="_blank"><i data-lucide="map-pin"></i> DPE Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices" style="display:flex; align-items:center; gap:10px; color:white; text-decoration:none; padding:15px; background:var(--glass); border-radius:10px;" target="_blank"><i data-lucide="bell"></i> DPE Notice</a>
            <a href="/age.html" style="display:flex; align-items:center; gap:10px; color:white; text-decoration:none; padding:15px; background:var(--glass); border-radius:10px;"><i data-lucide="calculator"></i> Age Calculator</a>
            <a href="/salary.html" style="display:flex; align-items:center; gap:10px; color:white; text-decoration:none; padding:15px; background:var(--glass); border-radius:10px;"><i data-lucide="wallet"></i> Salary Calculator</a>
        </nav>
    </div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()"><i data-lucide="menu" size="20"></i></button>

        <div class="header-center">
            <a href="/" class="home-link">
                <img src="/logo.svg" alt="satu.pro.bd" class="header-img">
                <div id="currentDate" class="date-display"></div>
            </a>
        </div>

        <button class="icon-btn" onclick="toggleSearch()"><i data-lucide="search" size="20"></i></button>
    </header>

    <div class="search-container" id="searchContainer">
        <input type="text" id="newsSearch" placeholder="খবর খুঁজুন...">
    </div>

    <div class="ticker-container">
        <div class="ticker-label"><div class="pulse"></div> সর্বশেষ</div>
        <div class="ticker-wrap">
            <div class="ticker-move" id="newsTicker">খবর লোড হচ্ছে...</div>
        </div>
    </div>

    <main>
        <div id="newsGrid">
            <div style="text-align:center; color:var(--text-dim); padding:40px;">সর্বশেষ সংবাদ লোড হচ্ছে...</div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <div>&copy; 2026 <b>satu.pro.bd</b> | All Rights Reserved.</div>
            <div style="color:var(--accent-emerald); font-weight:600;">System Online</div>
        </div>
    </footer>

    <script>
        const feeds = [
            { name: "বিবিসি", url: "https://www.bbc.com/bengali/index.xml" },
            { name: "প্রথম আলো", url: "https://news.google.com/publications/CAAqKQgKIiNDQklTRkFnTWFoQUtEbkJ5YjNSb2IyMWhiRzh1WTI5dEtBQVAB?hl=bn&gl=BD&ceid=BD:bn" },
            { name: "সময় নিউজ", url: "https://www.somoynews.tv/rss.xml" },
            { name: "চ্যানেল ২৪", url: "https://www.channel24bd.tv/rss/rss.xml" },
            { name: "যুগান্তর", url: "https://www.jugantor.com/rss.xml" },
            { name: "ইত্তেফাক", url: "https://www.ittefaq.com.bd/rss.xml" },
            { name: "কালের কণ্ঠ", url: "https://www.kalerkantho.com/rss.xml" },
            { name: "বিডিনিউজ২৪", url: "https://bangla.bdnews24.com/?widgetName=rssfeed&widgetId=1151&getXmlFeed=true" },
            { name: "দৈনিক শিক্ষা", url: "https://www.dainikshiksha.com/rss.xml" },
            { name: "বাংলানিউজ২৪", url: "https://www.banglanews24.com/rss/rss.xml" },
            { name: "ডেইলি স্টার", url: "https://bangla.thedailystar.net/rss.xml" },
            { name: "বাংলা ট্রিবিউন", url: "https://www.banglatribune.com/rss.xml" }
        ];

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleSearch() {
            const sc = document.getElementById('searchContainer');
            sc.classList.toggle('active');
            if(sc.classList.contains('active')) document.getElementById('newsSearch').focus();
        }

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            let tickerHTML = "";
            
            const promises = feeds.map(async (feed) => {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        if(grid.innerText.includes('লোড হচ্ছে')) grid.innerHTML = '';
                        data.items.slice(0, 4).forEach(item => {
                            tickerHTML += `<span class="ticker-item"><b>${feed.name}</b> ${item.title}</span>`;
                            const card = document.createElement('a');
                            card.href = item.link; card.target = "_blank"; card.className = "card";
                            card.setAttribute('data-title', item.title.toLowerCase());
                            card.innerHTML = `<span style="font-size:0.75rem; color:var(--accent-gold); font-weight:700;">${feed.name}</span><div class="card-title">${item.title}</div>`;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) { console.error(feed.name + " failed"); }
            });

            await Promise.all(promises);
            ticker.innerHTML = tickerHTML;

            const scrollWidth = ticker.scrollWidth;
            const readableDuration = scrollWidth / 80; 
            ticker.style.animationDuration = readableDuration + "s";
        }

        document.getElementById('newsSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-title').includes(term) ? "flex" : "none";
            });
        });

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Intl.DateTimeFormat('bn-BD', options).format(new Date());

        lucide.createIcons();
        fetchNews();
    </script>
</body>
</html>

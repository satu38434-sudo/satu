<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>satu.pro.bd | Mobile Optimized News</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07090f;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #fbbf24;
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        /* Essential Mobile Fix: Prevent Horizontal Scroll */
        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body {
            background: #07090f;
            color: var(--text-main);
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(7, 9, 15, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            margin-bottom: 25px; /* Red Mark Space */
        }

        .header-img {
            height: 30px;
            max-width: 150px;
            object-fit: contain;
        }

        .date-display {
            font-size: 0.7rem;
            color: var(--accent-emerald);
            font-weight: 600;
            margin-top: 2px;
        }

        /* --- Side Menu --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: -100%; /* Fully hidden */
            width: 80%; /* Takes most of screen on mobile */
            max-width: 300px;
            height: 100%;
            background: #0d1117;
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
            z-index: 2000;
            padding: 30px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-menu.active { left: 0; }

        .side-menu nav { display: flex; flex-direction: column; gap: 10px; }

        .side-menu nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 10px;
            background: var(--glass);
            font-size: 0.9rem;
        }

        /* --- Ticker (Restricted Width) --- */
        .ticker-wrap {
            background: rgba(0,0,0,0.5);
            padding: 10px 0;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            width: 100%;
            overflow: hidden;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 40s linear infinite;
        }

        .ticker-item {
            margin-right: 40px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* --- News Grid (Mobile First) --- */
        #newsGrid {
            display: grid;
            grid-template-columns: 1fr; /* Single column for mobile */
            gap: 15px;
            padding: 0 15px 40px;
            width: 100%;
        }

        @media (min-width: 768px) {
            #newsGrid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 18px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%; /* Ensures it stays in bounds */
        }

        .breaking-badge {
            background: var(--accent-red);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            animation: pulse-red 1.5s infinite;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.5;
        }

        /* --- UI Elements --- */
        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 10px;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }

        .menu-overlay.active { display: block; }

        @keyframes ticker { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-100%); } 
        }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <h3 style="color:var(--accent-gold); border-left:3px solid var(--accent-emerald); padding-left:10px;">Menu</h3>
        <nav>
            <a href="https://dpe.gopalganj.gov.bd/pages/notices" target="_blank"><i data-lucide="map-pin"></i> DPE Gopalganj</a>
            <a href="https://dpe.gov.bd/pages/notices" target="_blank"><i data-lucide="bell"></i> DPE News</a>
            <a href="/age.html"><i data-lucide="calculator"></i> Age Calculator</a>
            <a href="/salary.html"><i data-lucide="wallet"></i> Salary Tool</a>
        </nav>
    </div>

    <header>
        <button class="icon-btn" onclick="toggleMenu()">
            <i data-lucide="menu" size="20"></i>
        </button>

        <div style="text-align: center;">
            <img src="/logo.svg" alt="Satu.pro.bd" class="header-img" onerror="this.src='https://via.placeholder.com/120x30/10b981/ffffff?text=SATU.PRO.BD'">
            <div id="currentDate" class="date-display"></div>
        </div>

        <button class="icon-btn" onclick="toggleSearch()">
            <i data-lucide="search" size="20"></i>
        </button>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-move" id="newsTicker"></div>
    </div>

    <div id="newsGrid">
        <div style="text-align:center; color:var(--text-dim); padding:20px;">খবর লোড হচ্ছে...</div>
    </div>

    <script>
        const feeds = [
            { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" },
            { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/rss" },
            { name: "Somoy News", url: "https://www.somoynews.tv/rss.xml" },
            { name: "Jugantor", url: "https://www.jugantor.com/rss.xml" },
            { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" }
        ];

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateDate() {
            const now = new Date();
            document.getElementById('currentDate').innerText = new Intl.DateTimeFormat('bn-BD', { weekday: 'long', day: 'numeric', month: 'short', year:'numeric' }).format(now);
        }

        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            const ticker = document.getElementById('newsTicker');
            
            // Limit sources for better mobile performance
            const activeFeeds = feeds.slice(0, 5); 
            
            const promises = activeFeeds.map(async (feed) => {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        if(grid.innerHTML.includes('লোড হচ্ছে')) grid.innerHTML = '';
                        
                        data.items.slice(0, 4).forEach(item => {
                            const isBreaking = item.title.includes('ব্রেকিং') || item.title.includes('জরুরি');
                            ticker.innerHTML += `<span class="ticker-item">● ${item.title}</span>`;
                            
                            const card = document.createElement('a');
                            card.href = item.link; card.target = "_blank"; card.className = "card";
                            card.innerHTML = `
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="font-size:0.7rem; color:var(--accent-gold); font-weight:700;">${feed.name}</span>
                                    ${isBreaking ? '<span class="breaking-badge">ব্রেকিং</span>' : ''}
                                </div>
                                <div class="card-title">${item.title}</div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (e) { console.log("Feed error"); }
            });
            await Promise.all(promises);
        }

        updateDate();
        lucide.createIcons();
        fetchNews();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SATU - News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(251, 191, 36, 0.3);
            --gold: #fbbf24;
            --text: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 0;
            background-image: radial-gradient(circle at top, #064e3b 0%, #020617 100%);
            background-attachment: fixed;
        }

        /* Ticker */
        .ticker {
            background: #000; border-bottom: 1px solid var(--border);
            height: 40px; overflow: hidden; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .ticker-label { background: #b91c1c; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .ticker-track { display: inline-block; white-space: nowrap; animation: scroll 80s linear infinite; }
        .ticker-item { padding: 0 30px; font-size: 0.85rem; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Content */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 0; }
        .header img { max-width: 220px; filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3)); }
        
        .section-title { color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin: 30px 0 20px; font-size: 1.2rem; font-weight: 700; }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .news-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; display: flex; gap: 12px; text-decoration: none; color: inherit;
            transition: 0.3s ease; backdrop-filter: blur(10px);
        }
        .news-card:hover { border-color: var(--gold); transform: translateY(-3px); background: rgba(251, 191, 36, 0.1); }
        .source-tag { font-size: 0.6rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .news-title { font-size: 0.9rem; font-weight: 500; line-height: 1.4; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }

        .loading-msg { text-align: center; color: var(--gold); padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-label">Breaking</div>
    <div class="ticker-track" id="tickerTrack">Loading latest headlines from across Bangladesh...</div>
</div>

<div class="container">
    <div class="header">
        <img src="logo.svg" alt="SATU">
        <div id="dateDisplay" style="font-size: 0.7rem; color: var(--gold); margin-top: 10px;"></div>
    </div>

    <div class="section-title">Live News Dashboard (20 Cards)</div>
    <div id="loader" class="loading-msg">Connecting to news servers...</div>
    <div class="news-grid" id="newsGrid"></div>
</div>

<script>
    const newsGrid = document.getElementById('newsGrid');
    const tickerTrack = document.getElementById('tickerTrack');
    const loader = document.getElementById('loader');

    const sources = [
        { name: "Prothom Alo", url: "https://www.prothomalo.com/feed/collection/latest" },
        { name: "Kaler Kantho", url: "https://www.kalerkantho.com/rss.xml" },
        { name: "The Daily Star", url: "https://bangla.thedailystar.net/rss.xml" },
        { name: "BBC Bangla", url: "https://www.bbc.com/bengali/index.xml" }
    ];

    async function fetchFeed(source) {
        // We use corsproxy.io as the primary bridge
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(source.url)}`;
        
        try {
            const response = await fetch(proxyUrl);
            const text = await response.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = Array.from(xml.querySelectorAll("item")).slice(0, 5);

            if (items.length === 0) throw new Error("No items found");

            items.forEach(item => {
                const title = item.querySelector("title").textContent;
                const link = item.querySelector("link").textContent;
                
                // Add to Ticker
                tickerTrack.innerHTML += ` <span class="ticker-item">● ${source.name}: ${title}</span> `;

                // Add to Grid
                const card = document.createElement('a');
                card.href = link;
                card.target = "_blank";
                card.className = "news-card";
                card.innerHTML = `
                    <div class="status-dot" style="background:${title.includes('প্রাথমিক') ? '#ef4444' : '#38bdf8'}"></div>
                    <div>
                        <div class="source-tag">${source.name}</div>
                        <div class="news-title">${title}</div>
                    </div>
                `;
                newsGrid.appendChild(card);
            });
        } catch (error) {
            console.error(`Error loading ${source.name}:`, error);
        }
    }

    async function init() {
        tickerTrack.innerHTML = '';
        for (const source of sources) {
            await fetchFeed(source);
        }
        loader.style.display = 'none';
    }

    // Set Date
    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US', { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    }).toUpperCase();

    init();
    // Refresh every 10 minutes
    setInterval(init, 600000);
</script>

</body>
</html>

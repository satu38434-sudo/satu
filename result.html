<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিরাপদ অ্যাডমিন প্যানেল | ৩য় শ্রেণি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-after: always; }
            @page { size: A4; margin: 0; }
            .result-card { width: 210mm; height: 297mm; padding: 20mm; margin: 0 auto; border: none; display: flex; flex-direction: column; }
        }
        .result-card { background: white; border: 2px solid #000; padding: 40px; width: 100%; max-width: 800px; margin: 20px auto; }
        .bengali-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .bengali-table th, .bengali-table td { border: 1.5px solid black; padding: 10px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body class="bg-slate-100">

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">ক্লাউড লগইন (Secure)</h2>
            <input type="email" id="email" placeholder="আপনার ইমেইল" class="w-full p-3 border-2 rounded-lg mb-4 outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-3 border-2 rounded-lg mb-4 outline-none focus:border-blue-500">
            <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">প্রবেশ করুন</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden text-center font-bold italic"></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="no-print max-w-6xl mx-auto py-8 px-4">
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-md border-l-8 border-blue-700">
                <h1 class="text-2xl font-bold text-slate-800 italic uppercase">Admin Dashboard</h1>
                <button id="logoutBtn" class="bg-red-50 text-red-600 px-6 py-2 rounded-lg font-bold hover:bg-red-100 transition">লগ আউট</button>
            </div>
            
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-md border border-slate-300">
                    <h2 class="text-xl font-bold mb-4 border-b pb-2 text-blue-700">নতুন শিক্ষার্থী তথ্য</h2>
                    <form id="studentForm" class="space-y-4">
                        <input type="text" id="sName" placeholder="প্রতিষ্ঠানের নাম" class="w-full p-2 border rounded font-bold bg-slate-50" required>
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" class="w-full p-2 border rounded" required>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="roll" placeholder="রোল নম্বর" class="p-2 border rounded" required>
                            <input type="text" id="class" value="তৃতীয়" class="p-2 border rounded bg-gray-50" readonly>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm italic">
                            <input type="number" id="sub1" placeholder="বাংলা" class="p-2 border rounded">
                            <input type="number" id="sub2" placeholder="ইংরেজি" class="p-2 border rounded">
                            <input type="number" id="sub3" placeholder="গণিত" class="p-2 border rounded">
                            <input type="number" id="sub4" placeholder="বিজ্ঞান" class="p-2 border rounded">
                            <input type="number" id="sub5" placeholder="সা. বি." class="p-2 border rounded">
                            <input type="number" id="sub6" placeholder="ধর্ম" class="p-2 border rounded">
                            <input type="number" id="sub7" placeholder="শিল্পকলা" class="p-2 border rounded">
                            <input type="number" id="sub8" placeholder="স্বাস্থ্য" class="p-2 border rounded">
                            <input type="number" id="sub9" placeholder="জীবন" class="p-2 border rounded">
                        </div>
                        <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 shadow-md">সেভ করুন</button>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-md border border-slate-300">
                    <h2 class="text-xl font-bold text-slate-800 mb-4 italic">লাইভ ডাটাবেস তালিকা</h2>
                    <div class="overflow-y-auto max-h-[400px] border-2 rounded">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 sticky top-0 font-bold">
                                <tr><th class="p-3 border-b">রোল</th><th class="p-3 border-b">নাম</th><th class="p-3 border-b text-center">অ্যাকশন</th></tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y"></tbody>
                        </table>
                    </div>
                    <div class="mt-8 flex gap-4">
                        <button onclick="generateFinalResults()" class="flex-1 bg-green-700 text-white font-bold py-3 rounded-xl hover:bg-green-800">রেজাল্ট জেনারেট করুন</button>
                        <button onclick="window.print()" class="px-10 bg-black text-white font-bold py-3 rounded-xl">প্রিন্ট / PDF</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="resultsContainer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPhbMO5HcE6XT8vWUV1tI0L5fyNulyeMc",
            authDomain: "school-result-app-acb88.firebaseapp.com",
            projectId: "school-result-app-acb88",
            storageBucket: "school-result-app-acb88.firebasestorage.app",
            messagingSenderId: "442862025691",
            appId: "1:442862025691:web:4fba33ad35454ad6ff85fe",
            databaseURL: "https://school-result-app-acb88-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // লগইন লজিক
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerText = "ভুল ইমেইল বা পাসওয়ার্ড!";
                errorMsg.classList.remove('hidden');
            });
        });

        // লগ আউট লজিক
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        // অথেনটিকেশন স্টেট চেক
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginArea').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        // ইংরেজি নম্বরকে বাংলায় রূপান্তর
        const toBnNum = (n) => n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);

        function loadData() {
            onValue(ref(db, 'class3_results'), (snapshot) => {
                const tbody = document.getElementById('studentTableBody');
                tbody.innerHTML = "";
                const data = snapshot.val() || {};
                Object.keys(data).forEach(id => {
                    const s = data[id];
                    tbody.innerHTML += `<tr class="border-b">
                        <td class="p-3 font-bold font-mono">${s.roll}</td>
                        <td class="p-3">${s.name}</td>
                        <td class="p-3 text-center"><button onclick="deleteStudent('${id}')" class="text-red-500 font-bold">মুছুন</button></td>
                    </tr>`;
                });
                window.studentsData = data;
            });
        }

        window.deleteStudent = (id) => { if(confirm("মুছতে চান?")) remove(ref(db, `class3_results/${id}`)); };

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const student = {
                school: document.getElementById('sName').value,
                name: document.getElementById('stName').value,
                roll: document.getElementById('roll').value,
                class: "তৃতীয়",
                marks: {
                    "বাংলা": document.getElementById('sub1').value || 0,
                    "ইংরেজি": document.getElementById('sub2').value || 0,
                    "গণিত": document.getElementById('sub3').value || 0,
                    "বিজ্ঞান": document.getElementById('sub4').value || 0,
                    "ইতিহাস ও সামাজিক বিজ্ঞান": document.getElementById('sub5').value || 0,
                    "ধর্ম শিক্ষা": document.getElementById('sub6').value || 0,
                    "শিল্পকলা": document.getElementById('sub7').value || 0,
                    "স্বাস্থ্য সুরক্ষা": document.getElementById('sub8').value || 0,
                    "জীবন ও জীবিকা": document.getElementById('sub9').value || 0
                }
            };
            push(ref(db, 'class3_results'), student);
            e.target.reset();
            document.getElementById('sName').value = student.school;
        });

        window.generateFinalResults = () => {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";
            Object.values(window.studentsData).forEach(s => {
                let rows = "";
                let total = 0;
                for (let sub in s.marks) {
                    rows += `<tr><td>${sub}</td><td>${toBnNum(s.marks[sub])}</td></tr>`;
                    total += Number(s.marks[sub]);
                }
                container.innerHTML += `
                    <div class="result-card page-break">
                        <div class="text-center border-b-8 border-double border-black pb-4 mb-6">
                            <h2 class="text-4xl font-bold">${s.school}</h2>
                            <p class="text-2xl font-bold mt-2">একাডেমিক ট্রান্সক্রিপ্ট (২০২৬)</p>
                        </div>
                        <div class="grid grid-cols-2 text-xl mb-6 border-2 border-black p-4 bg-slate-50">
                            <div><p>নাম: ${s.name}</p><p>শ্রেণি: ${s.class}</p></div>
                            <div class="text-right"><p>রোল: ${toBnNum(s.roll)}</p><p>তারিখ: ${toBnNum(new Date().toLocaleDateString('bn-BD'))}</p></div>
                        </div>
                        <table class="bengali-table">
                            <thead><tr class="bg-slate-100"><th>বিষয়ের নাম</th><th>নম্বর</th></tr></thead>
                            <tbody>${rows}<tr class="font-bold bg-slate-200"><td class="text-right px-4 italic">মোট নম্বর:</td><td>${toBnNum(total)}</td></tr></tbody>
                        </table>
                        <div class="mt-auto flex justify-between pt-32">
                            <div class="text-center w-56 border-t-2 border-black font-bold italic">অভিভাবক</div>
                            <div class="text-center w-56 border-t-2 border-black font-bold italic">প্রধান শিক্ষক</div>
                        </div>
                    </div>`;
            });
            window.scrollTo(0, document.body.scrollHeight);
        };
    </script>
</body>
</html>

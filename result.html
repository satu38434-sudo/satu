<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্কুল ফলাফল জেনারেটর | CSV to PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        @media print {
            .no-print { display: none; }
            .page-break { page-break-after: always; }
            body { background: white; }
            .result-card { border: 1px solid #000; box-shadow: none; margin-bottom: 0; }
        }
        .result-card {
            border: 2px solid #1e40af;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="no-print max-w-2xl mx-auto py-10 px-5 text-center">
        <h1 class="text-3xl font-bold text-blue-800 mb-2">ফলাফল জেনারেটর (Result Generator)</h1>
        <p class="mb-6 text-gray-600">Excel বা CSV ফাইল আপলোড করুন (কলামগুলো হবে: নাম, রোল, শ্রেণি, বাংলা, ইংরেজি, গণিত)</p>
        
        <div class="bg-white p-8 rounded-xl shadow-lg border-2 border-dashed border-blue-300">
            <input type="file" id="fileInput" accept=".csv, .xlsx" class="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="generateResults()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">ফলাফল তৈরি করুন</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 transition">প্রিন্ট / PDF সেভ করুন</button>
            </div>
        </div>
    </div>

    <div id="resultsContainer"></div>

    <script>
        function generateResults() {
            const fileInput = document.getElementById('fileInput');
            const container = document.getElementById('resultsContainer');
            
            if (!fileInput.files[0]) {
                alert("অনুগ্রহ করে একটি ফাইল সিলেক্ট করুন!");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                container.innerHTML = ""; 

                jsonData.forEach((student) => {
                    const total = (Number(student.বাংলা) || 0) + (Number(student.ইংরেজি) || 0) + (Number(student.গণিত) || 0);
                    const avg = (total / 3).toFixed(2);

                    const card = `
                        <div class="result-card page-break relative">
                            <div class="text-center border-b-2 border-blue-800 pb-4 mb-6">
                                <h2 class="text-3xl font-bold text-blue-900">আপনার স্কুলের নাম এখানে</h2>
                                <p class="text-lg text-gray-700">বার্ষিক পরীক্ষা ফলাফল - ২০২৬</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 mb-8 text-lg">
                                <div>
                                    <p><strong>শিক্ষার্থীর নাম:</strong> ${student.নাম || student.Name}</p>
                                    <p><strong>রোল নম্বর:</strong> ${student.রোল || student.Roll}</p>
                                </div>
                                <div class="text-right">
                                    <p><strong>শ্রেণি:</strong> ${student.শ্রেণি || student.Class}</p>
                                    <p><strong>তারিখ:</strong> ${new Date().toLocaleDateString('bn-BD')}</p>
                                </div>
                            </div>

                            <table class="w-full text-left border-collapse border border-gray-400 text-lg">
                                <thead class="bg-blue-50">
                                    <tr>
                                        <th class="border border-gray-400 p-3">বিষয়</th>
                                        <th class="border border-gray-400 p-3 text-center">প্রাপ্ত নম্বর</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td class="border border-gray-400 p-3">বাংলা</td><td class="border border-gray-400 p-3 text-center">${student.বাংলা || 0}</td></tr>
                                    <tr><td class="border border-gray-400 p-3">ইংরেজি</td><td class="border border-gray-400 p-3 text-center">${student.ইংরেজি || 0}</td></tr>
                                    <tr><td class="border border-gray-400 p-3">গণিত</td><td class="border border-gray-400 p-3 text-center">${student.গণিত || 0}</td></tr>
                                    <tr class="font-bold bg-gray-100">
                                        <td class="border border-gray-400 p-3 text-right">মোট নম্বর:</td>
                                        <td class="border border-gray-400 p-3 text-center">${total}</td>
                                    </tr>
                                    <tr class="font-bold bg-blue-100 text-blue-900">
                                        <td class="border border-gray-400 p-3 text-right">গড় নম্বর:</td>
                                        <td class="border border-gray-400 p-3 text-center">${avg}</td>
                                    </tr>
                                </tbody>
                            </table>

                            <div class="mt-20 flex justify-between">
                                <div class="text-center">
                                    <div class="w-40 border-t border-black mb-1"></div>
                                    <p>অভিভাবকের স্বাক্ষর</p>
                                </div>
                                <div class="text-center">
                                    <div class="w-40 border-t border-black mb-1"></div>
                                    <p>প্রধান শিক্ষকের স্বাক্ষর</p>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Cloud Result System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        @media print {
            .no-print { display: none; }
            .page-break { page-break-after: always; }
            body { background: white; padding: 0; }
            .result-card { 
                border: 2px solid #000; 
                margin: 0; 
                width: 100%; 
                height: 98vh; 
                display: flex; 
                flex-direction: column; 
                justify-content: center;
                padding: 50px;
            }
        }
        .result-card { 
            border: 2px solid #1e40af; 
            padding: 40px; 
            width: 100%; 
            max-width: 800px; 
            margin: 20px auto; 
            background: #fff; 
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="loginArea" class="no-print min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">অ্যাডমিন লগইন</h2>
                <p class="text-gray-500 text-sm">ডেটাবেস অ্যাক্সেস করতে পাসওয়ার্ড দিন</p>
            </div>
            <input type="password" id="adminPass" placeholder="পাসওয়ার্ড (1234)" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">প্রবেশ করুন</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden text-center font-bold italic">ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="no-print max-w-6xl mx-auto py-8 px-4">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-600 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Cloud Student Portal</h1>
                    <p class="text-blue-600 font-semibold">প্রতিষ্ঠাতা অ্যাডমিন প্যানেল</p>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition">লগ আউট</button>
            </div>
            
            <div class="grid lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 text-blue-700 flex items-center gap-2">
                        <span>➕ শিক্ষার্থী এন্ট্রি</span>
                    </h2>
                    <form id="studentForm" class="space-y-3">
                        <input type="text" id="sName" placeholder="প্রতিষ্ঠানের নাম" class="w-full p-2 border rounded bg-slate-50 font-bold" required>
                        <input type="text" id="stName" placeholder="শিক্ষার্থীর নাম" class="w-full p-2 border rounded" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="roll" placeholder="রোল" class="p-2 border rounded" required>
                            <input type="text" id="class" placeholder="শ্রেণি" class="p-2 border rounded" required>
                        </div>
                        <div class="grid grid-cols-3 gap-2 italic">
                            <input type="number" id="bn" placeholder="বাংলা" class="p-2 border rounded text-center focus:border-blue-500 outline-none">
                            <input type="number" id="en" placeholder="ইংরেজি" class="p-2 border rounded text-center focus:border-blue-500 outline-none">
                            <input type="number" id="math" placeholder="গণিত" class="p-2 border rounded text-center focus:border-blue-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">ডেটা ক্লাউডে পাঠান</button>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        রিয়েল-টাইম ডেটাবেস
                    </h2>
                    <div class="overflow-y-auto max-h-[400px] border rounded">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr>
                                    <th class="p-3 border-b">রোল</th>
                                    <th class="p-3 border-b">নাম</th>
                                    <th class="p-3 border-b text-center">অ্যাকশন</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                    <div class="mt-6 flex flex-wrap gap-3">
                        <button onclick="generateFinalResults()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-md">রেজাল্ট কার্ড জেনারেট করুন</button>
                        <button onclick="window.print()" class="px-6 bg-slate-800 text-white rounded-lg hover:bg-black transition">প্রিন্ট / PDF</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultsContainer" class="p-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPhbMO5HcE6XT8vWUV1tI0L5fyNulyeMc",
            authDomain: "school-result-app-acb88.firebaseapp.com",
            projectId: "school-result-app-acb88",
            storageBucket: "school-result-app-acb88.firebasestorage.app",
            messagingSenderId: "442862025691",
            appId: "1:442862025691:web:4fba33ad35454ad6ff85fe",
            databaseURL: "https://school-result-app-acb88-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const studentsRef = ref(db, 'students');

        let studentsData = {};

        // গ্রেড ক্যালকুলেশন ফাংশন
        function getGrade(marks) {
            if (marks >= 80) return { point: 5.0, grade: "A+" };
            if (marks >= 70) return { point: 4.0, grade: "A" };
            if (marks >= 60) return { point: 3.5, grade: "A-" };
            if (marks >= 50) return { point: 3.0, grade: "B" };
            if (marks >= 40) return { point: 2.0, grade: "C" };
            if (marks >= 33) return { point: 1.0, grade: "D" };
            return { point: 0.0, grade: "F" };
        }

        window.checkPass = () => {
            const pass = document.getElementById('adminPass').value;
            if(pass === "1234") {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        };

        document.getElementById('studentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const student = {
                school: document.getElementById('sName').value,
                name: document.getElementById('stName').value,
                roll: document.getElementById('roll').value,
                className: document.getElementById('class').value,
                bn: document.getElementById('bn').value || 0,
                en: document.getElementById('en').value || 0,
                ma: document.getElementById('math').value || 0
            };
            push(studentsRef, student);
            e.target.reset();
            document.getElementById('sName').value = student.school;
        });

        onValue(studentsRef, (snapshot) => {
            studentsData = snapshot.val() || {};
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = "";
            Object.keys(studentsData).forEach(id => {
                const s = studentsData[id];
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3 border-b font-mono">${s.roll}</td>
                        <td class="p-3 border-b font-semibold text-slate-700">${s.name}</td>
                        <td class="p-3 border-b text-center">
                            <button onclick="deleteStudent('${id}')" class="text-red-400 hover:text-red-700 font-bold">মুছুন</button>
                        </td>
                    </tr>
                `;
            });
        });

        window.deleteStudent = (id) => {
            if(confirm("আপনি কি নিশ্চিতভাবে এই ডেটা মুছতে চান?")) remove(ref(db, `students/${id}`));
        };

        window.generateFinalResults = () => {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";
            Object.values(studentsData).forEach(s => {
                const bGrad = getGrade(s.bn);
                const eGrad = getGrade(s.en);
                const mGrad = getGrade(s.ma);
                const totalMarks = Number(s.bn) + Number(s.en) + Number(s.ma);
                const avgPoint = ((bGrad.point + eGrad.point + mGrad.point) / 3).toFixed(2);
                
                let finalGrade = "F";
                if(avgPoint >= 5.0) finalGrade = "A+";
                else if(avgPoint >= 4.0) finalGrade = "A";
                else if(avgPoint >= 3.5) finalGrade = "A-";
                else if(avgPoint >= 3.0) finalGrade = "B";
                else if(avgPoint >= 2.0) finalGrade = "C";
                else if(avgPoint >= 1.0) finalGrade = "D";

                // কোনো এক বিষয়ে ফেল করলে ফাইনাল গ্রেড F
                if(bGrad.point === 0 || eGrad.point === 0 || mGrad.point === 0) finalGrade = "F";

                container.innerHTML += `
                    <div class="result-card page-break">
                        <div class="text-center border-b-4 border-double border-blue-900 pb-4 mb-6">
                            <h2 class="text-3xl font-bold text-blue-900">${s.school}</h2>
                            <p class="text-lg text-gray-700 font-bold uppercase tracking-widest mt-1">Academic Transcript</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-6 text-lg border-b pb-4">
                            <div>
                                <p><strong>শিক্ষার্থীর নাম:</strong> ${s.name}</p>
                                <p><strong>রোল নম্বর:</strong> ${s.roll}</p>
                            </div>
                            <div class="text-right">
                                <p><strong>শ্রেণি:</strong> ${s.className}</p>
                                <p><strong>তারিখ:</strong> ${new Date().toLocaleDateString('bn-BD')}</p>
                            </div>
                        </div>
                        <table class="w-full border-collapse border-2 border-slate-800 text-lg">
                            <thead class="bg-slate-100">
                                <tr>
                                    <th class="border-2 border-slate-800 p-2">বিষয়</th>
                                    <th class="border-2 border-slate-800 p-2 text-center">নম্বর</th>
                                    <th class="border-2 border-slate-800 p-2 text-center">গ্রেড</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="border-2 border-slate-800 p-2">বাংলা</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${s.bn}</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${bGrad.grade}</td>
                                </tr>
                                <tr>
                                    <td class="border-2 border-slate-800 p-2">ইংরেজি</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${s.en}</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${eGrad.grade}</td>
                                </tr>
                                <tr>
                                    <td class="border-2 border-slate-800 p-2">গণিত</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${s.ma}</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${mGrad.grade}</td>
                                </tr>
                                <tr class="bg-blue-50 font-bold">
                                    <td class="border-2 border-slate-800 p-2 text-right">সর্বমোট নম্বর ও GPA:</td>
                                    <td class="border-2 border-slate-800 p-2 text-center">${totalMarks}</td>
                                    <td class="border-2 border-slate-800 p-2 text-center text-blue-800">${finalGrade} (${avgPoint})</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="mt-24 flex justify-between items-end">
                            <div class="text-center">
                                <div class="w-48 border-t-2 border-slate-800 mb-1"></div>
                                <p class="font-bold">অভিভাবকের স্বাক্ষর</p>
                            </div>
                            <div class="text-center">
                                <div class="w-48 border-t-2 border-slate-800 mb-1"></div>
                                <p class="font-bold">প্রধান শিক্ষকের স্বাক্ষর</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            window.scrollTo(0, document.body.scrollHeight);
        };
    </script>
</body>
</html>

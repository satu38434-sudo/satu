<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ক্লাস ৫ নোটস</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #222;
    }

    header {
      padding: 40px;
      text-align: center;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
    }

    header h1 {
      font-size: 3rem;
    }

    header p {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .container {
      max-width: 1400px;
      margin: auto;
      padding: 30px;
    }

    .search-box {
      text-align: center;
      margin-bottom: 30px;
    }

    input {
      width: 60%;
      padding: 15px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .categories {
      text-align: center;
      margin-bottom: 30px;
    }

    .btn {
      background: white;
      border: none;
      margin: 5px;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .btn.active {
      background: #4f46e5;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #4f46e5;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>📚 ক্লাস ৫ নোটস</h1>
  <p>সহজভাবে পড়ুন, PDF ডাউনলোড করুন</p>
</header>

<div class="container">

  <!-- 🔍 Search -->
  <div class="search-box">
    <input type="text" id="search" placeholder="নোট খুঁজুন...">
  </div>

  <!-- 🏷 Categories -->
  <div class="categories">
    <button class="btn active" onclick="filterSelection('all')">সব</button>
    <button class="btn" onclick="filterSelection('math')">গণিত</button>
    <button class="btn" onclick="filterSelection('english')">ইংরেজি</button>
    <button class="btn" onclick="filterSelection('science')">বিজ্ঞান</button>
  </div>

  <!-- 📄 Notes -->
  <div class="grid" id="notes">

    <div class="card math">
      <h3>গণিত - অধ্যায় ১</h3>
      <p>সংখ্যা ও সংখ্যা পদ্ধতি</p>
      <a href="pdfs/math1.pdf" target="_blank">📥 PDF দেখুন</a>
    </div>

    <div class="card math">
      <h3>গণিত - অধ্যায় ২</h3>
      <p>ভগ্নাংশ</p>
      <a href="pdfs/math2.pdf" target="_blank">📥 PDF দেখুন</a>
    </div>

    <div class="card english">
      <h3>English - Chapter 1</h3>
      <p>Grammar Basics</p>
      <a href="pdfs/eng1.pdf" target="_blank">📥 View PDF</a>
    </div>

    <div class="card science">
      <h3>বিজ্ঞান - অধ্যায় ১</h3>
      <p>জীবজগৎ</p>
      <a href="pdfs/sci1.pdf" target="_blank">📥 PDF দেখুন</a>
    </div>

  </div>

</div>

<footer>
  © 2026 ক্লাস ৫ নোটস | সকল অধিকার সংরক্ষিত
</footer>

<script>
  // 🔍 Search
  document.getElementById('search').addEventListener('keyup', function() {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      card.style.display = card.innerText.toLowerCase().includes(value) ? 'block' : 'none';
    });
  });

  // 🏷 Filter
  function filterSelection(category) {
    let cards = document.querySelectorAll('.card');
    let buttons = document.querySelectorAll('.btn');

    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card => {
      if (category === 'all' || card.classList.contains(category)) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  }
</script>

</body>
</html>
